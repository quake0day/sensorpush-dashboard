<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garden Editor</title>
<style>
  :root { --bg:#0a1a10; --s1:#12261a; --s2:#1a3326; --bd:#24432e; --t1:#e8f0e8; --t2:#8aaa96; --t3:#5a7a66; --acc:#4ade80; --red:#ef4444; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--t1); display:flex; flex-direction:column; height:100vh; overflow:hidden; }

  .toolbar { background:var(--s1); border-bottom:1px solid var(--bd); padding:8px 16px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; font-size:13px; }
  .toolbar h1 { font-size:16px; color:var(--acc); margin-right:8px; }
  .toolbar input { background:var(--s2); border:1px solid var(--bd); color:var(--t1); padding:4px 8px; border-radius:5px; font-size:12px; width:180px; }
  .toolbar button, .toolbar a { background:var(--s2); border:1px solid var(--bd); color:var(--t2); padding:4px 12px; border-radius:5px; cursor:pointer; font-size:12px; text-decoration:none; }
  .toolbar button:hover, .toolbar a:hover { background:var(--bd); color:var(--t1); }
  .btn-save { background:#166534!important; border-color:#22c55e!important; color:#22c55e!important; }
  .sep { width:1px; height:20px; background:var(--bd); }

  .main { display:flex; flex:1; overflow:hidden; }

  /* Left: Sprite Sheet Viewer */
  .panel-left { width:260px; background:var(--s1); border-right:1px solid var(--bd); display:flex; flex-direction:column; overflow:hidden; }
  .sheet-tabs { display:flex; border-bottom:1px solid var(--bd); }
  .sheet-tab { flex:1; padding:7px; text-align:center; font-size:12px; cursor:pointer; color:var(--t3); border-bottom:2px solid transparent; }
  .sheet-tab.active { color:var(--acc); border-color:var(--acc); }
  .sheet-controls { padding:6px 10px; border-bottom:1px solid var(--bd); font-size:11px; color:var(--t3); display:flex; gap:8px; align-items:center; }
  .sheet-controls input { width:40px; background:var(--s2); border:1px solid var(--bd); color:var(--t1); padding:2px 4px; border-radius:3px; font-size:11px; text-align:center; }
  .sheet-view { flex:1; overflow:auto; padding:8px; position:relative; cursor:crosshair; }
  .sheet-view canvas { image-rendering:pixelated; display:block; }
  .selected-preview { padding:8px 10px; border-top:1px solid var(--bd); display:flex; align-items:center; gap:8px; min-height:50px; }
  .selected-preview canvas { image-rendering:pixelated; border:1px solid var(--bd); }
  .selected-preview .info { font-size:11px; color:var(--t2); }
  .tool-bar { padding:6px 10px; border-top:1px solid var(--bd); display:flex; gap:4px; }
  .tool-btn { padding:4px 10px; border-radius:4px; font-size:11px; cursor:pointer; background:var(--s2); border:1px solid var(--bd); color:var(--t2); }
  .tool-btn:hover { background:var(--bd); }
  .tool-btn.active { background:var(--acc); color:#000; border-color:var(--acc); }

  /* Center: Isometric Canvas */
  .panel-center { flex:1; overflow:auto; background:#060e08; display:flex; align-items:center; justify-content:center; }
  .panel-center canvas { image-rendering:pixelated; cursor:crosshair; }

  /* Right: Saved */
  .panel-right { width:180px; background:var(--s1); border-left:1px solid var(--bd); display:flex; flex-direction:column; font-size:12px; }
  .panel-right h3 { font-size:11px; color:var(--t3); padding:8px 10px 4px; text-transform:uppercase; letter-spacing:1px; }
  .saved-list { flex:1; overflow-y:auto; padding:4px 8px; }
  .saved-item { display:flex; justify-content:space-between; align-items:center; padding:5px 6px; border-radius:5px; cursor:pointer; margin-bottom:1px; }
  .saved-item:hover { background:var(--s2); }
  .saved-item .del { color:var(--t3); cursor:pointer; padding:1px 5px; border-radius:3px; font-size:10px; }
  .saved-item .del:hover { background:var(--red); color:#fff; }
  .layer-ctrl { padding:8px 10px; border-top:1px solid var(--bd); }
  .layer-ctrl label { font-size:10px; color:var(--t3); display:block; margin-bottom:3px; }

  .info-bar { background:var(--s1); border-top:1px solid var(--bd); padding:5px 16px; font-size:11px; color:var(--t3); display:flex; gap:16px; }
</style>
</head>
<body>
<div class="toolbar">
  <a href="/">← Back</a>
  <div class="sep"></div>
  <h1>Garden Editor</h1>
  <div class="sep"></div>
  <span style="color:var(--t3)">Name:</span>
  <input id="gardenName" placeholder="garden_winter_day" />
  <button class="btn-save" onclick="saveGarden()">Save</button>
  <div class="sep"></div>
  <span style="color:var(--t3)">Grid:</span>
  <select id="gridCols" onchange="resizeGrid()"><option value="5">5</option><option value="7" selected>7</option><option value="9">9</option><option value="11">11</option></select>
  <span style="color:var(--t3)">x</span>
  <select id="gridRows" onchange="resizeGrid()"><option value="3">3</option><option value="5" selected>5</option><option value="7">7</option><option value="9">9</option></select>
  <button onclick="if(confirm('Clear?')){initGrid();redraw()}">Clear</button>
</div>

<div class="main">
  <div class="panel-left">
    <div class="sheet-tabs">
      <div class="sheet-tab active" onclick="switchSheet('blocks')">Blocks</div>
      <div class="sheet-tab" onclick="switchSheet('misc')">Misc</div>
    </div>
    <div class="sheet-controls">
      <span>Cell W:</span><input id="cellW" type="number" value="36" min="8" max="128" onchange="renderSheet()">
      <span>H:</span><input id="cellH" type="number" value="34" min="8" max="128" onchange="renderSheet()">
      <span>Zoom:</span><input id="sheetZoom" type="number" value="2" min="1" max="5" onchange="renderSheet()">
    </div>
    <div class="sheet-view" id="sheetView">
      <canvas id="sheetCanvas"></canvas>
    </div>
    <div class="selected-preview" id="selPreview">
      <span class="info">Click sprite sheet to select a tile</span>
    </div>
    <div class="tool-bar">
      <div class="tool-btn active" id="toolGround" onclick="setTool('ground')">Ground</div>
      <div class="tool-btn" id="toolDeco" onclick="setTool('deco')">Decor</div>
      <div class="tool-btn" id="toolEraser" onclick="setTool('eraser')">Eraser</div>
    </div>
  </div>

  <div class="panel-center">
    <canvas id="editorCanvas"></canvas>
  </div>

  <div class="panel-right">
    <h3>Saved Gardens</h3>
    <div class="saved-list" id="savedList"></div>
    <div class="layer-ctrl">
      <label>Decor Y Offset</label>
      <input type="range" id="decoOffY" min="-140" max="10" value="-30" style="width:100%" oninput="document.getElementById('offYVal').textContent=this.value+'px'">
      <span id="offYVal" style="font-size:10px;color:var(--t3)">-30px</span>
    </div>
  </div>
</div>

<div class="info-bar">
  <span id="infoCell">-</span>
  <span id="infoSprite">-</span>
  <span>Left: place | Right: erase | Sheet: click to pick</span>
</div>

<script>
// ============ State ============
let gridCols = 7, gridRows = 5;
let groundLayer = [];  // [row][col] = {sheet, sx, sy, sw, sh} or null
let decoLayer = [];    // [row][col] = {sheet, sx, sy, sw, sh, offsetY} or null
let currentSheet = 'blocks';
let currentTool = 'ground';  // 'ground' | 'deco' | 'eraser'
let selectedTile = null;     // {sheet, sx, sy, sw, sh}
let hoverCell = null;

const HALF_W = 18;   // half tile width for isometric
const HALF_H = 9;    // half diamond height (2:1 ratio)
const CANVAS_ZOOM = 2;

function initGrid() {
  groundLayer = Array.from({length: gridRows}, () => Array(gridCols).fill(null));
  decoLayer = Array.from({length: gridRows}, () => Array(gridCols).fill(null));
}
initGrid();

// ============ Images ============
const imgs = { blocks: new Image(), misc: new Image() };
let loadCount = 0;
function onLoad() {
  loadCount++;
  if (loadCount >= 2) { renderSheet(); redraw(); loadGardenList(); }
}
imgs.blocks.onload = onLoad;
imgs.misc.onload = onLoad;
imgs.blocks.src = '/garden/blocks.png';
imgs.misc.src = '/garden/misc.png';

// ============ Sheet Viewer ============
function switchSheet(name) {
  currentSheet = name;
  document.querySelectorAll('.sheet-tab').forEach(t => t.classList.toggle('active', t.textContent.toLowerCase() === name));
  // Set default cell sizes
  if (name === 'blocks') {
    document.getElementById('cellW').value = 36;
    document.getElementById('cellH').value = 34;
  } else {
    document.getElementById('cellW').value = 20;
    document.getElementById('cellH').value = 20;
  }
  renderSheet();
}

function renderSheet() {
  const cvs = document.getElementById('sheetCanvas');
  const ctx = cvs.getContext('2d');
  const img = imgs[currentSheet];
  const z = parseInt(document.getElementById('sheetZoom').value) || 2;
  const cw = parseInt(document.getElementById('cellW').value) || 36;
  const ch = parseInt(document.getElementById('cellH').value) || 34;

  cvs.width = img.width * z;
  cvs.height = img.height * z;
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(img, 0, 0, cvs.width, cvs.height);

  // Draw grid overlay
  ctx.strokeStyle = 'rgba(74,222,128,0.4)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= img.width; x += cw) {
    ctx.beginPath(); ctx.moveTo(x * z, 0); ctx.lineTo(x * z, cvs.height); ctx.stroke();
  }
  for (let y = 0; y <= img.height; y += ch) {
    ctx.beginPath(); ctx.moveTo(0, y * z); ctx.lineTo(cvs.width, y * z); ctx.stroke();
  }

  // Highlight selected tile
  if (selectedTile && selectedTile.sheet === currentSheet) {
    ctx.strokeStyle = '#4ade80';
    ctx.lineWidth = 2;
    ctx.strokeRect(selectedTile.sx * z, selectedTile.sy * z, selectedTile.sw * z, selectedTile.sh * z);
  }
}

// Click on sprite sheet to select
document.getElementById('sheetCanvas').addEventListener('click', (e) => {
  const cvs = e.target;
  const rect = cvs.getBoundingClientRect();
  const z = parseInt(document.getElementById('sheetZoom').value) || 2;
  const cw = parseInt(document.getElementById('cellW').value) || 36;
  const ch = parseInt(document.getElementById('cellH').value) || 34;

  const px = (e.clientX - rect.left) / z;
  const py = (e.clientY - rect.top) / z;
  const col = Math.floor(px / cw);
  const row = Math.floor(py / ch);
  const sx = col * cw;
  const sy = row * ch;
  const img = imgs[currentSheet];
  if (sx + cw > img.width + 2 || sy + ch > img.height + 2) return;

  selectedTile = { sheet: currentSheet, sx, sy, sw: cw, sh: ch };
  if (currentTool === 'eraser') setTool('ground');
  renderSheet();
  updatePreview();
});

function updatePreview() {
  const el = document.getElementById('selPreview');
  if (!selectedTile) {
    el.innerHTML = '<span class="info">Click sprite sheet to select</span>';
    return;
  }
  const s = selectedTile;
  const scale = 3;
  const pvs = document.createElement('canvas');
  pvs.width = s.sw * scale; pvs.height = s.sh * scale;
  const ctx = pvs.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(imgs[s.sheet], s.sx, s.sy, s.sw, s.sh, 0, 0, pvs.width, pvs.height);
  el.innerHTML = '';
  el.appendChild(pvs);
  const info = document.createElement('div');
  info.className = 'info';
  info.innerHTML = `${s.sheet}<br>${s.sx},${s.sy} ${s.sw}x${s.sh}`;
  el.appendChild(info);
}

function setTool(tool) {
  currentTool = tool;
  document.getElementById('toolGround').classList.toggle('active', tool === 'ground');
  document.getElementById('toolDeco').classList.toggle('active', tool === 'deco');
  document.getElementById('toolEraser').classList.toggle('active', tool === 'eraser');
}

// ============ Isometric Canvas ============
function getOrigin() {
  return {
    x: (gridCols + gridRows) * HALF_W / 2 + 40,
    y: 50
  };
}

function gridToScreen(col, row) {
  const o = getOrigin();
  return {
    x: o.x + (col - row) * HALF_W,
    y: o.y + (col + row) * HALF_H
  };
}

function screenToGrid(canvasX, canvasY) {
  const o = getOrigin();
  const lx = canvasX / CANVAS_ZOOM;
  const ly = canvasY / CANVAS_ZOOM;
  // Inverse isometric
  const fCol = ((lx - o.x) / HALF_W + (ly - o.y) / HALF_H) / 2;
  const fRow = ((ly - o.y) / HALF_H - (lx - o.x) / HALF_W) / 2;
  const col = Math.round(fCol);
  const row = Math.round(fRow);
  if (col >= 0 && col < gridCols && row >= 0 && row < gridRows) return { col, row };
  return null;
}

function drawDiamond(ctx, cx, cy, hw, hh, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(cx, cy - hh);       // top
  ctx.lineTo(cx + hw, cy);       // right
  ctx.lineTo(cx, cy + hh);       // bottom
  ctx.lineTo(cx - hw, cy);       // left
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 0.5; ctx.stroke(); }
}

function redraw() {
  const cvs = document.getElementById('editorCanvas');
  const ctx = cvs.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  const padW = (gridCols + gridRows) * HALF_W + 80;
  const padH = (gridCols + gridRows) * HALF_H + 200;
  cvs.width = padW * CANVAS_ZOOM;
  cvs.height = padH * CANVAS_ZOOM;
  ctx.scale(CANVAS_ZOOM, CANVAS_ZOOM);

  // Background
  ctx.fillStyle = '#060e08';
  ctx.fillRect(0, 0, padW, padH);

  // Draw back-to-front (row by row)
  for (let row = 0; row < gridRows; row++) {
    for (let col = 0; col < gridCols; col++) {
      const { x, y } = gridToScreen(col, row);
      const gnd = groundLayer[row][col];

      if (gnd) {
        // Draw ground tile centered on cell
        const img = imgs[gnd.sheet];
        // The tile's top-center diamond point should align with (x, y - HALF_H)
        // Draw so the tile fills the cell area
        ctx.drawImage(img, gnd.sx, gnd.sy, gnd.sw, gnd.sh,
          x - gnd.sw / 2, y - HALF_H, gnd.sw, gnd.sh);
      }

      // Grid cell outline (diamond shape)
      const isHover = hoverCell && hoverCell.col === col && hoverCell.row === row;
      drawDiamond(ctx, x, y, HALF_W, HALF_H,
        isHover ? 'rgba(74,222,128,0.15)' : null,
        isHover ? '#4ade80' : '#1e3a2c');

      // Cell coordinate label
      ctx.font = '6px monospace';
      ctx.fillStyle = '#2a4a36';
      ctx.textAlign = 'center';
      ctx.fillText(`${col},${row}`, x, y + 3);
    }
  }

  // Draw decorations (second pass, back-to-front)
  for (let row = 0; row < gridRows; row++) {
    for (let col = 0; col < gridCols; col++) {
      const deco = decoLayer[row][col];
      if (!deco) continue;
      const { x, y } = gridToScreen(col, row);
      const img = imgs[deco.sheet];
      const offY = deco.offsetY || -30;
      ctx.drawImage(img, deco.sx, deco.sy, deco.sw, deco.sh,
        x - deco.sw / 2, y + offY, deco.sw, deco.sh);
    }
  }
}

// ============ Canvas Interaction ============
const editorCvs = document.getElementById('editorCanvas');

editorCvs.addEventListener('click', (e) => {
  const rect = editorCvs.getBoundingClientRect();
  const cell = screenToGrid(e.clientX - rect.left, e.clientY - rect.top);
  if (!cell) return;
  const { col, row } = cell;

  if (currentTool === 'eraser') {
    groundLayer[row][col] = null;
    decoLayer[row][col] = null;
  } else if (currentTool === 'ground' && selectedTile) {
    groundLayer[row][col] = { ...selectedTile };
  } else if (currentTool === 'deco' && selectedTile) {
    const offY = parseInt(document.getElementById('decoOffY').value) || -30;
    decoLayer[row][col] = { ...selectedTile, offsetY: offY };
  }
  redraw();
});

editorCvs.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  const rect = editorCvs.getBoundingClientRect();
  const cell = screenToGrid(e.clientX - rect.left, e.clientY - rect.top);
  if (!cell) return;
  if (currentTool === 'deco') decoLayer[cell.row][cell.col] = null;
  else groundLayer[cell.row][cell.col] = null;
  redraw();
});

editorCvs.addEventListener('mousemove', (e) => {
  const rect = editorCvs.getBoundingClientRect();
  const cell = screenToGrid(e.clientX - rect.left, e.clientY - rect.top);
  const prev = hoverCell;
  hoverCell = cell;
  if (cell) {
    document.getElementById('infoCell').textContent = `Cell: ${cell.col}, ${cell.row}`;
    const g = groundLayer[cell.row][cell.col];
    const d = decoLayer[cell.row][cell.col];
    const parts = [];
    if (g) parts.push(`Ground: ${g.sheet}[${g.sx},${g.sy}]`);
    if (d) parts.push(`Deco: ${d.sheet}[${d.sx},${d.sy}]`);
    document.getElementById('infoSprite').textContent = parts.join(' | ') || '-';
  } else {
    document.getElementById('infoCell').textContent = '-';
    document.getElementById('infoSprite').textContent = '-';
  }
  // Only redraw if hover changed
  if ((prev?.col !== cell?.col) || (prev?.row !== cell?.row)) redraw();
});

editorCvs.addEventListener('mouseleave', () => { hoverCell = null; redraw(); });

// ============ Grid Resize ============
function resizeGrid() {
  const nc = parseInt(document.getElementById('gridCols').value);
  const nr = parseInt(document.getElementById('gridRows').value);
  const ng = Array.from({length: nr}, (_, r) => Array.from({length: nc}, (_, c) => groundLayer[r]?.[c] || null));
  const nd = Array.from({length: nr}, (_, r) => Array.from({length: nc}, (_, c) => decoLayer[r]?.[c] || null));
  gridCols = nc; gridRows = nr;
  groundLayer = ng; decoLayer = nd;
  redraw();
}

// ============ Save / Load ============
async function saveGarden() {
  const name = document.getElementById('gardenName').value.trim().replace(/[^a-zA-Z0-9_-]/g, '_');
  if (!name) return alert('Enter a name');
  const res = await fetch(`/api/garden/${name}`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ label: name, gridCols, gridRows, ground: groundLayer, deco: decoLayer })
  });
  if ((await res.json()).ok) { loadGardenList(); alert('Saved: ' + name); }
}

async function loadGarden(name) {
  const data = await (await fetch(`/api/garden/${name}`)).json();
  if (data.error) return;
  document.getElementById('gardenName').value = data.label || name;
  gridCols = data.gridCols || 7; gridRows = data.gridRows || 5;
  document.getElementById('gridCols').value = gridCols;
  document.getElementById('gridRows').value = gridRows;
  groundLayer = data.ground || [];
  decoLayer = data.deco || [];
  while (groundLayer.length < gridRows) groundLayer.push(Array(gridCols).fill(null));
  while (decoLayer.length < gridRows) decoLayer.push(Array(gridCols).fill(null));
  redraw();
}

async function deleteGarden(name) {
  if (!confirm('Delete ' + name + '?')) return;
  await fetch(`/api/garden/${name}`, { method: 'DELETE' });
  loadGardenList();
}

async function loadGardenList() {
  const list = await (await fetch('/api/gardens')).json();
  const el = document.getElementById('savedList');
  if (!list.length) { el.innerHTML = '<div style="padding:10px;font-size:11px;color:var(--t3)">No saved gardens</div>'; return; }
  el.innerHTML = list.map(g => `<div class="saved-item">
    <span onclick="loadGarden('${g.name}')">${g.label||g.name}</span>
    <span class="del" onclick="event.stopPropagation();deleteGarden('${g.name}')">x</span>
  </div>`).join('');
}
</script>
</body>
</html>
