<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garden Editor</title>
<style>
  :root { --bg:#0a1a10; --s1:#12261a; --s2:#1a3326; --bd:#24432e; --t1:#e8f0e8; --t2:#8aaa96; --t3:#5a7a66; --acc:#4ade80; --red:#ef4444; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--t1); display:flex; flex-direction:column; height:100vh; }
  .toolbar { background:var(--s1); border-bottom:1px solid var(--bd); padding:10px 16px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .toolbar h1 { font-size:16px; color:var(--acc); }
  .toolbar input { background:var(--s2); border:1px solid var(--bd); color:var(--t1); padding:5px 10px; border-radius:6px; font-size:13px; width:200px; }
  .toolbar button, .tb { background:var(--s2); border:1px solid var(--bd); color:var(--t2); padding:5px 14px; border-radius:6px; cursor:pointer; font-size:12px; }
  .toolbar button:hover, .tb:hover { background:var(--bd); color:var(--t1); }
  .toolbar .btn-save { background:#166534; border-color:#22c55e; color:#22c55e; }
  .toolbar .btn-save:hover { background:#22c55e; color:#000; }
  .toolbar .btn-back { text-decoration:none; color:var(--t2); }
  .toolbar .sep { width:1px; height:20px; background:var(--bd); }
  .toolbar select { background:var(--s2); border:1px solid var(--bd); color:var(--t1); padding:5px 8px; border-radius:6px; font-size:12px; }

  .main { display:flex; flex:1; overflow:hidden; }

  /* Left panel - sprites */
  .panel-left { width:220px; background:var(--s1); border-right:1px solid var(--bd); display:flex; flex-direction:column; overflow:hidden; }
  .tabs { display:flex; border-bottom:1px solid var(--bd); }
  .tab { flex:1; padding:8px; text-align:center; font-size:12px; cursor:pointer; color:var(--t3); border-bottom:2px solid transparent; }
  .tab.active { color:var(--acc); border-color:var(--acc); background:var(--s2); }
  .sprite-list { flex:1; overflow-y:auto; padding:8px; }
  .sprite-item { display:inline-flex; flex-direction:column; align-items:center; padding:4px; margin:2px; border:2px solid transparent; border-radius:6px; cursor:pointer; }
  .sprite-item:hover { border-color:var(--bd); background:var(--s2); }
  .sprite-item.selected { border-color:var(--acc); background:rgba(74,222,128,0.1); }
  .sprite-item canvas { image-rendering:pixelated; }
  .sprite-item .sp-label { font-size:9px; color:var(--t3); margin-top:2px; max-width:60px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  /* Center - canvas */
  .panel-center { flex:1; display:flex; align-items:center; justify-content:center; overflow:auto; background:#060e08; position:relative; }
  .panel-center canvas { image-rendering:pixelated; cursor:crosshair; }

  /* Right panel - saved gardens */
  .panel-right { width:200px; background:var(--s1); border-left:1px solid var(--bd); display:flex; flex-direction:column; }
  .panel-right h3 { font-size:12px; color:var(--t3); padding:10px 12px 6px; text-transform:uppercase; letter-spacing:1px; }
  .saved-list { flex:1; overflow-y:auto; padding:4px 8px; }
  .saved-item { display:flex; justify-content:space-between; align-items:center; padding:6px 8px; border-radius:6px; font-size:12px; cursor:pointer; margin-bottom:2px; }
  .saved-item:hover { background:var(--s2); }
  .saved-item .del { color:var(--t3); font-size:10px; cursor:pointer; padding:2px 6px; border-radius:4px; }
  .saved-item .del:hover { background:var(--red); color:#fff; }

  /* Tools section */
  .tools-section { padding:10px 12px; border-top:1px solid var(--bd); }
  .tool-row { margin-bottom:6px; }
  .tool-row label { font-size:11px; color:var(--t3); display:block; margin-bottom:3px; }
  .tool-btn { display:inline-block; padding:4px 10px; margin:2px; border-radius:4px; font-size:11px; cursor:pointer; background:var(--s2); border:1px solid var(--bd); color:var(--t2); }
  .tool-btn:hover { background:var(--bd); }
  .tool-btn.active { background:var(--acc); color:#000; border-color:var(--acc); }
  .info-bar { background:var(--s1); border-top:1px solid var(--bd); padding:6px 16px; font-size:11px; color:var(--t3); display:flex; gap:20px; }
</style>
</head>
<body>
<div class="toolbar">
  <a href="/" class="btn-back toolbar">← Back</a>
  <div class="sep"></div>
  <h1>Garden Editor</h1>
  <div class="sep"></div>
  <label style="font-size:12px;color:var(--t3)">Name:</label>
  <input id="gardenName" placeholder="e.g. garden_winter_day" />
  <button class="btn-save" onclick="saveGarden()">Save</button>
  <div class="sep"></div>
  <label style="font-size:12px;color:var(--t3)">Grid:</label>
  <select id="gridCols" onchange="resizeGrid()">
    <option value="5">5</option><option value="7" selected>7</option><option value="9">9</option><option value="11">11</option>
  </select>
  <span style="font-size:12px;color:var(--t3)">x</span>
  <select id="gridRows" onchange="resizeGrid()">
    <option value="3">3</option><option value="5" selected>5</option><option value="7">7</option><option value="9">9</option>
  </select>
  <button onclick="clearAll()">Clear All</button>
</div>

<div class="main">
  <!-- Left: Sprite Palette -->
  <div class="panel-left">
    <div class="tabs">
      <div class="tab active" data-tab="blocks" onclick="switchTab('blocks')">Blocks</div>
      <div class="tab" data-tab="misc" onclick="switchTab('misc')">Misc</div>
    </div>
    <div style="padding:6px 8px;">
      <div class="tool-btn" id="eraserBtn" onclick="selectEraser()" style="width:100%;text-align:center">Eraser</div>
    </div>
    <div class="sprite-list" id="spriteList"></div>
  </div>

  <!-- Center: Canvas -->
  <div class="panel-center">
    <canvas id="editorCanvas" width="600" height="450"></canvas>
  </div>

  <!-- Right: Saved Gardens -->
  <div class="panel-right">
    <h3>Saved Gardens</h3>
    <div class="saved-list" id="savedList"></div>
    <div class="tools-section">
      <div class="tool-row">
        <label>Current Tool</label>
        <div id="currentTool" style="font-size:13px;color:var(--acc)">None</div>
      </div>
      <div class="tool-row">
        <label>Layer</label>
        <div class="tool-btn active" id="layerGround" onclick="setLayer('ground')">Ground</div>
        <div class="tool-btn" id="layerDeco" onclick="setLayer('deco')">Decor</div>
      </div>
      <div class="tool-row" id="decoOffsetRow" style="display:none">
        <label>Decor Offset Y</label>
        <input type="range" id="decoOffsetY" min="-120" max="20" value="-20" style="width:100%" oninput="redraw()">
      </div>
    </div>
  </div>
</div>

<div class="info-bar">
  <span id="infoPos">Hover over grid</span>
  <span id="infoTile">-</span>
  <span>Left click: place | Right click: erase | Scroll: zoom</span>
</div>

<script>
// ============ Sprite Definitions ============
const TW = 36, TH = 38;

// blocks.png: 6 cols × 7 rows
const BLOCK_SPRITES = [];
const BLOCK_LABELS = [
  ['Grass','Grass+Flower','Grass+Tuft','Grass+Sprout','Grass+Mush','Grass+Weed'],
  ['Dirt1','Dirt2','Dirt+Grass','Dirt+Plant','Dirt+Rock','Dirt+Moss'],
  ['DirtDark1','DirtDark2','DirtDark3','DirtDark4','DirtDark5','DirtDark6'],
  ['Water1','Water2','Water3','Water+Rip1','Water+Rip2','Water+Rip3'],
  ['Water+Rock','Water+Lily','Water+Log','Water+Pad','Water+Stone','Water+Deep'],
  ['Stone1','Stone2','Stone3','Stone+Moss','Stone+Crack','Stone+Grass'],
  ['Path1','Path2','Path3','Path+Grass1','Path+Grass2','Path+Edge'],
];
for (let row = 0; row < 7; row++) {
  for (let col = 0; col < 6; col++) {
    BLOCK_SPRITES.push({
      id: `b_${row}_${col}`,
      sheet: 'blocks',
      sx: col * TW, sy: row * TH, sw: TW, sh: TH,
      label: BLOCK_LABELS[row]?.[col] || `Block ${row},${col}`,
      type: 'ground'
    });
  }
}

// misc.png: manually defined sprites
const MISC_SPRITES = [
  { id:'m_fence1',     sx:2,   sy:2,   sw:18, sh:54,  label:'Fence Tall' },
  { id:'m_fence2',     sx:24,  sy:10,  sw:18, sh:46,  label:'Fence Short' },
  { id:'m_rock_big',   sx:2,   sy:60,  sw:42, sh:24,  label:'Rock Big' },
  { id:'m_rock_slab',  sx:46,  sy:68,  sw:24, sh:14,  label:'Rock Slab' },
  { id:'m_pebbles',    sx:0,   sy:86,  sw:35, sh:16,  label:'Pebbles' },
  { id:'m_bench',      sx:4,   sy:78,  sw:60, sh:34,  label:'Bench' },
  { id:'m_log',        sx:0,   sy:112, sw:32, sh:16,  label:'Log' },
  { id:'m_stones1',    sx:2,   sy:130, sw:22, sh:12,  label:'Stones S' },
  { id:'m_stones2',    sx:28,  sy:128, sw:20, sh:14,  label:'Stones M' },
  { id:'m_stepping',   sx:0,   sy:146, sw:80, sh:22,  label:'Step Stones' },
  { id:'m_brick1',     sx:2,   sy:170, sw:14, sh:18,  label:'Brick' },
  { id:'m_brick2',     sx:18,  sy:170, sw:14, sh:14,  label:'Brick S' },
  // Flowers (top right area)
  { id:'m_fl_red',     sx:92,  sy:2,   sw:12, sh:18,  label:'Flower Red' },
  { id:'m_fl_yellow',  sx:106, sy:2,   sw:12, sh:18,  label:'Flower Yellow' },
  { id:'m_fl_orange',  sx:120, sy:2,   sw:14, sh:18,  label:'Flower Orange' },
  { id:'m_fl_pink',    sx:135, sy:2,   sw:12, sh:18,  label:'Flower Pink' },
  { id:'m_fl_blue',    sx:149, sy:2,   sw:12, sh:18,  label:'Flower Blue' },
  { id:'m_fl_purple',  sx:163, sy:2,   sw:12, sh:18,  label:'Flower Purple' },
  { id:'m_fl_white',   sx:177, sy:2,   sw:12, sh:18,  label:'Flower White' },
  { id:'m_fl_daisy',   sx:192, sy:2,   sw:12, sh:18,  label:'Flower Daisy' },
  // Second row flowers
  { id:'m_fl2_red',    sx:92,  sy:22,  sw:12, sh:16,  label:'Tulip Red' },
  { id:'m_fl2_pink',   sx:106, sy:22,  sw:12, sh:16,  label:'Tulip Pink' },
  { id:'m_fl2_yel',    sx:120, sy:22,  sw:12, sh:16,  label:'Tulip Yellow' },
  { id:'m_fl2_lav',    sx:135, sy:22,  sw:12, sh:16,  label:'Tulip Lavender' },
  { id:'m_fl2_blue',   sx:149, sy:22,  sw:12, sh:16,  label:'Tulip Blue' },
  { id:'m_fl2_org',    sx:163, sy:22,  sw:14, sh:16,  label:'Tulip Orange' },
  // Third row - bushflowers
  { id:'m_fl3_a',      sx:92,  sy:40,  sw:14, sh:14,  label:'Bush Flower A' },
  { id:'m_fl3_b',      sx:108, sy:40,  sw:14, sh:14,  label:'Bush Flower B' },
  { id:'m_fl3_c',      sx:124, sy:40,  sw:14, sh:14,  label:'Bush Flower C' },
  { id:'m_fl3_d',      sx:140, sy:40,  sw:14, sh:14,  label:'Bush Flower D' },
  { id:'m_fl3_e',      sx:156, sy:40,  sw:14, sh:14,  label:'Bush Flower E' },
  { id:'m_fl3_f',      sx:172, sy:40,  sw:14, sh:14,  label:'Bush Flower F' },
  // Fourth row
  { id:'m_fl4_a',      sx:92,  sy:56,  sw:16, sh:16,  label:'Cluster A' },
  { id:'m_fl4_b',      sx:110, sy:56,  sw:16, sh:16,  label:'Cluster B' },
  { id:'m_fl4_c',      sx:128, sy:56,  sw:16, sh:16,  label:'Cluster C' },
  { id:'m_fl4_d',      sx:146, sy:56,  sw:16, sh:16,  label:'Cluster D' },
  { id:'m_fl4_e',      sx:164, sy:56,  sw:16, sh:16,  label:'Cluster E' },
  // Bushes
  { id:'m_bush_l',     sx:238, sy:84,  sw:48, sh:38,  label:'Bush Large' },
  { id:'m_bush_m',     sx:288, sy:96,  sw:34, sh:28,  label:'Bush Medium' },
  { id:'m_bush_s',     sx:250, sy:130, sw:26, sh:22,  label:'Bush Small' },
  { id:'m_bush_s2',    sx:278, sy:132, sw:22, sh:18,  label:'Bush Tiny' },
  // Raised beds / planters
  { id:'m_bed1',       sx:96,  sy:104, sw:44, sh:32,  label:'Raised Bed 1' },
  { id:'m_bed2',       sx:142, sy:104, sw:44, sh:32,  label:'Raised Bed 2' },
  { id:'m_pot',        sx:72,  sy:62,  sw:16, sh:16,  label:'Pot' },
  // Trees
  { id:'m_tree_green', sx:86,  sy:176, sw:122,sh:134, label:'Tree Green' },
  { id:'m_tree_autumn',sx:212, sy:186, sw:54, sh:114, label:'Tree Autumn' },
  { id:'m_tree_bare',  sx:268, sy:186, sw:48, sh:118, label:'Tree Bare' },
  { id:'m_stump',      sx:296, sy:278, sw:24, sh:28,  label:'Stump' },
  // Mushrooms & small items
  { id:'m_mush_pair',  sx:196, sy:148, sw:28, sh:20,  label:'Mushrooms' },
  { id:'m_mush_red',   sx:200, sy:148, sw:12, sh:16,  label:'Mushroom Red' },
  { id:'m_leaf_g',     sx:252, sy:158, sw:12, sh:10,  label:'Leaf Green' },
  { id:'m_leaf_br',    sx:266, sy:158, sw:12, sh:10,  label:'Leaf Brown' },
  { id:'m_grass_t',    sx:280, sy:156, sw:10, sh:12,  label:'Grass Tuft' },
  { id:'m_sprout',     sx:292, sy:156, sw:10, sh:14,  label:'Sprout' },
].map(s => ({ ...s, sheet: 'misc', type: 'deco' }));

// ============ State ============
let gridCols = 7, gridRows = 5;
let groundLayer = []; // [row][col] = sprite id or null
let decoLayer = [];   // [row][col] = { spriteId, offsetY } or null
let selectedSprite = null;
let currentLayer = 'ground';
let isEraser = false;
let zoom = 2;

const HALF = 18, VSTEP = 10;
let blocksImg = new Image(), miscImg = new Image();
let imagesLoaded = 0;

function initGrid() {
  groundLayer = Array.from({length: gridRows}, () => Array(gridCols).fill(null));
  decoLayer = Array.from({length: gridRows}, () => Array(gridCols).fill(null));
}
initGrid();

// ============ Image Loading ============
function onImgLoad() {
  imagesLoaded++;
  if (imagesLoaded >= 2) {
    renderSpritePalette('blocks');
    redraw();
    loadGardenList();
  }
}
blocksImg.onload = onImgLoad;
miscImg.onload = onImgLoad;
blocksImg.src = '/garden/blocks.png';
miscImg.src = '/garden/misc.png';

// ============ Sprite Palette ============
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  renderSpritePalette(tab);
}

function renderSpritePalette(tab) {
  const list = document.getElementById('spriteList');
  const sprites = tab === 'blocks' ? BLOCK_SPRITES : MISC_SPRITES;
  const img = tab === 'blocks' ? blocksImg : miscImg;
  list.innerHTML = '';
  sprites.forEach(sp => {
    const div = document.createElement('div');
    div.className = 'sprite-item' + (selectedSprite?.id === sp.id ? ' selected' : '');
    div.onclick = () => selectSprite(sp);
    // Draw sprite preview
    const scale = Math.min(56 / sp.sw, 56 / sp.sh, 3);
    const cvs = document.createElement('canvas');
    cvs.width = Math.ceil(sp.sw * scale);
    cvs.height = Math.ceil(sp.sh * scale);
    const cx = cvs.getContext('2d');
    cx.imageSmoothingEnabled = false;
    cx.drawImage(img, sp.sx, sp.sy, sp.sw, sp.sh, 0, 0, cvs.width, cvs.height);
    div.appendChild(cvs);
    const lbl = document.createElement('div');
    lbl.className = 'sp-label';
    lbl.textContent = sp.label;
    div.appendChild(lbl);
    list.appendChild(div);
  });
}

function selectSprite(sp) {
  selectedSprite = sp;
  isEraser = false;
  document.getElementById('eraserBtn').classList.remove('active');
  document.getElementById('currentTool').textContent = sp.label;
  // Highlight
  document.querySelectorAll('.sprite-item').forEach(el => el.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  // Auto-switch layer
  if (sp.type === 'ground') setLayer('ground');
  else setLayer('deco');
}

function selectEraser() {
  isEraser = true;
  selectedSprite = null;
  document.getElementById('eraserBtn').classList.toggle('active', true);
  document.getElementById('currentTool').textContent = 'Eraser';
  document.querySelectorAll('.sprite-item').forEach(el => el.classList.remove('selected'));
}

function setLayer(layer) {
  currentLayer = layer;
  document.getElementById('layerGround').classList.toggle('active', layer === 'ground');
  document.getElementById('layerDeco').classList.toggle('active', layer === 'deco');
  document.getElementById('decoOffsetRow').style.display = layer === 'deco' ? '' : 'none';
}

// ============ Canvas Drawing ============
function getOrigin() {
  const canvas = document.getElementById('editorCanvas');
  return { x: canvas.width / (2 * zoom), y: 60 };
}

function gridToScreen(col, row) {
  const o = getOrigin();
  return {
    x: o.x + (col - row) * HALF,
    y: o.y + (col + row) * VSTEP
  };
}

function screenToGrid(sx, sy) {
  const o = getOrigin();
  const rx = sx / zoom, ry = sy / zoom;
  // Reverse isometric
  const fx = ((rx - o.x) / HALF + (ry - o.y) / VSTEP) / 2;
  const fy = ((ry - o.y) / VSTEP - (rx - o.x) / HALF) / 2;
  const col = Math.round(fx);
  const row = Math.round(fy);
  if (col >= 0 && col < gridCols && row >= 0 && row < gridRows) return { col, row };
  return null;
}

function redraw() {
  const canvas = document.getElementById('editorCanvas');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  // Resize canvas
  const neededW = (gridCols + gridRows) * HALF + TW + 40;
  const neededH = (gridCols + gridRows) * VSTEP + TH + 140;
  canvas.width = neededW * zoom;
  canvas.height = neededH * zoom;
  ctx.scale(zoom, zoom);

  // Background
  ctx.fillStyle = '#060e08';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const o = getOrigin();

  // Draw grid cells (back to front)
  for (let row = 0; row < gridRows; row++) {
    for (let col = 0; col < gridCols; col++) {
      const { x, y } = gridToScreen(col, row);

      // Draw ground tile or empty outline
      const gnd = groundLayer[row][col];
      if (gnd) {
        const sp = BLOCK_SPRITES.find(s => s.id === gnd) || MISC_SPRITES.find(s => s.id === gnd);
        if (sp) {
          const img = sp.sheet === 'blocks' ? blocksImg : miscImg;
          ctx.drawImage(img, sp.sx, sp.sy, sp.sw, sp.sh, x - HALF, y, sp.sw, sp.sh);
        }
      } else {
        // Draw empty cell outline
        ctx.strokeStyle = '#1a3326';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + HALF, y + VSTEP);
        ctx.lineTo(x, y + VSTEP * 2);
        ctx.lineTo(x - HALF, y + VSTEP);
        ctx.closePath();
        ctx.stroke();
      }
    }
  }

  // Draw decorations (back to front)
  for (let row = 0; row < gridRows; row++) {
    for (let col = 0; col < gridCols; col++) {
      const deco = decoLayer[row][col];
      if (deco) {
        const sp = MISC_SPRITES.find(s => s.id === deco.spriteId) || BLOCK_SPRITES.find(s => s.id === deco.spriteId);
        if (sp) {
          const { x, y } = gridToScreen(col, row);
          const img = sp.sheet === 'blocks' ? blocksImg : miscImg;
          ctx.drawImage(img, sp.sx, sp.sy, sp.sw, sp.sh,
            x - sp.sw / 2, y + (deco.offsetY || -20), sp.sw, sp.sh);
        }
      }
    }
  }

  // Draw grid coordinates
  ctx.font = '7px monospace';
  ctx.fillStyle = '#3a5a46';
  for (let row = 0; row < gridRows; row++) {
    for (let col = 0; col < gridCols; col++) {
      const { x, y } = gridToScreen(col, row);
      ctx.fillText(`${col},${row}`, x - 7, y + VSTEP + 4);
    }
  }
}

// ============ Canvas Interaction ============
const canvas = document.getElementById('editorCanvas');

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const cell = screenToGrid(sx, sy);
  if (!cell) return;

  if (isEraser) {
    if (currentLayer === 'ground') groundLayer[cell.row][cell.col] = null;
    else decoLayer[cell.row][cell.col] = null;
    redraw();
    return;
  }
  if (!selectedSprite) return;

  if (currentLayer === 'ground') {
    groundLayer[cell.row][cell.col] = selectedSprite.id;
  } else {
    const offsetY = parseInt(document.getElementById('decoOffsetY').value) || -20;
    decoLayer[cell.row][cell.col] = { spriteId: selectedSprite.id, offsetY };
  }
  redraw();
});

canvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const cell = screenToGrid(e.clientX - rect.left, e.clientY - rect.top);
  if (!cell) return;
  if (currentLayer === 'ground') groundLayer[cell.row][cell.col] = null;
  else decoLayer[cell.row][cell.col] = null;
  redraw();
});

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const cell = screenToGrid(e.clientX - rect.left, e.clientY - rect.top);
  if (cell) {
    document.getElementById('infoPos').textContent = `Cell: ${cell.col}, ${cell.row}`;
    const gnd = groundLayer[cell.row]?.[cell.col];
    const deco = decoLayer[cell.row]?.[cell.col];
    const parts = [];
    if (gnd) { const sp = BLOCK_SPRITES.find(s=>s.id===gnd)||MISC_SPRITES.find(s=>s.id===gnd); parts.push('Ground: '+(sp?.label||gnd)); }
    if (deco) { const sp = MISC_SPRITES.find(s=>s.id===deco.spriteId)||BLOCK_SPRITES.find(s=>s.id===deco.spriteId); parts.push('Deco: '+(sp?.label||deco.spriteId)); }
    document.getElementById('infoTile').textContent = parts.join(' | ') || '-';
  } else {
    document.getElementById('infoPos').textContent = 'Hover over grid';
    document.getElementById('infoTile').textContent = '-';
  }
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  zoom = Math.max(1, Math.min(4, zoom + (e.deltaY > 0 ? -0.5 : 0.5)));
  redraw();
});

// ============ Grid Resize ============
function resizeGrid() {
  const newCols = parseInt(document.getElementById('gridCols').value);
  const newRows = parseInt(document.getElementById('gridRows').value);
  // Preserve existing data
  const newGround = Array.from({length: newRows}, (_, r) =>
    Array.from({length: newCols}, (_, c) => groundLayer[r]?.[c] || null));
  const newDeco = Array.from({length: newRows}, (_, r) =>
    Array.from({length: newCols}, (_, c) => decoLayer[r]?.[c] || null));
  gridCols = newCols;
  gridRows = newRows;
  groundLayer = newGround;
  decoLayer = newDeco;
  redraw();
}

function clearAll() {
  if (!confirm('Clear entire canvas?')) return;
  initGrid();
  redraw();
}

// ============ Save / Load ============
async function saveGarden() {
  const name = document.getElementById('gardenName').value.trim().replace(/[^a-zA-Z0-9_-]/g, '_');
  if (!name) { alert('Please enter a name'); return; }
  const data = {
    label: name,
    gridCols, gridRows,
    ground: groundLayer,
    deco: decoLayer,
  };
  const res = await fetch(`/api/garden/${name}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  });
  const result = await res.json();
  if (result.ok) {
    loadGardenList();
    alert('Saved: ' + name);
  }
}

async function loadGarden(name) {
  const res = await fetch(`/api/garden/${name}`);
  const data = await res.json();
  if (data.error) { alert('Load failed'); return; }
  document.getElementById('gardenName').value = data.label || name;
  gridCols = data.gridCols || 7;
  gridRows = data.gridRows || 5;
  document.getElementById('gridCols').value = gridCols;
  document.getElementById('gridRows').value = gridRows;
  groundLayer = data.ground || [];
  decoLayer = data.deco || [];
  // Ensure correct dimensions
  while (groundLayer.length < gridRows) groundLayer.push(Array(gridCols).fill(null));
  while (decoLayer.length < gridRows) decoLayer.push(Array(gridCols).fill(null));
  redraw();
}

async function deleteGarden(name) {
  if (!confirm('Delete ' + name + '?')) return;
  await fetch(`/api/garden/${name}`, { method: 'DELETE' });
  loadGardenList();
}

async function loadGardenList() {
  try {
    const res = await fetch('/api/gardens');
    const list = await res.json();
    const el = document.getElementById('savedList');
    if (!list.length) { el.innerHTML = '<div style="padding:12px;font-size:11px;color:var(--t3)">No saved gardens yet</div>'; return; }
    el.innerHTML = list.map(g => `<div class="saved-item">
      <span onclick="loadGarden('${g.name}')">${g.label || g.name}</span>
      <span class="del" onclick="event.stopPropagation();deleteGarden('${g.name}')">x</span>
    </div>`).join('');
  } catch (e) { console.error('load gardens:', e); }
}

// and render it using the same sprite definitions.
