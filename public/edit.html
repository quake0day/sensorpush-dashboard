<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garden Editor</title>
<style>
  :root{--bg:#0a1a10;--s1:#12261a;--s2:#1a3326;--bd:#24432e;--t1:#e8f0e8;--t2:#8aaa96;--t3:#5a7a66;--acc:#4ade80;--red:#ef4444;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--t1);display:flex;flex-direction:column;height:100vh;overflow:hidden;}

  .bar{background:var(--s1);border-bottom:1px solid var(--bd);padding:8px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:13px;}
  .bar h1{font-size:15px;color:var(--acc);}
  .bar input[type=text]{background:var(--s2);border:1px solid var(--bd);color:var(--t1);padding:4px 8px;border-radius:5px;font-size:12px;width:170px;}
  .bar select,.bar input[type=number]{background:var(--s2);border:1px solid var(--bd);color:var(--t1);padding:3px 6px;border-radius:4px;font-size:11px;width:48px;}
  .btn{background:var(--s2);border:1px solid var(--bd);color:var(--t2);padding:4px 12px;border-radius:5px;cursor:pointer;font-size:12px;text-decoration:none;display:inline-block;}
  .btn:hover{background:var(--bd);color:var(--t1);}
  .btn-sav{background:#166534;border-color:#22c55e;color:#22c55e;}
  .btn-sav:hover{background:#22c55e;color:#000;}
  .sep{width:1px;height:20px;background:var(--bd);}
  .lbl{color:var(--t3);font-size:11px;}

  .main{display:flex;flex:1;overflow:hidden;}

  /* Left panel */
  .pnl-l{width:240px;background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;}
  .tabs{display:flex;border-bottom:1px solid var(--bd);}
  .tab{flex:1;padding:6px;text-align:center;font-size:12px;cursor:pointer;color:var(--t3);border-bottom:2px solid transparent;}
  .tab.on{color:var(--acc);border-color:var(--acc);}
  .sh-ctrl{padding:5px 8px;border-bottom:1px solid var(--bd);font-size:10px;color:var(--t3);display:flex;gap:6px;align-items:center;}
  .sh-ctrl input{width:36px;background:var(--s2);border:1px solid var(--bd);color:var(--t1);padding:1px 3px;border-radius:3px;font-size:10px;text-align:center;}
  .sh-area{flex:1;overflow:auto;padding:6px;cursor:crosshair;}
  .sh-area canvas{image-rendering:pixelated;display:block;}
  .sel-pv{padding:6px 8px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:8px;min-height:44px;}
  .sel-pv canvas{image-rendering:pixelated;border:1px solid var(--bd);}
  .sel-pv .info{font-size:10px;color:var(--t2);}
  .tools{padding:5px 8px;border-top:1px solid var(--bd);display:flex;gap:3px;flex-wrap:wrap;}
  .tbtn{padding:3px 8px;border-radius:4px;font-size:11px;cursor:pointer;background:var(--s2);border:1px solid var(--bd);color:var(--t2);}
  .tbtn:hover{background:var(--bd);}
  .tbtn.on{background:var(--acc);color:#000;border-color:var(--acc);}

  /* Center: Three.js */
  .viewport{flex:1;position:relative;overflow:hidden;}
  .viewport canvas{display:block;}

  /* Right panel */
  .pnl-r{width:170px;background:var(--s1);border-left:1px solid var(--bd);display:flex;flex-direction:column;font-size:12px;}
  .pnl-r h3{font-size:10px;color:var(--t3);padding:8px 8px 4px;text-transform:uppercase;letter-spacing:1px;}
  .sv-list{flex:1;overflow-y:auto;padding:2px 6px;}
  .sv-item{display:flex;justify-content:space-between;align-items:center;padding:4px 6px;border-radius:4px;cursor:pointer;margin-bottom:1px;font-size:11px;}
  .sv-item:hover{background:var(--s2);}
  .sv-item .x{color:var(--t3);cursor:pointer;padding:1px 4px;border-radius:3px;font-size:10px;}
  .sv-item .x:hover{background:var(--red);color:#fff;}
  .ctrl{padding:6px 8px;border-top:1px solid var(--bd);}
  .ctrl label{font-size:10px;color:var(--t3);display:block;margin-bottom:2px;}
  .ctrl input[type=range]{width:100%;}

  .sbar{background:var(--s1);border-top:1px solid var(--bd);padding:4px 14px;font-size:10px;color:var(--t3);display:flex;gap:16px;}
</style>
</head>
<body>
<div class="bar">
  <a href="/" class="btn">← Back</a><div class="sep"></div>
  <h1>Garden Editor</h1><div class="sep"></div>
  <span class="lbl">Name:</span>
  <input type="text" id="gardenName" placeholder="garden_winter_day">
  <button class="btn btn-sav" onclick="saveGarden()">Save</button>
  <div class="sep"></div>
  <span class="lbl">Grid:</span>
  <select id="gCols" onchange="rebuildGrid()"><option>5</option><option selected>7</option><option>9</option><option>11</option></select>
  <span class="lbl">x</span>
  <select id="gRows" onchange="rebuildGrid()"><option>3</option><option selected>5</option><option>7</option><option>9</option></select>
  <button class="btn" onclick="if(confirm('Clear all?')){initLayers();rebuildGrid()}">Clear</button>
  <div class="sep"></div>
  <span class="lbl">Camera:</span>
  <button class="btn" onclick="resetCam()">Reset</button>
</div>

<div class="main">
  <!-- Sprite Palette -->
  <div class="pnl-l">
    <div class="tabs">
      <div class="tab on" onclick="switchSheet('blocks',this)">Blocks</div>
      <div class="tab" onclick="switchSheet('misc',this)">Misc</div>
    </div>
    <div class="sh-ctrl">
      W:<input id="cW" type="number" value="36" min="4" max="200" onchange="drawSheet()">
      H:<input id="cH" type="number" value="34" min="4" max="200" onchange="drawSheet()">
      Zoom:<input id="sZ" type="number" value="2" min="1" max="6" onchange="drawSheet()">
    </div>
    <div class="sh-area"><canvas id="shCvs"></canvas></div>
    <div class="sel-pv" id="preview"><span class="info">Click sheet to pick a tile</span></div>
    <div class="tools">
      <div class="tbtn on" id="tGnd" onclick="setTool('ground')">Ground</div>
      <div class="tbtn" id="tDec" onclick="setTool('deco')">Decor</div>
      <div class="tbtn" id="tEra" onclick="setTool('eraser')">Eraser</div>
      <div class="tbtn" id="tPick" onclick="setTool('pick')">Pick</div>
    </div>
  </div>

  <!-- Three.js Viewport -->
  <div class="viewport" id="viewport"></div>

  <!-- Right Panel -->
  <div class="pnl-r">
    <h3>Saved Gardens</h3>
    <div class="sv-list" id="svList"></div>
    <div class="ctrl">
      <label>Decor Height: <span id="dhVal">0.5</span></label>
      <input type="range" id="dH" min="0" max="3" step="0.1" value="0.5" oninput="document.getElementById('dhVal').textContent=this.value">
    </div>
    <div class="ctrl">
      <label>Decor Scale: <span id="dsVal">1.0</span></label>
      <input type="range" id="dS" min="0.3" max="3" step="0.1" value="1.0" oninput="document.getElementById('dsVal').textContent=this.value">
    </div>
  </div>
</div>
<div class="sbar">
  <span id="sCell">-</span>
  <span id="sTool">Tool: Ground</span>
  <span>Left: place | Right: erase | Scroll: zoom | Middle-drag: pan | Right-drag: orbit</span>
</div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ State ============
let gCols = 7, gRows = 5;
let groundL = [];  // [r][c] = {sheet,sx,sy,sw,sh} | null
let decoL = [];    // [r][c] = {sheet,sx,sy,sw,sh,height,scale} | null
let curSheet = 'blocks';
let tool = 'ground';
let selTile = null; // {sheet,sx,sy,sw,sh}
let hoverCell = null;

window.initLayers = function() {
  groundL = Array.from({length:gRows},()=>Array(gCols).fill(null));
  decoL = Array.from({length:gRows},()=>Array(gCols).fill(null));
};
initLayers();

// ============ Images ============
const imgs = {};
let loadN = 0;
function onImg(){loadN++;if(loadN>=2){drawSheet();buildScene();loadList();}}
const bImg = new Image(); bImg.onload=onImg; bImg.src='/garden/blocks.png';
const mImg = new Image(); mImg.onload=onImg; mImg.src='/garden/misc.png';
imgs.blocks=bImg; imgs.misc=mImg;

// ============ Sheet Palette ============
window.switchSheet = function(name,el){
  curSheet=name;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('cW').value = name==='blocks'?36:20;
  document.getElementById('cH').value = name==='blocks'?34:20;
  drawSheet();
};

function drawSheet(){
  const cvs=document.getElementById('shCvs'), ctx=cvs.getContext('2d');
  const img=imgs[curSheet], z=+(document.getElementById('sZ').value)||2;
  const cw=+(document.getElementById('cW').value)||36, ch=+(document.getElementById('cH').value)||34;
  cvs.width=img.width*z; cvs.height=img.height*z;
  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(img,0,0,cvs.width,cvs.height);
  ctx.strokeStyle='rgba(74,222,128,0.35)'; ctx.lineWidth=1;
  for(let x=0;x<=img.width;x+=cw){ctx.beginPath();ctx.moveTo(x*z,0);ctx.lineTo(x*z,cvs.height);ctx.stroke();}
  for(let y=0;y<=img.height;y+=ch){ctx.beginPath();ctx.moveTo(0,y*z);ctx.lineTo(cvs.width,y*z);ctx.stroke();}
  if(selTile&&selTile.sheet===curSheet){
    ctx.strokeStyle='#4ade80';ctx.lineWidth=2;
    ctx.strokeRect(selTile.sx*z,selTile.sy*z,selTile.sw*z,selTile.sh*z);
  }
}

document.getElementById('shCvs').addEventListener('click',e=>{
  const rect=e.target.getBoundingClientRect();
  const z=+(document.getElementById('sZ').value)||2;
  const cw=+(document.getElementById('cW').value)||36, ch=+(document.getElementById('cH').value)||34;
  const px=(e.clientX-rect.left)/z, py=(e.clientY-rect.top)/z;
  const c=Math.floor(px/cw), r=Math.floor(py/ch);
  const img=imgs[curSheet];
  if(c*cw>=img.width||r*ch>=img.height) return;
  selTile={sheet:curSheet,sx:c*cw,sy:r*ch,sw:cw,sh:ch};
  if(tool==='eraser')setTool('ground');
  drawSheet(); updPreview();
});

function updPreview(){
  const el=document.getElementById('preview');
  if(!selTile){el.innerHTML='<span class="info">Click sheet to pick</span>';return;}
  const s=selTile, sc=3;
  const c=document.createElement('canvas');c.width=s.sw*sc;c.height=s.sh*sc;
  const x=c.getContext('2d');x.imageSmoothingEnabled=false;
  x.drawImage(imgs[s.sheet],s.sx,s.sy,s.sw,s.sh,0,0,c.width,c.height);
  el.innerHTML='';el.appendChild(c);
  const d=document.createElement('div');d.className='info';
  d.innerHTML=`${s.sheet}<br>${s.sx},${s.sy} ${s.sw}x${s.sh}`;
  el.appendChild(d);
}

window.setTool = function(t){
  tool=t;
  document.getElementById('tGnd').classList.toggle('on',t==='ground');
  document.getElementById('tDec').classList.toggle('on',t==='deco');
  document.getElementById('tEra').classList.toggle('on',t==='eraser');
  document.getElementById('tPick').classList.toggle('on',t==='pick');
  document.getElementById('sTool').textContent='Tool: '+{ground:'Ground',deco:'Decor',eraser:'Eraser',pick:'Pick'}[t];
};

// ============ Three.js Setup ============
const vp = document.getElementById('viewport');
const renderer = new THREE.WebGLRenderer({antialias:true,alpha:false});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x060e08);
vp.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x060e08, 20, 40);

const frustum = 6;
const aspect = vp.clientWidth/vp.clientHeight;
const camera = new THREE.OrthographicCamera(-frustum*aspect, frustum*aspect, frustum, -frustum, 0.1, 100);
camera.position.set(8, 10, 8);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.1;
controls.maxPolarAngle = Math.PI/2.5;
controls.minPolarAngle = Math.PI/6;
controls.target.set(0, 0, 0);
controls.mouseButtons = { LEFT: THREE.MOUSE.PAN, MIDDLE: THREE.MOUSE.PAN, RIGHT: THREE.MOUSE.ROTATE };

window.resetCam = function(){
  camera.position.set(8,10,8); controls.target.set(0,0,0); controls.update();
};

// Lights
scene.add(new THREE.AmbientLight(0xccddcc, 0.7));
const dir = new THREE.DirectionalLight(0xffffff, 0.8);
dir.position.set(5, 10, 5);
scene.add(dir);

// ============ Grid & Tiles ============
const gridGroup = new THREE.Group();
scene.add(gridGroup);

const tileGroup = new THREE.Group(); // ground tiles
scene.add(tileGroup);

const decoGroup = new THREE.Group(); // decorations
scene.add(decoGroup);

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let groundPlane;
const cellMeshes = []; // for raycasting

function makeTex(sheet, sx, sy, sw, sh) {
  const c = document.createElement('canvas');
  c.width = sw; c.height = sh;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(imgs[sheet], sx, sy, sw, sh, 0, 0, sw, sh);
  const tex = new THREE.CanvasTexture(c);
  tex.magFilter = THREE.NearestFilter;
  tex.minFilter = THREE.NearestFilter;
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function buildScene() {
  // Clear
  gridGroup.clear(); tileGroup.clear(); decoGroup.clear();
  cellMeshes.length = 0;

  const hw = gCols / 2, hd = gRows / 2;
  controls.target.set(0, 0, 0);

  // Grid lines
  const gridMat = new THREE.LineBasicMaterial({color:0x1a3326,transparent:true,opacity:0.6});
  for (let i = 0; i <= gCols; i++) {
    const g = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(i - hw, 0, -hd),
      new THREE.Vector3(i - hw, 0, gRows - hd)
    ]);
    gridGroup.add(new THREE.Line(g, gridMat));
  }
  for (let j = 0; j <= gRows; j++) {
    const g = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-hw, 0, j - hd),
      new THREE.Vector3(gCols - hw, 0, j - hd)
    ]);
    gridGroup.add(new THREE.Line(g, gridMat));
  }

  // Invisible cell planes for raycasting
  const cellGeo = new THREE.PlaneGeometry(1, 1);
  cellGeo.rotateX(-Math.PI / 2);
  const cellMat = new THREE.MeshBasicMaterial({visible: false, side: THREE.DoubleSide});
  for (let r = 0; r < gRows; r++) {
    for (let c = 0; c < gCols; c++) {
      const m = new THREE.Mesh(cellGeo, cellMat);
      m.position.set(c - hw + 0.5, 0, r - hd + 0.5);
      m.userData = { col: c, row: r };
      gridGroup.add(m);
      cellMeshes.push(m);
    }
  }

  // Hover indicator
  const hoverGeo = new THREE.PlaneGeometry(1, 1);
  hoverGeo.rotateX(-Math.PI / 2);
  const hoverMat = new THREE.MeshBasicMaterial({color:0x4ade80, transparent:true, opacity:0.25, side:THREE.DoubleSide});
  window.hoverMesh = new THREE.Mesh(hoverGeo, hoverMat);
  window.hoverMesh.position.y = 0.01;
  window.hoverMesh.visible = false;
  scene.add(window.hoverMesh);

  rebuildTiles();
}

function rebuildTiles() {
  tileGroup.clear(); decoGroup.clear();
  const hw = gCols / 2, hd = gRows / 2;

  for (let r = 0; r < gRows; r++) {
    for (let c = 0; c < gCols; c++) {
      const g = groundL[r]?.[c];
      if (g) {
        const tex = makeTex(g.sheet, g.sx, g.sy, g.sw, g.sh);
        const ratio = g.sh / g.sw;
        const geo = new THREE.PlaneGeometry(1, ratio);
        geo.rotateX(-Math.PI / 2);
        const mat = new THREE.MeshBasicMaterial({map: tex, transparent: true, alphaTest: 0.1, side: THREE.DoubleSide});
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(c - hw + 0.5, 0.005, r - hd + 0.5);
        tileGroup.add(mesh);
      }

      const d = decoL[r]?.[c];
      if (d) {
        const tex = makeTex(d.sheet, d.sx, d.sy, d.sw, d.sh);
        const sc = d.scale || 1;
        const ratio = d.sh / d.sw;
        const w = sc, h = sc * ratio;
        const geo = new THREE.PlaneGeometry(w, h);
        const mat = new THREE.MeshBasicMaterial({map: tex, transparent: true, alphaTest: 0.1, side: THREE.DoubleSide});
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(c - hw + 0.5, (d.height || 0.5) + h / 2, r - hd + 0.5);
        // Billboard: face camera Y-axis rotation only
        mesh.onBeforeRender = function(renderer, scene, camera) {
          mesh.quaternion.copy(camera.quaternion);
        };
        decoGroup.add(mesh);
      }
    }
  }
}

window.rebuildGrid = function() {
  const nc = +(document.getElementById('gCols').value);
  const nr = +(document.getElementById('gRows').value);
  const ng = Array.from({length:nr},(_,r)=>Array.from({length:nc},(_,c)=>groundL[r]?.[c]||null));
  const nd = Array.from({length:nr},(_,r)=>Array.from({length:nc},(_,c)=>decoL[r]?.[c]||null));
  gCols=nc; gRows=nr; groundL=ng; decoL=nd;
  buildScene();
};

// ============ Interaction ============
function getCell(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(cellMeshes);
  return hits.length ? hits[0].object.userData : null;
}

renderer.domElement.addEventListener('pointermove', e => {
  const cell = getCell(e);
  if (cell) {
    hoverCell = cell;
    const hw = gCols/2, hd = gRows/2;
    window.hoverMesh.position.set(cell.col - hw + 0.5, 0.01, cell.row - hd + 0.5);
    window.hoverMesh.visible = true;
    document.getElementById('sCell').textContent = `Cell: ${cell.col}, ${cell.row}`;
  } else {
    window.hoverMesh.visible = false;
    document.getElementById('sCell').textContent = '-';
  }
});

renderer.domElement.addEventListener('click', e => {
  // Ignore if user was orbiting/panning
  const cell = getCell(e);
  if (!cell) return;
  const {col, row} = cell;

  if (tool === 'eraser') {
    groundL[row][col] = null;
    decoL[row][col] = null;
  } else if (tool === 'ground' && selTile) {
    groundL[row][col] = {...selTile};
  } else if (tool === 'deco' && selTile) {
    const h = +(document.getElementById('dH').value) || 0.5;
    const s = +(document.getElementById('dS').value) || 1;
    decoL[row][col] = {...selTile, height: h, scale: s};
  } else if (tool === 'pick') {
    const g = groundL[row][col];
    const d = decoL[row][col];
    if (d) { selTile = {sheet:d.sheet,sx:d.sx,sy:d.sy,sw:d.sw,sh:d.sh}; setTool('deco'); }
    else if (g) { selTile = {sheet:g.sheet,sx:g.sx,sy:g.sy,sw:g.sw,sh:g.sh}; setTool('ground'); }
    drawSheet(); updPreview();
    rebuildTiles(); return;
  }
  rebuildTiles();
});

renderer.domElement.addEventListener('contextmenu', e => {
  // Right-click erase handled by OrbitControls rotate; use shift+click for erase instead
});

// ============ Animation ============
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.setSize(vp.clientWidth, vp.clientHeight);
  const a = vp.clientWidth / vp.clientHeight;
  camera.left = -frustum * a; camera.right = frustum * a;
  camera.top = frustum; camera.bottom = -frustum;
  camera.updateProjectionMatrix();
  renderer.render(scene, camera);
}
animate();

// ============ Save / Load ============
window.saveGarden = async function() {
  const name = document.getElementById('gardenName').value.trim().replace(/[^a-zA-Z0-9_-]/g,'_');
  if (!name) return alert('Enter a name');
  const res = await fetch(`/api/garden/${name}`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({label:name,gridCols:gCols,gridRows:gRows,ground:groundL,deco:decoL})
  });
  if ((await res.json()).ok) { loadList(); alert('Saved: '+name); }
};

async function loadGarden(name) {
  const d = await (await fetch(`/api/garden/${name}`)).json();
  if (d.error) return;
  document.getElementById('gardenName').value = d.label || name;
  gCols = d.gridCols||7; gRows = d.gridRows||5;
  document.getElementById('gCols').value = gCols;
  document.getElementById('gRows').value = gRows;
  groundL = d.ground||[]; decoL = d.deco||[];
  while(groundL.length<gRows)groundL.push(Array(gCols).fill(null));
  while(decoL.length<gRows)decoL.push(Array(gCols).fill(null));
  buildScene();
}
window.loadGarden = loadGarden;

async function delGarden(name){
  if(!confirm('Delete '+name+'?'))return;
  await fetch(`/api/garden/${name}`,{method:'DELETE'});
  loadList();
}
window.delGarden = delGarden;

async function loadList(){
  const list = await(await fetch('/api/gardens')).json();
  const el = document.getElementById('svList');
  if(!list.length){el.innerHTML='<div style="padding:8px;font-size:10px;color:var(--t3)">No saved gardens</div>';return;}
  el.innerHTML = list.map(g=>`<div class="sv-item">
    <span onclick="loadGarden('${g.name}')">${g.label||g.name}</span>
    <span class="x" onclick="event.stopPropagation();delGarden('${g.name}')">x</span>
  </div>`).join('');
}
</script>
</body>
</html>
