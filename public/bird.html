<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bird Detection Log</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    :root { --bg:#0a1a10; --surface:#12261a; --surface2:#1a3326; --border:#24432e; --text:#e8f0e8; --text2:#8aaa96; --text3:#5a7a66; --accent:#4ade80; --orange:#f97316; --blue:#38bdf8; --red:#ef4444; --green:#22c55e; --yellow:#facc15; --purple:#a78bfa; }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .header-left h1{font-size:22px;font-weight:700}
    .header-left h1 .icon{color:var(--orange)}
    .header-left .subtitle{font-size:12px;color:var(--text2);margin-top:2px}
    .header-right{display:flex;align-items:center;gap:10px}
    .nav-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:5px 14px;border-radius:6px;cursor:pointer;font-size:13px;text-decoration:none;transition:all .15s}
    .nav-btn:hover{background:var(--border);color:var(--text)}
    .nav-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600}
    .status{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px}
    .status .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
    .status .dot.on{background:var(--green)} .status .dot.off{background:var(--red)}
    .container{max-width:1200px;margin:0 auto;padding:24px 20px}
    .section{margin-bottom:28px}
    .section-head{font-size:13px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:14px;display:flex;align-items:center;gap:8px}
    .section-head::after{content:'';flex:1;height:1px;background:var(--border)}

    /* Date Picker */
    .date-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
    .date-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px}
    .date-btn:hover{background:var(--border);color:var(--text)}
    .date-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600}
    .date-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;font-size:13px;font-family:inherit}
    .date-input::-webkit-calendar-picker-indicator{filter:invert(0.7)}

    /* Summary Cards */
    .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
    .summary-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;text-align:center}
    .summary-card .num{font-size:32px;font-weight:700;line-height:1}
    .summary-card .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:6px}

    /* Leaderboard */
    .lb-list{display:flex;flex-direction:column;gap:8px}
    .lb-row{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:14px;transition:background .15s}
    .lb-row:hover{background:var(--surface2)}
    .lb-rank{font-size:22px;font-weight:700;color:var(--text3);width:36px;text-align:center;flex-shrink:0}
    .lb-rank.gold{color:var(--yellow)} .lb-rank.silver{color:var(--text2)} .lb-rank.bronze{color:var(--orange)}
    .lb-img{width:52px;height:52px;border-radius:10px;object-fit:cover;background:var(--surface2);flex-shrink:0}
    .lb-info{flex:1;min-width:0}
    .lb-name{font-size:15px;font-weight:600}
    .lb-sci{font-size:11px;color:var(--text3);font-style:italic}
    .lb-meta{font-size:11px;color:var(--text2);margin-top:3px}
    .lb-count{font-size:24px;font-weight:700;color:var(--accent);text-align:right;min-width:50px}
    .lb-count-lbl{font-size:10px;color:var(--text3);text-align:right}
    .lb-bar{height:4px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden}
    .lb-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .5s}
    .lb-play{background:var(--surface2);border:1px solid var(--border);color:var(--accent);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .lb-play:hover{background:var(--accent);color:var(--bg)}

    /* Activity Chart */
    .chart-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
    .chart-box canvas{max-height:200px}

    /* Detection Timeline */
    .timeline{display:flex;flex-direction:column;gap:6px}
    .tl-row{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:12px;font-size:13px}
    .tl-time{color:var(--text3);font-family:monospace;font-size:12px;min-width:70px;flex-shrink:0}
    .tl-img{width:36px;height:36px;border-radius:8px;object-fit:cover;background:var(--surface2);flex-shrink:0}
    .tl-name{font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tl-conf{color:var(--text2);font-size:12px;min-width:40px;text-align:right}
    .tl-play{background:none;border:none;color:var(--accent);cursor:pointer;font-size:14px;padding:4px}
    .tl-play:hover{color:var(--text)}
    .empty-state{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px}
    .empty-state .big{font-size:48px;margin-bottom:12px}

    /* Lang toggle */
    .lang-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:5px 14px;border-radius:6px;cursor:pointer;font-size:13px;text-decoration:none}
    .lang-btn:hover{background:var(--border);color:var(--text)}

    /* Bird of the Day */
    .botd-card{background:linear-gradient(135deg,var(--surface) 0%,#1a3326 50%,#12261a 100%);border:1px solid var(--border);border-radius:16px;padding:24px;display:flex;gap:24px;flex-wrap:wrap;position:relative;overflow:hidden;box-shadow:0 2px 20px rgba(74,222,128,0.06)}
    .botd-card::before{content:'';position:absolute;top:-60px;right:-60px;width:180px;height:180px;background:radial-gradient(circle,rgba(74,222,128,0.07) 0%,transparent 70%);pointer-events:none;animation:botdGlow 4s ease-in-out infinite alternate}
    .botd-card::after{content:'';position:absolute;bottom:-40px;left:-40px;width:120px;height:120px;background:radial-gradient(circle,rgba(56,189,248,0.04) 0%,transparent 70%);pointer-events:none}
    @keyframes botdGlow{0%{opacity:0.5;transform:scale(1)}100%{opacity:1;transform:scale(1.15)}}
    .botd-badge{position:absolute;top:14px;right:16px;background:linear-gradient(135deg,var(--accent),#34d399);color:var(--bg);font-size:10px;font-weight:700;padding:4px 14px;border-radius:20px;text-transform:uppercase;letter-spacing:1px;box-shadow:0 2px 8px rgba(74,222,128,0.3)}
    .botd-img{width:140px;height:140px;border-radius:14px;object-fit:cover;flex-shrink:0;background:var(--surface2);border:2px solid var(--border);transition:transform 0.4s ease,box-shadow 0.4s ease}
    .botd-card:hover .botd-img{transform:scale(1.04);box-shadow:0 4px 20px rgba(0,0,0,0.3)}
    .botd-main{flex:1;min-width:250px}
    .botd-name{font-size:24px;font-weight:700;line-height:1.2}
    .botd-sci{font-size:13px;color:var(--text3);font-style:italic;margin-top:2px}
    .botd-desc{font-size:13px;color:var(--text2);line-height:1.7;margin-top:10px}
    .botd-stats{display:flex;flex-wrap:wrap;gap:16px;margin-top:14px}
    .botd-stat{text-align:center;padding:6px 4px;border-radius:8px;transition:background 0.2s}
    .botd-stat:hover{background:rgba(74,222,128,0.06)}
    .botd-stat .v{font-size:16px;font-weight:700}
    .botd-stat .l{font-size:10px;color:var(--text3);text-transform:uppercase}
    .botd-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
    .botd-tag{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:11px;color:var(--text2);transition:border-color 0.2s}
    .botd-tag:hover{border-color:var(--accent)}
    .botd-tag b{color:var(--text)}
    .botd-fact{margin-top:12px;padding:10px 14px;background:linear-gradient(90deg,rgba(74,222,128,0.05),transparent);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;font-size:12px;color:var(--text2);line-height:1.5}
    .botd-call{margin-top:8px;font-size:12px;color:var(--accent)}
    .botd-empty{text-align:center;padding:30px;color:var(--text3);font-size:13px}
    @media(max-width:640px){.botd-card{padding:16px;gap:14px}.botd-img{width:100px;height:100px}.botd-name{font-size:20px}}

    /* Pokedex Sidebar */
    .dex-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9998;opacity:0;pointer-events:none;transition:opacity .3s}
    .dex-overlay.open{opacity:1;pointer-events:auto}
    .dex-panel{position:fixed;top:0;right:-420px;width:420px;max-width:90vw;height:100vh;background:var(--bg);border-left:1px solid var(--border);z-index:9999;transition:right .3s;display:flex;flex-direction:column}
    .dex-panel.open{right:0}
    .dex-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .dex-header h2{font-size:18px;font-weight:700}
    .dex-header .dex-count{font-size:12px;color:var(--text3)}
    .dex-close{background:none;border:none;color:var(--text3);font-size:24px;cursor:pointer;padding:4px 8px}
    .dex-close:hover{color:var(--text)}
    .dex-search{padding:10px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
    .dex-search input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:13px;font-family:inherit}
    .dex-search input:focus{outline:none;border-color:var(--accent)}
    .dex-body{flex:1;overflow-y:auto}

    /* List mode */
    .dex-list{padding:8px}
    .dex-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:background .15s}
    .dex-item:hover{background:var(--surface)}
    .dex-item.active{background:var(--surface);border-left:3px solid var(--accent)}
    .dex-item-img{width:44px;height:44px;border-radius:10px;object-fit:cover;background:var(--surface2);flex-shrink:0}
    .dex-item-info{flex:1;min-width:0}
    .dex-item-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .dex-item-sci{font-size:11px;color:var(--text3);font-style:italic}
    .dex-item-num{font-size:11px;color:var(--text3);font-family:monospace}

    /* Detail mode */
    .dex-detail{padding:20px}
    .dex-back{background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;padding:0;margin-bottom:12px}
    .dex-back:hover{text-decoration:underline}
    .dex-hero{width:100%;aspect-ratio:4/3;border-radius:14px;object-fit:cover;background:var(--surface2);margin-bottom:16px}
    .dex-detail-name{font-size:22px;font-weight:700}
    .dex-detail-sci{font-size:13px;color:var(--text3);font-style:italic;margin-top:2px}
    .dex-detail-desc{font-size:13px;color:var(--text2);line-height:1.7;margin-top:12px}
    .dex-detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
    .dex-detail-stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center}
    .dex-detail-stat .v{font-size:16px;font-weight:700}
    .dex-detail-stat .l{font-size:9px;color:var(--text3);text-transform:uppercase;margin-top:2px}
    .dex-detail-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
    .dex-detail-tag{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--text2)}
    .dex-detail-tag b{color:var(--text)}
    .dex-detail-fact{margin-top:12px;padding:10px 14px;background:var(--surface2);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;font-size:12px;color:var(--text2);line-height:1.5}
    .dex-detail-call{margin-top:8px;font-size:12px;color:var(--accent)}
    .dex-detail-obs{margin-top:14px;font-size:12px;color:var(--text3);padding-top:12px;border-top:1px solid var(--border)}

    @media(max-width:640px){.header{padding:12px 16px}.container{padding:16px 12px}.lb-row{padding:10px 12px}.lb-img{width:40px;height:40px}.summary-grid{grid-template-columns:repeat(2,1fr)}.dex-panel{width:100%;max-width:100%}}
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <h1><span class="icon">&#x1F426;</span> <span id="pageTitle">Bird Detection Log</span></h1>
      <div class="subtitle" id="pageSubtitle">BirdNET-powered real-time identification</div>
    </div>
    <div class="header-right">
      <button class="nav-btn" id="dexBtn" onclick="toggleDex()" style="font-weight:600">&#x1F4D6; <span id="dexBtnText">Field Guide</span></button>
      <div class="status" id="detectorStatus"><span class="dot off"></span> <span>--</span></div>
      <a class="lang-btn" id="langBtn" href="#">EN</a>
      <a href="/" class="nav-btn" id="dashBtn">Dashboard</a>
    </div>
  </div>

  <div class="container">
    <!-- Date Controls -->
    <div class="date-bar">
      <button class="date-btn active" id="btnToday" data-days="1">Today</button>
      <button class="date-btn" data-days="7">7 Days</button>
      <button class="date-btn" data-days="30">30 Days</button>
      <input type="date" class="date-input" id="datePicker">
    </div>

    <!-- Summary -->
    <div class="summary-grid" id="summaryGrid">
      <div class="summary-card"><div class="num" id="statTotal">--</div><div class="lbl" id="lblTotal">Detections</div></div>
      <div class="summary-card"><div class="num" id="statSpecies">--</div><div class="lbl" id="lblSpecies">Species</div></div>
      <div class="summary-card"><div class="num" id="statTop">--</div><div class="lbl" id="lblTop">Most Seen</div></div>
      <div class="summary-card"><div class="num" id="statPeak">--</div><div class="lbl" id="lblPeak">Peak Hour</div></div>
    </div>

    <!-- Bird of the Day -->
    <div class="section" id="botdSection" style="display:none">
      <div class="section-head" id="headBotd">Bird of the Day</div>
      <div id="botdContent"></div>
    </div>

    <!-- Hourly Activity -->
    <div class="section">
      <div class="section-head" id="headActivity">Hourly Activity</div>
      <div class="chart-box"><canvas id="hourlyChart"></canvas></div>
    </div>

    <!-- Leaderboard -->
    <div class="section">
      <div class="section-head" id="headLeaderboard">Species Leaderboard</div>
      <div class="lb-list" id="leaderboard"></div>
    </div>

    <!-- Timeline -->
    <div class="section">
      <div class="section-head" id="headTimeline">Detection Timeline</div>
      <div class="timeline" id="timeline"></div>
    </div>
  </div>

<script>
// ============ Language ============
let LANG = window.location.pathname.startsWith('/cn') ? 'cn' : 'en';
const T = {
  en: {
    title: 'Bird Detection Log', subtitle: 'BirdNET-powered real-time identification',
    today: 'Today', days7: '7 Days', days30: '30 Days',
    detections: 'Detections', species: 'Species', mostSeen: 'Most Seen', peakHour: 'Peak Hour',
    activity: 'Hourly Activity', leaderboard: 'Species Leaderboard', timeline: 'Detection Timeline',
    times: 'times', avgConf: 'Avg confidence', firstSeen: 'First', lastSeen: 'Last',
    noData: 'No bird detections yet', noDataSub: 'Birds will appear here when detected by the camera microphone',
    listening: 'Listening', offline: 'Offline', switchLang: '中文',
  },
  cn: {
    title: '鸟类检测日志', subtitle: 'BirdNET 实时鸟鸣识别',
    today: '今天', days7: '7天', days30: '30天',
    detections: '检测次数', species: '鸟种数', mostSeen: '最常见', peakHour: '高峰时段',
    activity: '每小时活动', leaderboard: '鸟种排行榜', timeline: '检测时间线',
    times: '次', avgConf: '平均置信度', firstSeen: '首次', lastSeen: '最后',
    noData: '暂无鸟类检测记录', noDataSub: '当摄像头麦克风检测到鸟叫声时，记录会显示在这里',
    listening: '监听中', offline: '离线', switchLang: 'EN',
  }
};
// Translation cache: loaded from server, auto-populated by Claude API
let birdTransCache = {};
async function loadTranslations() {
  try {
    const r = await fetch('/api/birds/translations');
    birdTransCache = await r.json();
  } catch {}
}

async function getBirdTranslation(en, sci) {
  if (birdTransCache[en]) return birdTransCache[en];
  // Request translation (Claude API call with server-side cache)
  try {
    const url = `/api/birds/translate/${encodeURIComponent(en)}${sci ? '?sci=' + encodeURIComponent(sci) : ''}`;
    const r = await fetch(url);
    const d = await r.json();
    if (d.cn_name) birdTransCache[en] = d;
    return d;
  } catch { return { cn_name: en, cn_desc: '' }; }
}

function birdName(en) {
  if (LANG !== 'cn') return en;
  const cached = birdTransCache[en];
  return cached ? cached.cn_name : en;
}
function birdPinyin(en) {
  if (LANG !== 'cn') return '';
  const cached = birdTransCache[en];
  return (cached && cached.cn_name_pinyin) ? cached.cn_name_pinyin : '';
}
// Name + pinyin underneath as HTML
function birdNameHtml(en) {
  const name = birdName(en);
  const py = birdPinyin(en);
  if (!py) return name;
  return `${name}<br><span style="font-size:0.65em;color:var(--text3);font-weight:normal;letter-spacing:0.5px">${py}</span>`;
}

function birdDesc(en) {
  if (LANG !== 'cn') return null;
  const cached = birdTransCache[en];
  return cached ? cached.cn_desc : null;
}

function t(key) { return T[LANG][key] || T.en[key] || key; }

function applyLang() {
  const L = T[LANG];
  document.getElementById('pageTitle').textContent = L.title;
  document.getElementById('pageSubtitle').textContent = L.subtitle;
  document.getElementById('langBtn').textContent = L.switchLang;
  document.getElementById('lblTotal').textContent = L.detections;
  document.getElementById('lblSpecies').textContent = L.species;
  document.getElementById('lblTop').textContent = L.mostSeen;
  document.getElementById('lblPeak').textContent = L.peakHour;
  document.getElementById('headActivity').childNodes[0].textContent = L.activity + ' ';
  document.getElementById('headLeaderboard').childNodes[0].textContent = L.leaderboard + ' ';
  document.getElementById('headTimeline').childNodes[0].textContent = L.timeline + ' ';
  document.querySelectorAll('.date-btn').forEach(b => {
    if (b.dataset.days === '1') b.textContent = L.today;
    if (b.dataset.days === '7') b.textContent = L.days7;
    if (b.dataset.days === '30') b.textContent = L.days30;
  });
  const cn = LANG === 'cn';
  document.getElementById('dashBtn').href = cn ? '/cn' : '/';
  document.getElementById('dashBtn').textContent = cn ? '仪表板' : 'Dashboard';
  const dexBtn = document.getElementById('dexBtnText');
  const dexTtl = document.getElementById('dexTitle');
  if (dexBtn) dexBtn.textContent = cn ? '鸟类图鉴' : 'Field Guide';
  if (dexTtl) dexTtl.textContent = cn ? '鸟类图鉴' : 'Bird Field Guide';
}
document.getElementById('langBtn').addEventListener('click', (e) => {
  e.preventDefault();
  // Navigate to the other language path
  window.location.href = LANG === 'en' ? '/cn/bird' : '/bird';
});

// ============ State ============
// Use local date, not UTC (server stores in local time)
function localDateStr(d) {
  const dd = d || new Date();
  return dd.getFullYear() + '-' + String(dd.getMonth()+1).padStart(2,'0') + '-' + String(dd.getDate()).padStart(2,'0');
}
let currentDate = localDateStr();
let currentDays = 1;
let hourlyChart = null;
const imgCache = {};

// ============ Data Loading ============
async function loadData() {
  try {
  const stats = await (await fetch(`/api/birds/stats?date=${currentDate}&days=${currentDays}`)).json();

  renderSummary(stats);
  renderHourlyChart(stats.hourly);

  // Render leaderboard — get images in parallel, don't block on failures
  try { await renderLeaderboard(stats.leaderboard); } catch (e) { console.error('leaderboard:', e); }

  // Pre-fetch translations in background (non-blocking)
  Promise.all(stats.leaderboard.map(s => getBirdTranslation(s.common_name, s.scientific_name).catch(() => {})))
    .then(() => { try { renderLeaderboard(stats.leaderboard); renderSummary(stats); } catch {} });

  // Load timeline for single day
  if (currentDays === 1) {
    try {
      const daily = await (await fetch(`/api/birds/daily/${currentDate}`)).json();
      await renderTimeline(daily.detections);
    } catch (e) { console.error('timeline:', e); }
  } else {
    document.getElementById('timeline').innerHTML = '';
  }

  // Detector status
  try {
    const st = await (await fetch('/api/birds/status')).json();
    const dot = document.querySelector('#detectorStatus .dot');
    const txt = document.querySelector('#detectorStatus span:last-child');
    dot.className = 'dot ' + (st.running ? 'on' : 'off');
    txt.textContent = st.running ? t('listening') : t('offline');
  } catch {}
  } catch (e) { console.error('loadData:', e); }
}

async function getBirdImage(name, sci) {
  const key = name + (sci || '');
  if (imgCache[key]) return imgCache[key];
  try {
    let url = `/api/birds/image/${encodeURIComponent(name)}`;
    if (sci) url += `?sci=${encodeURIComponent(sci)}`;
    const r = await fetch(url);
    const d = await r.json();
    imgCache[key] = d;
    return d;
  } catch { return { image: null, extract: '' }; }
}

// Geo detection: CN users get AllAboutBirds links, US users get recorded clips
let isFromChina = false;
fetch('https://ipapi.co/country_code/').then(r => r.text()).then(c => {
  isFromChina = c.trim() === 'CN';
}).catch(() => {});

let currentAudio = null;
let currentPlayBtn = null;
function playClip(btn, id, birdName) {
  // CN users: open AllAboutBirds page instead of playing recorded audio
  if (isFromChina && birdName) {
    const slug = birdName.replace(/['']/g, '').replace(/\s+/g, '_');
    window.open(`https://www.allaboutbirds.org/guide/${slug}/sounds`, '_blank');
    return;
  }
  // US/other: play recorded clip
  if (currentAudio && currentPlayBtn === btn) {
    currentAudio.pause();
    currentAudio = null;
    btn.innerHTML = '&#9654;';
    currentPlayBtn = null;
    return;
  }
  if (currentAudio) {
    currentAudio.pause();
    if (currentPlayBtn) currentPlayBtn.innerHTML = '&#9654;';
  }
  currentAudio = new Audio(`/api/birds/clip/${id}.mp3`);
  currentAudio.play().catch(() => {});
  currentPlayBtn = btn;
  btn.innerHTML = '&#9724;';
  currentAudio.onended = () => { btn.innerHTML = '&#9654;'; currentAudio = null; currentPlayBtn = null; };
  currentAudio.onerror = () => { btn.innerHTML = '&#9654;'; currentAudio = null; currentPlayBtn = null; };
}

async function loadBotd() {
  try {
    const res = await fetch('/api/birds/botd');

    if (!data.bird) { document.getElementById('botdSection').style.display = 'none'; return; }

    document.getElementById('botdSection').style.display = '';
    document.getElementById('headBotd').childNodes[0].textContent = (LANG === 'cn' ? '今日之鸟' : 'Bird of the Day') + ' ';

    const b = data.bird;
    const wiki = await getBirdImage(b.common_name, b.scientific_name);
    const trans = birdTransCache[b.common_name] || {};

    // Fetch detailed info from Claude
    let detail = {};
    try {
      const dr = await fetch(`/api/birds/detail/${encodeURIComponent(b.common_name)}?sci=${encodeURIComponent(b.scientific_name)}`);
      detail = await dr.json();
    } catch {}

    const cn = LANG === 'cn';
    const name = cn ? (trans.cn_name || detail.cn_name || b.common_name) : b.common_name;
    const desc = cn ? (detail.description_cn || trans.cn_desc || '') : (detail.description_en || wiki.extract || '');
    const diet = cn ? (detail.diet_cn || '') : (detail.diet || '');
    const habitat = cn ? (detail.habitat_cn || '') : (detail.habitat || '');
    const conservation = cn ? (detail.conservation_cn || '') : (detail.conservation || '');
    const funFact = cn ? (detail.fun_fact_cn || '') : (detail.fun_fact_en || '');
    const callDesc = cn ? (detail.call_desc_cn || trans.call_desc || '') : (detail.call_desc_en || trans.call_desc_en || '');
    const rarity = b.rarity_days <= 1 ? (cn ? '首次记录!' : 'First sighting!') :
                   b.rarity_days <= 3 ? (cn ? '稀有' : 'Rare') :
                   b.rarity_days <= 7 ? (cn ? '不常见' : 'Uncommon') : (cn ? '常见' : 'Common');

    document.getElementById('botdContent').innerHTML = `
      <div class="botd-card">
        <div class="botd-badge">${cn ? '今日之鸟' : 'BIRD OF THE DAY'}</div>
        ${wiki.image ? `<img class="botd-img" src="${wiki.image}" alt="${name}">` : `<div class="botd-img" style="display:flex;align-items:center;justify-content:center;font-size:48px">🐦</div>`}

          ${desc ? `<div class="botd-desc">${desc}</div>` : ''}

          <div class="botd-stats">
            <div class="botd-stat"><div class="v">${b.count}</div><div class="l">${cn ? '今日检测' : 'Today'}</div></div>
            <div class="botd-stat"><div class="v">${Math.round(b.max_conf * 100)}%</div><div class="l">${cn ? '最高置信度' : 'Best Conf.'}</div></div>
            ${detail.size_cm ? `<div class="botd-stat"><div class="v">${detail.size_cm}cm</div><div class="l">${cn ? '体长' : 'Size'}</div></div>` : ''}
            ${detail.wingspan_cm ? `<div class="botd-stat"><div class="v">${detail.wingspan_cm}cm</div><div class="l">${cn ? '翼展' : 'Wingspan'}</div></div>` : ''}
            ${detail.weight_g ? `<div class="botd-stat"><div class="v">${detail.weight_g}g</div><div class="l">${cn ? '体重' : 'Weight'}</div></div>` : ''}
            <div class="botd-stat"><div class="v" style="color:${b.rarity_days<=3?'var(--orange)':'var(--text)'}">${rarity}</div><div class="l">${cn ? '稀有度' : 'Rarity'}</div></div>
          </div>

          <div class="botd-tags">
            ${diet ? `<div class="botd-tag"><b>${cn ? '食物' : 'Diet'}:</b> ${diet}</div>` : ''}
            ${habitat ? `<div class="botd-tag"><b>${cn ? '栖息地' : 'Habitat'}:</b> ${habitat}</div>` : ''}
            ${conservation ? `<div class="botd-tag"><b>${cn ? '保护状态' : 'Status'}:</b> ${conservation}</div>` : ''}

// ============ D3.js Radial Activity Clock ============
function renderRadialChart(hourly) {
  const svg = d3.select('#radialSvg');
  svg.selectAll('*').remove();

  const box = document.getElementById('radialBox');
  const size = Math.min(box.clientWidth, 350);
  const cx = size/2, cy = size/2, R = size/2 - 40;
  svg.attr('viewBox', `0 0 ${size} ${size}`);

  const maxVal = Math.max(...hourly, 1);
  const tip = d3.select('#radialTip');

  // Background circles
  [0.25, 0.5, 0.75, 1].forEach(p => {
    svg.append('circle').attr('cx', cx).attr('cy', cy).attr('r', R*p)
      .attr('fill', 'none').attr('stroke', '#24432e').attr('stroke-width', 0.5);
  });

  // Hour labels
  for (let h = 0; h < 24; h++) {
    const angle = (h / 24) * Math.PI * 2 - Math.PI / 2;
    const lx = cx + (R + 18) * Math.cos(angle);
    const ly = cy + (R + 18) * Math.sin(angle);
    svg.append('text').attr('x', lx).attr('y', ly)
      .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
      .attr('fill', '#5a7a66').attr('font-size', 9).text(`${h}`);
  }

  // Bars
  const barWidth = Math.PI * 2 / 24;
  const arc = d3.arc().innerRadius(8).cornerRadius(2);

  svg.selectAll('.bar').data(hourly).enter().append('path')
    .attr('transform', `translate(${cx},${cy})`)
    .attr('d', (d, i) => arc({
      outerRadius: 8 + (d / maxVal) * (R - 8),
      startAngle: i * barWidth,
      endAngle: (i + 1) * barWidth - 0.02,
    }))
    .attr('fill', (d, i) => {
      const peak = hourly.indexOf(Math.max(...hourly));
      return i === peak && d > 0 ? '#f97316' : 'rgba(74,222,128,0.6)';
    })
    .style('cursor', 'pointer')
    .on('mouseover', (e, d) => {
      const i = hourly.indexOf(d) >= 0 ? hourly.indexOf(d) : 0;
      tip.style('opacity', 1)
        .html(`<b>${i}:00 - ${i+1}:00</b><br>${d} ${t('detections').toLowerCase()}`)
        .style('left', (e.offsetX + 10) + 'px').style('top', (e.offsetY - 10) + 'px');
    })
    .on('mouseout', () => tip.style('opacity', 0));

  // Center label
  const total = hourly.reduce((a, b) => a + b, 0);
  svg.append('text').attr('x', cx).attr('y', cy - 6).attr('text-anchor', 'middle')
    .attr('fill', '#e8f0e8').attr('font-size', 20).attr('font-weight', 'bold').text(total);
  svg.append('text').attr('x', cx).attr('y', cy + 12).attr('text-anchor', 'middle')
    .attr('fill', '#5a7a66').attr('font-size', 10).text(t('detections'));
}

// ============ Three.js 3D Bird Scene ============
let threeInited = false;
function initThreeScene(lb) {
  if (threeInited || typeof THREE === 'undefined') return;
  threeInited = true;

  const canvas = document.getElementById('threeCanvas');
  const W = canvas.parentElement.clientWidth, H = 350;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a1a10);
  scene.fog = new THREE.Fog(0x0a1a10, 30, 80);

  const camera = new THREE.PerspectiveCamera(60, W / H, 0.1, 200);
  camera.position.set(0, 15, 30);

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  const controls = new THREE.OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.5;
  controls.maxDistance = 60;
  controls.minDistance = 10;

  scene.add(new THREE.AmbientLight(0x4ade80, 0.3));
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(10, 20, 10);
  scene.add(dirLight);

  // Ground grid
  const gridGeo = new THREE.BufferGeometry();
  const gridPts = [];
  for (let i = -20; i <= 20; i += 2) {
    gridPts.push(-20, 0, i, 20, 0, i);
    gridPts.push(i, 0, -20, i, 0, 20);
  }
  gridGeo.setAttribute('position', new THREE.Float32BufferAttribute(gridPts, 3));
  scene.add(new THREE.LineSegments(gridGeo, new THREE.LineBasicMaterial({ color: 0x24432e, opacity: 0.4, transparent: true })));

  // Bird particles
  const birdColors = [0x4ade80, 0xf97316, 0x38bdf8, 0xfb7185, 0xa78bfa, 0xfacc15, 0x34d399, 0xef4444];

  const species = lb.length ? lb : [{ common_name: 'Waiting...', count: 20 }];

  species.forEach(function(sp, si) {
    const count = Math.min(sp.count * 5, 200);
    const positions = new Float32Array(count * 3);
    const velocities = [];

    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const radius = 5 + Math.random() * 15;
      const height = 2 + Math.random() * 12 + si * 2;
      positions[i * 3] = Math.cos(angle) * radius;
      positions[i * 3 + 1] = height;
      positions[i * 3 + 2] = Math.sin(angle) * radius;

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

    const name = birdName(sp.common_name);
    lctx.fillText(name.length > 20 ? name.slice(0,18)+'..' : name, 4, 24);

    const tex = new THREE.CanvasTexture(labelCanvas);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.9 }));
    sprite.position.set(-18 + si * 8, 16 + si, 0);
    sprite.scale.set(8, 2, 1);
    scene.add(sprite);

  function animate() {
    requestAnimationFrame(animate);
    const time = Date.now() * 0.001;
    birdGroups.forEach(function(bg) {
      for (let i = 0; i < bg.velocities.length; i++) {
        const v = bg.velocities[i];
        v.angle += v.speed;

        bg.positions[i * 3 + 1] = v.baseY + Math.sin(time * 2 + i) * 1.5;
        bg.positions[i * 3 + 2] = Math.sin(v.angle) * v.radius;
      }
      bg.points.geometry.attributes.position.needsUpdate = true;
    });
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
}

<!-- Pokedex Sidebar -->
<div class="dex-overlay" id="dexOverlay" onclick="toggleDex()"></div>
<div class="dex-panel" id="dexPanel">
  <div class="dex-header">
    <div>
      <h2 id="dexTitle">Bird Field Guide</h2>
      <div class="dex-count" id="dexCount"></div>
    </div>
    <button class="dex-close" onclick="toggleDex()">&times;</button>
  </div>
  <div class="dex-search">
    <input type="text" id="dexSearchInput" placeholder="Search species..." oninput="filterDex()">
  </div>
  <div class="dex-body" id="dexBody">
    <div class="dex-list" id="dexList"></div>
  </div>
</div>

<script>
// ============ Pokedex ============
const DLANG = window.location.pathname.startsWith('/cn') ? 'cn' : 'en';
let dexOpen = false;
let dexSpecies = []; // all species ever detected
let dexDetailCache = {};

function toggleDex() {
  dexOpen = !dexOpen;
  document.getElementById('dexOverlay').classList.toggle('open', dexOpen);
  document.getElementById('dexPanel').classList.toggle('open', dexOpen);
  if (dexOpen && !dexSpecies.length) loadDexData();
}

async function loadDexData() {
  try {
    // Load all-time stats (30 days)
    const res = await fetch(`/api/birds/stats?date=${localDateStr()}&days=30`);
    const data = await res.json();
    dexSpecies = data.leaderboard || [];

    // Pre-fetch translations
    await Promise.all(dexSpecies.map(s =>
      birdTransCache[s.common_name] ? Promise.resolve() : getBirdTranslation(s.common_name, s.scientific_name)
    ));

    const cn = DLANG === 'cn';
    document.getElementById('dexTitle').textContent = cn ? '鸟类图鉴' : 'Bird Field Guide';
    document.getElementById('dexBtnText').textContent = cn ? '鸟类图鉴' : 'Field Guide';
    document.getElementById('dexCount').textContent = `${dexSpecies.length} ${cn ? '种已记录' : 'species recorded'}`;
    document.getElementById('dexSearchInput').placeholder = cn ? '搜索鸟种...' : 'Search species...';

    renderDexList(dexSpecies);
  } catch (e) { console.error('Dex:', e); }
}

async function renderDexList(list) {
  const el = document.getElementById('dexBody');
  const cn = DLANG === 'cn';
  let html = '<div class="dex-list">';
  for (let i = 0; i < list.length; i++) {
    const sp = list[i];
    const name = birdName(sp.common_name);
    const wiki = await getBirdImage(sp.common_name, sp.scientific_name);
    const img = wiki.image
      ? `<img class="dex-item-img" src="${wiki.image}" loading="lazy">`
      : `<div class="dex-item-img" style="display:flex;align-items:center;justify-content:center;font-size:20px">🐦</div>`;
    html += `
      <div class="dex-item" onclick="showDexDetail('${sp.common_name.replace(/'/g,"\\'")}','${sp.scientific_name.replace(/'/g,"\\'")}')">
        <div class="dex-item-num">#${String(i+1).padStart(3,'0')}</div>
        ${img}
        <div class="dex-item-info">
          <div class="dex-item-name">${name}</div>
          ${birdPinyin(sp.common_name) ? `<div style="font-size:10px;color:var(--text3);letter-spacing:0.3px">${birdPinyin(sp.common_name)}</div>` : ''}
          <div class="dex-item-sci">${sp.scientific_name}</div>
        </div>
        <div style="text-align:right;font-size:12px;color:var(--text3)">${sp.count}x</div>
      </div>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

function filterDex() {
  const q = document.getElementById('dexSearchInput').value.toLowerCase();
  const filtered = dexSpecies.filter(sp => {
    const cn_name = birdTransCache[sp.common_name]?.cn_name || '';
    return sp.common_name.toLowerCase().includes(q) ||
           sp.scientific_name.toLowerCase().includes(q) ||
           cn_name.includes(q);
  });
  renderDexList(filtered);
}

async function showDexDetail(name, sci) {
  const cn = DLANG === 'cn';
  const el = document.getElementById('dexBody');
  el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3)">Loading...</div>';

  // Fetch wiki image + Claude detail in parallel
  const [wiki, detail] = await Promise.all([
    getBirdImage(name, sci),
    fetchDexDetail(name, sci),
  ]);

  const trans = birdTransCache[name] || {};
  const dName = cn ? (trans.cn_name || detail.cn_name || name) : name;
  const desc = cn ? (detail.description_cn || trans.cn_desc || '') : (detail.description_en || wiki.extract || '');
  const diet = cn ? (detail.diet_cn || '') : (detail.diet || '');
  const habitat = cn ? (detail.habitat_cn || '') : (detail.habitat || '');
  const conservation = cn ? (detail.conservation_cn || '') : (detail.conservation || '');
  const funFact = cn ? (detail.fun_fact_cn || '') : (detail.fun_fact_en || '');
  const callDesc = cn ? (detail.call_desc_cn || trans.call_desc || '') : (detail.call_desc_en || trans.call_desc_en || '');

  // Find observation stats
  const sp = dexSpecies.find(s => s.common_name === name);
  const firstSeen = sp ? new Date(sp.first_seen).toLocaleDateString(cn ? 'zh-CN' : 'en-US') : '--';
  const lastSeen = sp ? new Date(sp.last_seen).toLocaleDateString(cn ? 'zh-CN' : 'en-US') : '--';

  const soundUrl = `https://www.allaboutbirds.org/guide/${name.replace(/['']/g,'').replace(/\s+/g,'_')}/sounds`;

  el.innerHTML = `<div class="dex-detail">
    <button class="dex-back" onclick="renderDexList(dexSpecies)">&larr; ${cn ? '返回列表' : 'Back to list'}</button>
    ${wiki.image ? `<img class="dex-hero" src="${wiki.image}" alt="${dName}">` : `<div class="dex-hero" style="display:flex;align-items:center;justify-content:center;font-size:64px;background:var(--surface)">🐦</div>`}
    <div class="dex-detail-name">${dName}${(() => { const u = cn ? (wiki.url_zh||wiki.url) : wiki.url; return u ? ` <a href="${u}" target="_blank" style="font-size:13px;color:var(--accent);text-decoration:none">↗</a>` : ''; })()}</div>
    ${cn && trans.cn_name_pinyin ? `<div style="font-size:13px;color:var(--text3);margin-top:2px;letter-spacing:0.5px">${trans.cn_name_pinyin}</div>` : ''}
    <div class="dex-detail-sci">${sci}</div>
    ${desc ? `<div class="dex-detail-desc">${desc}</div>` : ''}

    <div class="dex-detail-grid">
      ${detail.size_cm ? `<div class="dex-detail-stat"><div class="v">${detail.size_cm}cm</div><div class="l">${cn ? '体长' : 'Length'}</div></div>` : ''}
      ${detail.wingspan_cm ? `<div class="dex-detail-stat"><div class="v">${detail.wingspan_cm}cm</div><div class="l">${cn ? '翼展' : 'Wingspan'}</div></div>` : ''}
      ${detail.weight_g ? `<div class="dex-detail-stat"><div class="v">${detail.weight_g}g</div><div class="l">${cn ? '体重' : 'Weight'}</div></div>` : ''}
      ${sp ? `<div class="dex-detail-stat"><div class="v">${sp.count}</div><div class="l">${cn ? '总检测' : 'Detections'}</div></div>` : ''}
      ${sp ? `<div class="dex-detail-stat"><div class="v">${Math.round(sp.avg_conf*100)}%</div><div class="l">${cn ? '平均置信度' : 'Avg Conf.'}</div></div>` : ''}
      <div class="dex-detail-stat"><div class="v"><a href="${soundUrl}" target="_blank" style="color:var(--accent);text-decoration:none">🔊</a></div><div class="l">${cn ? '叫声' : 'Call'}</div></div>
    </div>

    <div class="dex-detail-tags">
      ${diet ? `<div class="dex-detail-tag"><b>${cn ? '食物' : 'Diet'}:</b> ${diet}</div>` : ''}
      ${habitat ? `<div class="dex-detail-tag"><b>${cn ? '栖息地' : 'Habitat'}:</b> ${habitat}</div>` : ''}
      ${conservation ? `<div class="dex-detail-tag"><b>${cn ? '保护状态' : 'Status'}:</b> ${conservation}</div>` : ''}
    </div>

    ${funFact ? `<div class="dex-detail-fact">💡 ${funFact}</div>` : ''}
    ${callDesc ? `<div class="dex-detail-call">🔊 ${callDesc}</div>` : ''}

    <div class="dex-detail-obs">
      ${cn ? '首次记录' : 'First seen'}: ${firstSeen}<br>
      ${cn ? '最后记录' : 'Last seen'}: ${lastSeen}
    </div>
  </div>`;
}

async function fetchDexDetail(name, sci) {
  if (dexDetailCache[name]) return dexDetailCache[name];
  try {
    const r = await fetch(`/api/birds/detail/${encodeURIComponent(name)}?sci=${encodeURIComponent(sci)}`);
    const d = await r.json();
    if (d.common_name) dexDetailCache[name] = d;
    return d;
  } catch { return {}; }
}
</script>
