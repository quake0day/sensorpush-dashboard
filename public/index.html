<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Garden</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <style>
    :root {
      --bg: #0a1a10;
      --surface: #12261a;
      --surface2: #1a3326;
      --border: #24432e;
      --text: #e8f0e8;
      --text2: #8aaa96;
      --text3: #5a7a66;
      --accent: #4ade80;
      --orange: #f97316;
      --blue: #38bdf8;
      --purple: #a78bfa;
      --emerald: #34d399;
      --pink: #fb7185;
      --red: #ef4444;
      --green: #22c55e;
      --yellow: #facc15;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Header */
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .header-left h1 { font-size: 22px; font-weight: 700; }
    .header-left h1 .leaf { color: var(--accent); }
    .header-left .subtitle { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .weather-brief { font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
    .weather-brief .wx-emoji { font-size: 20px; }
    .weather-brief .wx-temp { color: var(--text); font-weight: 600; font-size: 15px; }
    .lang-btn, .unit-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; text-decoration: none; transition: all 0.15s; }
    .lang-btn:hover, .unit-btn:hover { background: var(--border); color: var(--text); }
    .unit-btn.active-f .f-label, .unit-btn.active-c .c-label { color: var(--accent); font-weight: 600; }
    .status { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 5px; }
    .status .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: inline-block; }
    .status.error .dot { background: var(--red); }

    /* Container */
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

    /* Garden Canvas */
    .garden-wrapper { display: flex; justify-content: center; margin-bottom: 28px; }
    .garden-frame { border: 3px solid var(--border); border-radius: 16px; overflow: hidden; background: #060e08; box-shadow: 0 4px 40px rgba(74,222,128,0.08), inset 0 0 60px rgba(0,0,0,0.3); max-width: 820px; width: 100%; }
    .garden-frame canvas { display: block; width: 100%; image-rendering: pixelated; image-rendering: -moz-crisp-edges; image-rendering: crisp-edges; }

    /* Section */
    .section { margin-bottom: 28px; }
    .section-head { font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text3); margin-bottom: 14px; padding-left: 2px; display: flex; align-items: center; gap: 8px; }
    .section-head::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Weather */
    .weather-now { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px 28px; margin-bottom: 14px; display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
    .weather-now .wx-icon { font-size: 52px; }
    .weather-now .wx-main .wx-temp-lg { font-size: 42px; font-weight: 700; }
    .weather-now .wx-main .wx-desc { font-size: 15px; color: var(--text2); margin-top: 2px; }
    .weather-now .wx-details { display: flex; gap: 20px; margin-left: auto; flex-wrap: wrap; }
    .weather-now .wx-detail { text-align: center; }
    .weather-now .wx-detail .val { font-size: 16px; font-weight: 600; }
    .weather-now .wx-detail .lbl { font-size: 11px; color: var(--text3); }
    .forecast-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(95px, 1fr)); gap: 10px; }
    .fc-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 8px; text-align: center; }
    .fc-card .fc-day { font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 600; }
    .fc-card .fc-icon { font-size: 26px; margin-bottom: 4px; }
    .fc-card .fc-temp { font-size: 18px; font-weight: 700; }
    .fc-card .fc-desc { font-size: 10px; color: var(--text3); margin-top: 4px; line-height: 1.3; }
    .fc-card.is-night { opacity: 0.65; }
    .weather-loading { color: var(--text3); font-size: 14px; padding: 20px; text-align: center; }
    .wx-summary { background: var(--surface2); border-radius: 10px; padding: 14px 18px; margin-top: 14px; font-size: 13px; color: var(--text2); line-height: 1.7; }
    .wx-extra { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .wx-extra-item { text-align: center; min-width: 70px; }
    .wx-extra-item .val { font-size: 15px; font-weight: 600; }
    .wx-extra-item .lbl { font-size: 10px; color: var(--text3); margin-top: 1px; }

    /* Sensor Cards */
    .sensor-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 16px; }
    .sensor-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .sensor-card .sensor-name { font-size: 14px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; padding: 18px 22px 0; font-weight: 600; }
    .sensor-card .readings-list { padding: 14px 22px 6px; }
    .reading-row { padding: 10px 0; border-bottom: 1px solid var(--border); }
    .reading-row:last-child { border-bottom: none; }
    .reading-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
    .reading-label { font-size: 12px; color: var(--text2); font-weight: 500; }
    .reading-value { font-size: 26px; font-weight: 700; line-height: 1; }
    .reading-value small { font-size: 14px; font-weight: 500; }
    .meter { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-bottom: 5px; }
    .meter-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
    .reading-interp { font-size: 11px; color: var(--text3); }
    .sensor-meta { font-size: 11px; color: var(--text3); padding: 10px 22px 16px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 4px; }

    /* Water Sensor */
    .water-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px 26px; display: flex; align-items: flex-start; gap: 24px; flex-wrap: wrap; }
    .water-info .water-status { font-size: 22px; font-weight: 700; }
    .water-info .water-detail { font-size: 12px; color: var(--text3); margin-top: 4px; }
    .water-normal { color: var(--green); }
    .water-alarm { color: var(--red); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
    .pond-diagram { flex-shrink: 0; }
    @keyframes water-wave { 0%,100%{d:path('M0,0 Q30,-3 60,0 Q90,3 120,0 Q150,-3 180,0 L180,5 L0,5 Z')} 50%{d:path('M0,0 Q30,3 60,0 Q90,-3 120,0 Q150,3 180,0 L180,5 L0,5 Z')} }
    @keyframes fish-swim { 0%{transform:translateX(0)} 50%{transform:translateX(12px)} 100%{transform:translateX(0)} }
    .pond-fish { animation: fish-swim 4s ease-in-out infinite; }
    .alarm-log { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 22px; margin-top: 12px; }
    .alarm-log h3 { font-size: 13px; color: var(--text2); margin-bottom: 10px; }
    .alarm-log .log-list { max-height: 180px; overflow-y: auto; }
    .log-item { display: flex; align-items: center; gap: 10px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    .log-item:last-child { border-bottom: none; }
    .log-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .log-dot.alarm { background: var(--red); }
    .log-dot.normal { background: var(--green); }
    .log-time { color: var(--text3); min-width: 150px; }
    .log-state { font-weight: 500; }
    .log-empty { color: var(--text3); font-size: 12px; }

    /* Charts */
    .chart-section { background: var(--surface); border-radius: 14px; padding: 22px; border: 1px solid var(--border); margin-bottom: 16px; }
    .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
    .chart-header h3 { font-size: 15px; font-weight: 600; }
    .time-btns { display: flex; gap: 5px; }
    .time-btns button { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.15s; }
    .time-btns button.active { background: var(--accent); color: var(--bg); font-weight: 600; border-color: var(--accent); }
    .time-btns button:hover:not(.active) { background: var(--border); }
    .chart-wrapper { position: relative; height: 280px; }

    .gateway-info { background: var(--surface); border-radius: 10px; padding: 12px 20px; border: 1px solid var(--border); margin-bottom: 14px; font-size: 12px; color: var(--text3); display: flex; gap: 20px; flex-wrap: wrap; }
    .gateway-info span { color: var(--text2); }
    .loading-msg { text-align: center; padding: 40px; color: var(--text3); font-size: 14px; }

    /* Responsive */
    @media (max-width: 640px) {
      .header { padding: 14px 16px; }
      .container { padding: 16px 12px; }
      .sensor-grid { grid-template-columns: 1fr; }
      .weather-now { padding: 16px; gap: 16px; }
      .weather-now .wx-main .wx-temp-lg { font-size: 32px; }
      .forecast-grid { grid-template-columns: repeat(auto-fit, minmax(75px, 1fr)); gap: 6px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <h1><span class="leaf">&#127793;</span> <span id="title"></span></h1>
      <div class="subtitle" id="subtitle"></div>
    </div>
    <div class="header-right">
      <div class="weather-brief" id="wxBrief"></div>
      <button class="unit-btn active-c" id="unitBtn" onclick="toggleUnit()"><span class="f-label">°F</span> / <span class="c-label">°C</span></button>
      <a class="lang-btn" id="langBtn"></a>
      <div class="status" id="status"><span class="dot"></span> <span id="statusText"></span></div>
    </div>
  </div>

  <div class="container">
    <!-- Pixel Garden -->
    <div class="garden-wrapper">
      <div class="garden-frame">
        <canvas id="gardenCanvas" width="410" height="290"></canvas>
      </div>
    </div>

    <!-- Weather -->
    <div class="section" id="weatherSection">
      <div class="section-head" id="weatherHead"></div>
      <div id="weatherNow" class="weather-loading"></div>
      <div class="forecast-grid" id="forecastGrid"></div>
    </div>

    <!-- Sensors -->
    <div class="section">
      <div class="section-head" id="sensorsHead"></div>
      <div class="gateway-info" id="gatewayInfo"></div>
      <div class="sensor-grid" id="sensorCards"><div class="loading-msg" id="sensorLoading"></div></div>
    </div>

    <!-- Water Sensor -->
    <div class="section" id="waterSection" style="display:none;">
      <div class="section-head" id="waterHead"></div>
      <div id="waterCard"></div>
      <div class="alarm-log" id="alarmLogSection" style="display:none;">
        <h3 id="alarmLogTitle"></h3>
        <div class="log-list" id="alarmLog"></div>
      </div>
    </div>

    <!-- Charts -->
    <div class="section">
      <div class="section-head" id="chartsHead"></div>
      <div class="chart-section">
        <div class="chart-header">
          <h3 id="chartTempTitle"></h3>
          <div class="time-btns" id="tempTimeBtns"></div>
        </div>
        <div class="chart-wrapper"><canvas id="tempChart"></canvas></div>
      </div>
      <div class="chart-section">
        <div class="chart-header">
          <h3 id="chartHumTitle"></h3>
          <div class="time-btns" id="humTimeBtns"></div>
        </div>
        <div class="chart-wrapper"><canvas id="humChart"></canvas></div>
      </div>
      <div class="chart-section">
        <div class="chart-header">
          <h3 id="chartPressTitle"></h3>
          <div class="time-btns" id="pressTimeBtns"></div>
        </div>
        <div class="chart-wrapper"><canvas id="pressChart"></canvas></div>
      </div>
    </div>
  </div>

<script>
// ============ Language ============
const LANG = window.location.pathname.startsWith('/cn') ? 'cn' : 'en';
const locale = LANG === 'cn' ? 'zh-CN' : 'en-US';

const T = {
  en: {
    title: 'Smart Garden',
    subtitle: 'Environmental Monitoring Dashboard',
    weather: 'Weather Forecast',
    location: 'West Chester, PA',
    sensors: 'Garden Sensors',
    water: 'Koi Pond Water Level',
    charts: 'Historical Trends',
    temperature: 'Temperature',
    humidity: 'Humidity',
    dewPoint: 'Dew Point',
    vpd: 'VPD',
    pressure: 'Barometric Pressure',
    battery: 'Battery',
    signal: 'Signal',
    updated: 'Updated',
    connecting: 'Connecting...',
    connected: 'Connected',
    loadingSensor: 'Loading sensors...',
    loadingWeather: 'Loading weather...',
    noSensors: 'No sensors found',
    noEvents: 'No events in the last 24 hours',
    pondLow: 'LOW - Refill needed',
    pondCritical: 'CRITICAL - Refill immediately!',
    pondNormal: 'Water level OK',
    pondDesc: 'Dual-probe sensor: white probe (shallow) & black probe (deep)',
    alarmHistory: 'Pond Level Alert History (24h)',
    sensorReading: 'Sensor',
    forecastReading: 'Forecast',
    switchLang: '中文',
    switchUrl: '/cn',
    wind: 'Wind',
    humLabel: 'Humidity',
    h: ['1H','6H','24H','3D','7D'],
    tempInterp(c) {
      if (c < 0) return 'Freezing - protect your plants!';
      if (c < 10) return 'Cold - most plants dormant';
      if (c < 18) return 'Cool - good for cool-season crops';
      if (c < 26) return 'Ideal growing temperature';
      if (c < 32) return 'Warm - water plants more often';
      if (c < 38) return 'Hot - provide shade for plants';
      return 'Extreme heat - plants at risk!';
    },
    humInterp(h) {
      if (h < 30) return 'Very dry - increase watering';
      if (h < 40) return 'Dry - monitor soil moisture';
      if (h < 60) return 'Comfortable for most plants';
      if (h < 70) return 'Humid - watch for fungal issues';
      return 'Very humid - risk of mold/mildew';
    },
    vpdInterp(v) {
      if (v < 0.4) return 'Low - risk of mold on leaves';
      if (v < 0.8) return 'Good for seedlings & clones';
      if (v < 1.2) return 'Ideal for vegetative growth';
      if (v < 1.6) return 'Good for flowering plants';
      return 'High - plants may be stressed';
    },
    pressInterp(p) {
      if (p < 1000) return 'Low pressure - storms likely';
      if (p < 1013) return 'Below normal - weather changing';
      if (p < 1023) return 'Normal atmospheric pressure';
      if (p < 1040) return 'High pressure - clear skies';
      return 'Very high pressure';
    },
    dpInterp(d) {
      if (d < 10) return 'Dry and comfortable air';
      if (d < 16) return 'Pleasant conditions';
      if (d < 18) return 'Slightly muggy';
      if (d < 21) return 'Humid and uncomfortable';
      return 'Oppressive humidity';
    },
    gardenSummary(tc, hum, dp, vpd, press, wxDesc) {
      const parts = [];
      // Temperature
      if (tc < 0) parts.push('freezing conditions with frost risk');
      else if (tc < 10) parts.push('cold weather, most plants are dormant');
      else if (tc < 18) parts.push('cool temperatures, favorable for cool-season crops');
      else if (tc < 26) parts.push('ideal growing temperatures for most plants');
      else if (tc < 32) parts.push('warm conditions, remember to water more frequently');
      else parts.push('hot weather, plants need shade and extra water');
      // Humidity + dew point combined
      if (hum < 40) parts.push('The air is dry' + (dp < 10 ? ' and comfortable' : '') + ', keep an eye on soil moisture.');
      else if (hum < 60) parts.push('Humidity is in the comfortable range for most plants.');
      else parts.push('It\'s quite humid' + (dp > 18 ? ' and muggy' : '') + ', watch for fungal issues.');
      // VPD
      if (vpd < 0.4) parts.push('VPD is low, which could promote mold on foliage.');
      else if (vpd < 0.8) parts.push('VPD is good for seedlings, cuttings, and propagation.');
      else if (vpd < 1.2) parts.push('VPD is in the ideal range for healthy vegetative growth.');
      else if (vpd < 1.6) parts.push('VPD is well-suited for flowering and fruiting plants.');
      else parts.push('VPD is high, plants may show signs of water stress.');
      // Pressure
      if (press < 1000) parts.push('Low barometric pressure suggests storms may be approaching.');
      else if (press < 1013) parts.push('Pressure is below normal, the weather may be changing.');
      else if (press < 1023) parts.push('Atmospheric pressure is stable.');
      else parts.push('High pressure indicates clear skies ahead.');
      return 'Currently ' + wxDesc.toLowerCase() + ' with ' + parts[0] + ' ' + parts.slice(1).join(' ');
    },
  },
  cn: {
    title: '智慧花园',
    subtitle: '环境监测仪表板',
    weather: '天气预报',
    location: '宾州 西切斯特',
    sensors: '花园传感器',
    water: '锦鲤鱼塘水位',
    charts: '历史趋势',
    temperature: '温度',
    humidity: '湿度',
    dewPoint: '露点',
    vpd: 'VPD 蒸气压差',
    pressure: '气压',
    battery: '电量',
    signal: '信号',
    updated: '更新于',
    connecting: '连接中...',
    connected: '已连接',
    loadingSensor: '加载传感器中...',
    loadingWeather: '加载天气中...',
    noSensors: '未找到传感器',
    noEvents: '过去24小时无事件',
    pondLow: '偏低 - 需要加水',
    pondCritical: '严重偏低 - 必须立即加水！',
    pondNormal: '水位正常',
    pondDesc: '双探头传感器：白色探头（浅水位）& 黑色探头（深水位）',
    alarmHistory: '鱼塘水位报警记录（24小时）',
    sensorReading: '传感器',
    forecastReading: '预报',
    switchLang: 'EN',
    switchUrl: '/',
    wind: '风速',
    humLabel: '湿度',
    h: ['1时','6时','24时','3天','7天'],
    tempInterp(c) {
      if (c < 0) return '冰冻 - 请保护植物！';
      if (c < 10) return '寒冷 - 大多数植物休眠';
      if (c < 18) return '凉爽 - 适合冷季作物';
      if (c < 26) return '理想生长温度';
      if (c < 32) return '温暖 - 需增加浇水频率';
      if (c < 38) return '炎热 - 请为植物遮阳';
      return '极端高温 - 植物有危险！';
    },
    humInterp(h) {
      if (h < 30) return '非常干燥 - 需增加浇水';
      if (h < 40) return '偏干 - 注意土壤湿度';
      if (h < 60) return '大多数植物适宜';
      if (h < 70) return '潮湿 - 注意真菌病害';
      return '非常潮湿 - 霉菌风险';
    },
    vpdInterp(v) {
      if (v < 0.4) return '偏低 - 叶片有霉菌风险';
      if (v < 0.8) return '适合扦插育苗';
      if (v < 1.2) return '植物营养生长理想范围';
      if (v < 1.6) return '适合开花期植物';
      return '偏高 - 植物可能缺水胁迫';
    },
    pressInterp(p) {
      if (p < 1000) return '低气压 - 可能有暴风雨';
      if (p < 1013) return '偏低 - 天气可能变化';
      if (p < 1023) return '正常气压';
      if (p < 1040) return '高气压 - 晴朗天气';
      return '气压极高';
    },
    dpInterp(d) {
      if (d < 10) return '干燥舒适';
      if (d < 16) return '宜人舒适';
      if (d < 18) return '略微闷热';
      if (d < 21) return '潮湿不适';
      return '闷热难耐';
    },
    gardenSummary(tc, hum, dp, vpd, press, wxDesc) {
      const parts = [];
      // 温度
      if (tc < 0) parts.push('气温在冰点以下，注意防冻');
      else if (tc < 10) parts.push('天气寒冷，大多数植物处于休眠状态');
      else if (tc < 18) parts.push('气温凉爽，适合冷季作物生长');
      else if (tc < 26) parts.push('气温适宜，是大多数植物的理想生长温度');
      else if (tc < 32) parts.push('天气温暖，需要适当增加浇水频率');
      else parts.push('天气炎热，植物需要遮阳和充足水分');
      // 湿度+露点
      if (hum < 40) parts.push('空气' + (dp < 10 ? '干燥舒适' : '偏干') + '，需关注土壤湿度');
      else if (hum < 60) parts.push('空气湿度适中，对大多数植物比较友好');
      else parts.push('空气' + (dp > 18 ? '潮湿闷热' : '湿度偏高') + '，注意预防真菌病害');
      // VPD
      if (vpd < 0.4) parts.push('蒸气压差偏低，叶面容易滋生霉菌');
      else if (vpd < 0.8) parts.push('蒸气压差适合扦插育苗');
      else if (vpd < 1.2) parts.push('蒸气压差处于植物营养生长的理想区间');
      else if (vpd < 1.6) parts.push('蒸气压差适合开花结果期植物');
      else parts.push('蒸气压差偏高，植物可能出现缺水胁迫');
      // 气压
      if (press < 1000) parts.push('气压偏低，可能有暴风雨来临。');
      else if (press < 1013) parts.push('气压略低于正常值，天气可能有变化。');
      else if (press < 1023) parts.push('气压稳定正常。');
      else parts.push('高气压，预计天气晴朗。');
      return '当前' + wxDesc + '。' + parts.join('，').replace(/，([^，]*)$/, '。$1');
    },
  }
}[LANG];

const COLORS = ["#f97316","#38bdf8","#a78bfa","#34d399","#fb7185","#facc15","#818cf8","#2dd4bf"];
let useF = false; // default Celsius
function tempF2C(f) { return (f - 32) * 5 / 9; }
function inHgToHPa(inHg) { return inHg * 33.8639; }
function fToC(f) { return ((f - 32) * 5 / 9).toFixed(0); }
function displayTemp(cVal, fVal) {
  // cVal = celsius number, fVal = fahrenheit number (optional)
  if (useF) return fVal !== undefined ? Math.round(fVal) + '°F' : ((cVal * 9/5) + 32).toFixed(0) + '°F';
  return (typeof cVal === 'number' ? cVal.toFixed(1) : cVal) + '°C';
}
function displayTempShort(fVal) {
  // For forecast cards (NWS gives F)
  if (useF) return Math.round(fVal) + '°';
  return fToC(fVal) + '°';
}
function clamp(v, min=0, max=100) { return Math.max(min, Math.min(max, v)); }

function toggleUnit() {
  useF = !useF;
  const btn = document.getElementById('unitBtn');
  btn.className = 'unit-btn ' + (useF ? 'active-f' : 'active-c');

async function api(method, path, body) {
  const opts = { method, headers: { "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (!res.ok) throw new Error(`${res.status}`);
  return res.json();
}

function setStatus(ok, msg) {
  const el = document.getElementById("status");
  el.className = ok ? "status" : "status error";
  document.getElementById("statusText").textContent = msg;
}

function wxEmoji(text) {
  if (!text) return '🌤';
  const t = text.toLowerCase();
  if (t.includes('thunder') || t.includes('storm')) return '⛈';
  if (t.includes('snow') || t.includes('flurr') || t.includes('blizzard')) return '❄';
  if (t.includes('rain') || t.includes('shower') || t.includes('drizzle')) return '🌧';
  if (t.includes('fog') || t.includes('haz') || t.includes('mist')) return '🌫';
  if (t.includes('wind')) return '💨';
  if (t.includes('partly cloudy') || t.includes('partly sunny') || t.includes('mostly cloudy')) return '⛅';
  if (t.includes('cloudy') || t.includes('overcast')) return '☁';
  if (t.includes('sunny') || t.includes('clear')) return '☀';
  return '🌤';

// Translate NWS weather text to Chinese
const WX_CN = {
  'Sunny': '晴', 'Clear': '晴朗', 'Mostly Clear': '大部晴朗', 'Mostly Sunny': '大部晴天',
  'Partly Cloudy': '局部多云', 'Partly Sunny': '局部晴天', 'Mostly Cloudy': '大部多云',
  'Cloudy': '多云', 'Overcast': '阴天',
  'Light Rain': '小雨', 'Rain': '雨', 'Heavy Rain': '大雨', 'Showers': '阵雨',
  'Rain Showers': '阵雨', 'Slight Chance Light Rain': '可能有小雨',
  'Chance Light Rain': '可能有小雨', 'Light Rain Likely': '很可能有小雨',
  'Rain Likely': '很可能下雨', 'Chance Rain Showers': '可能有阵雨',
  'Slight Chance Rain Showers': '可能有阵雨',
  'Thunderstorms': '雷暴', 'Chance Thunderstorms': '可能有雷暴',
  'Snow': '雪', 'Light Snow': '小雪', 'Heavy Snow': '大雪', 'Flurries': '飘雪',
  'Chance Snow': '可能有雪', 'Slight Chance Snow': '可能有雪',
  'Fog': '雾', 'Haze': '霾', 'Mist': '薄雾',
  'Windy': '大风', 'Breezy': '微风',
  'Hot': '酷热', 'Cold': '寒冷',
};
// Day names
const DAY_CN = {
  'Today': '今天', 'Tonight': '今晚', 'This Afternoon': '今天下午',
  'Monday': '周一', 'Tuesday': '周二', 'Wednesday': '周三', 'Thursday': '周四',
  'Friday': '周五', 'Saturday': '周六', 'Sunday': '周日',
  'Monday Night': '周一夜', 'Tuesday Night': '周二夜', 'Wednesday Night': '周三夜',
  'Thursday Night': '周四夜', 'Friday Night': '周五夜', 'Saturday Night': '周六夜',
  'Sunday Night': '周日夜', 'Overnight': '夜间',
};
function translateWx(text) {
  if (LANG !== 'cn' || !text) return text;
  // Try exact match first
  if (WX_CN[text]) return WX_CN[text];
  // Try composite: "Partly Sunny then Slight Chance Light Rain"
  if (text.includes(' then ')) {
    const parts = text.split(' then ');
    return parts.map(p => WX_CN[p.trim()] || p).join('转');
  }
  // Partial match
  let result = text;
  const sorted = Object.keys(WX_CN).sort((a, b) => b.length - a.length);
  for (const en of sorted) {
    if (result.includes(en)) result = result.replace(en, WX_CN[en]);
  }
  return result;
}
function translateDay(name) {
  if (LANG !== 'cn' || !name) return name;
  return DAY_CN[name] || name;
}
}

// ============ Pixel Garden ============
function renderGarden() {
  const canvas = document.getElementById('gardenCanvas');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  const blocksImg = new Image();
  const miscImg = new Image();
  let loaded = 0;

  function onLoad() {
    loaded++;
    if (loaded < 2) return;

    const W = canvas.width;
    const H = canvas.height;

    // Sky gradient
    const sky = ctx.createLinearGradient(0, 0, 0, H * 0.45);
    sky.addColorStop(0, '#0c1a2e');
    sky.addColorStop(1, '#0a1a10');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // Ground area gradient
    const gnd = ctx.createLinearGradient(0, H * 0.45, 0, H);
    gnd.addColorStop(0, '#0a1a10');
    gnd.addColorStop(1, '#081208');
    ctx.fillStyle = gnd;
    ctx.fillRect(0, H * 0.45, W, H * 0.55);

    // Draw stars
    ctx.fillStyle = '#ffffff';
    const stars = [[30,15],[85,8],[150,22],[250,12],[320,28],[370,6],[55,35],[195,5],[290,32],[400,18]];
    stars.forEach(([x,y]) => {
      ctx.globalAlpha = 0.3 + Math.random() * 0.5;
      ctx.fillRect(x, y, 1, 1);
    });
    ctx.globalAlpha = 1;

    // Tile constants
    const TW = 36, TH = 38, HALF = 18, VSTEP = 10;
    const originX = W / 2 + 5;
    const originY = 108;

    // Tile sprite positions in blocks.png (col, row in spritesheet)
    const TILE = {
      G:  [0, 0],    // plain grass
      GF: [36, 0],   // grass + flower
      GT: [72, 0],   // grass + tuft
      GS: [108, 0],  // grass + sprout
      GM: [144, 0],  // grass + mushroom
      GW: [180, 0],  // grass + weed
      W:  [0, 116],  // water
      WR: [36, 116], // water ripple
      WL: [36, 152], // water lily
      WK: [0, 152],  // water rock
    };

    // Garden map (7 cols x 5 rows)
    const MAP = [
      ['G','GF','G','G','G','GT','G'],
      ['G','GT','GF','W','W','G','G'],
      ['GF','G','W','WL','W','G','GS'],
      ['G','G','GS','W','GF','GT','G'],
      ['G','GT','GF','G','G','GF','G'],
    ];

    // Draw isometric ground
    for (let row = 0; row < MAP.length; row++) {
      for (let col = 0; col < MAP[row].length; col++) {
        const tile = TILE[MAP[row][col]];
        const sx = originX + (col - row) * HALF;
        const sy = originY + (col + row) * VSTEP;
        ctx.drawImage(blocksImg, tile[0], tile[1], TW, TH, sx - HALF, sy, TW, TH);
      }
    }

    // Helper: grid position to screen
    function gToS(col, row) {
      return [originX + (col - row) * HALF, originY + (col + row) * VSTEP];
    }

    // Draw decorations from misc.png
    // Large green tree (back-left) - sprite approx at (88, 178, 118, 130)
    const [tx, ty] = gToS(0, 1);
    ctx.drawImage(miscImg, 88, 178, 118, 130, tx - 70, ty - 118, 118, 130);

    // Autumn tree (back-right) - sprite approx at (213, 188, 52, 112)
    const [ax, ay] = gToS(6, 0);
    ctx.drawImage(miscImg, 213, 188, 52, 112, ax - 22, ay - 96, 52, 112);

    // Bushes - sprite approx at (238, 86, 46, 36)
    const [bx, by] = gToS(5, 1);
    ctx.drawImage(miscImg, 238, 86, 46, 36, bx - 18, by - 24, 46, 36);

    // Small bush - approx (290, 100, 30, 24)
    const [b2x, b2y] = gToS(0, 3);
    ctx.drawImage(miscImg, 290, 100, 30, 24, b2x - 24, b2y - 14, 30, 24);

    // Bench - sprite approx at (4, 78, 60, 34)
    const [bex, bey] = gToS(5, 3);
    ctx.drawImage(miscImg, 4, 78, 60, 34, bex - 26, bey - 22, 60, 34);

    // Flowers from misc.png (row of small flowers near top of sheet)
    // Red flower approx (96, 4, 10, 16)
    const flowerSprites = [
      [96, 4, 10, 16],   // red
      [110, 4, 10, 16],  // yellow
      [124, 4, 10, 16],  // orange
      [138, 4, 10, 16],  // pink
      [152, 4, 10, 16],  // blue
      [166, 4, 10, 16],  // purple
      [180, 4, 10, 16],  // white
    ];

    // Place flowers at specific grid positions
    const flowerPositions = [
      { grid: [3, 4], fi: 0 },
      { grid: [1, 4], fi: 1 },
      { grid: [4, 4], fi: 3 },
      { grid: [6, 2], fi: 4 },
      { grid: [6, 3], fi: 5 },
      { grid: [2, 0], fi: 2 },
      { grid: [4, 0], fi: 6 },
    ];
    flowerPositions.forEach(fp => {
      const [fx, fy] = gToS(fp.grid[0], fp.grid[1]);
      const fs = flowerSprites[fp.fi];
      ctx.drawImage(miscImg, fs[0], fs[1], fs[2], fs[3], fx - 5, fy - 10, fs[2], fs[3]);
    });

    // Small rocks - approx (50, 128, 18, 12)
    const [rx, ry] = gToS(1, 3);
    ctx.drawImage(miscImg, 50, 128, 18, 12, rx - 6, ry + 2, 18, 12);

    // Fence section - approx (2, 2, 18, 52)
    const [fex, fey] = gToS(0, 0);
    ctx.drawImage(miscImg, 2, 2, 18, 52, fex - 24, fey - 40, 18, 52);

    // Mushroom pair - approx (198, 150, 26, 18)
    const [mx, my] = gToS(4, 3);
    ctx.drawImage(miscImg, 198, 150, 26, 18, mx - 10, my - 8, 26, 18);
  }

  blocksImg.onload = onLoad;
  miscImg.onload = onLoad;
  blocksImg.src = '/garden/blocks.png';
  miscImg.src = '/garden/misc.png';
}

// ============ Weather ============
async function loadWeather() {
  try {
    const data = await api('GET', '/api/weather');
    if (!data.forecast || !data.forecast.length) {
      document.getElementById('weatherNow').innerHTML = '<div class="weather-loading">Weather data unavailable</div>';
      return;
    }

    const current = data.hourly && data.hourly[0] ? data.hourly[0] : data.forecast[0];
    const fxTempF = current.temperature;
    const fxTempC = fToC(fxTempF);
    const fxHum = current.relativeHumidity?.value || '--';
    const desc = current.shortForecast;
    const emoji = wxEmoji(desc);

    // Get sensor readings for main display
    const sensorIds = Object.keys(sensorsData);
    let sensorTempC = null, sensorHum = null, sensorDp = null, sensorVpd = null, sensorPress = null;
    if (sensorIds.length) {
      const s = sensorsData[sensorIds[0]];
      if (s.temperature !== undefined) sensorTempC = tempF2C(s.temperature);
      if (s.humidity !== undefined) sensorHum = s.humidity;
      if (s.dewpoint !== undefined) sensorDp = tempF2C(s.dewpoint);
      if (s.vpd !== undefined) sensorVpd = s.vpd;
      if (s.barometric_pressure !== undefined) sensorPress = inHgToHPa(s.barometric_pressure);
    }
    const sensorTempF = sensorTempC !== null ? sensorTempC * 9/5 + 32 : null;
    const sensorDpF = sensorDp !== null ? sensorDp * 9/5 + 32 : null;
    const stcDisp = sensorTempC !== null ? displayTemp(sensorTempC, sensorTempF) : '--';
    const shum = sensorHum !== null ? sensorHum.toFixed(1) : '--';
    const sdpDisp = sensorDp !== null ? displayTemp(sensorDp, sensorDpF) : '--';
    const svpd = sensorVpd !== null ? sensorVpd.toFixed(2) : '--';
    const spress = sensorPress !== null ? sensorPress.toFixed(0) : '--';
    const descTr = translateWx(desc);

    // Generate natural language summary
    let summaryHTML = '';
    if (sensorTempC !== null && sensorHum !== null && sensorDp !== null && sensorVpd !== null && sensorPress !== null) {
      summaryHTML = `<div class="wx-summary">${T.gardenSummary(sensorTempC, sensorHum, sensorDp, sensorVpd, sensorPress, descTr)}</div>`;
    }

    const fxDisp = useF ? `${fxTempF}°F` : `${fxTempC}°C`;
    const fxAlt = useF ? `(${fxTempC}°C)` : `(${fxTempF}°F)`;

    // Header brief: sensor temp + weather icon
    document.getElementById('wxBrief').innerHTML =
      `<span class="wx-emoji">${emoji}</span> <span class="wx-temp">${stcDisp}</span>`;

    // Current weather card
    document.getElementById('weatherNow').innerHTML = `
      <div class="weather-now">
        <div class="wx-icon">${emoji}</div>
        <div class="wx-main">
          <div class="wx-temp-lg" style="color:var(--orange)">${stcDisp}</div>
          <div class="wx-desc">${descTr}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:4px;">${T.forecastReading}: ${fxDisp} ${fxAlt}</div>
        </div>
        <div class="wx-details">
          <div class="wx-detail">
            <div class="val" style="color:var(--blue)">${shum}%</div>
            <div class="lbl">${T.humLabel}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px;">${T.forecastReading}: ${fxHum}%</div>
          </div>
          <div class="wx-detail">
            <div class="val">${current.windSpeed || '--'}</div>
            <div class="lbl">${T.wind}</div>
          </div>
        </div>
        <div class="wx-extra">
          <div class="wx-extra-item"><div class="val" style="color:var(--purple)">${sdpDisp}</div><div class="lbl">${T.dewPoint}</div></div>
          <div class="wx-extra-item"><div class="val" style="color:var(--emerald)">${svpd} kPa</div><div class="lbl">${T.vpd}</div></div>
          <div class="wx-extra-item"><div class="val" style="color:var(--pink)">${spress} hPa</div><div class="lbl">${T.pressure}</div></div>
        </div>
      </div>
      ${summaryHTML}`;

    // Forecast cards (show day periods, first 10)
    const periods = data.forecast.slice(0, 10);
    document.getElementById('forecastGrid').innerHTML = periods.map(p => {
      const isNight = p.isDaytime === false;
      return `<div class="fc-card${isNight ? ' is-night' : ''}">

        <div class="fc-icon">${wxEmoji(p.shortForecast)}</div>
        <div class="fc-temp">${displayTempShort(p.temperature)}</div>
        <div class="fc-desc">${translateWx(p.shortForecast)}</div>

    }).join('');

  } catch (e) {
    console.error('weather:', e);
    document.getElementById('weatherNow').innerHTML = '<div class="weather-loading">Weather unavailable</div>';
  }
}

// ============ Sensor Cards ============
let sensorsData = {};

function meterPct(type, val) {
  switch(type) {
    case 'temp': return clamp((val + 10) / 55 * 100);
    case 'hum': return clamp(val);
    case 'vpd': return clamp(val / 3 * 100);
    case 'press': return clamp((val - 980) / 70 * 100);
    case 'dp': return clamp((val + 5) / 35 * 100);
  }
  return 50;
}

function meterColor(type, val) {
  switch(type) {
    case 'temp':
      if (val >= 18 && val <= 26) return 'var(--green)';
      if (val >= 10 && val <= 32) return 'var(--yellow)';
      return 'var(--red)';
    case 'hum':
      if (val >= 40 && val <= 60) return 'var(--green)';
      if (val >= 30 && val <= 70) return 'var(--yellow)';
      return 'var(--red)';
    case 'vpd':
      if (val >= 0.8 && val <= 1.2) return 'var(--green)';
      if (val >= 0.4 && val <= 1.6) return 'var(--yellow)';
      return 'var(--red)';
    case 'press':
      if (val >= 1010 && val <= 1025) return 'var(--green)';
      if (val >= 1000 && val <= 1040) return 'var(--yellow)';
      return 'var(--red)';
    case 'dp':
      if (val >= 10 && val <= 18) return 'var(--green)';
      if (val >= 5 && val <= 21) return 'var(--yellow)';
      return 'var(--red)';
  }
  return 'var(--text3)';
}

function readingHTML(label, value, unit, color, type, rawVal, interpFn) {
  const pct = meterPct(type, rawVal);
  const mc = meterColor(type, rawVal);
  const interp = interpFn(rawVal);
  return `<div class="reading-row">
    <div class="reading-top">
      <span class="reading-label">${label}</span>
      <span class="reading-value" style="color:${color}">${value}<small>${unit}</small></span>
    </div>
    <div class="meter"><div class="meter-fill" style="width:${pct}%;background:${mc}"></div></div>
    <div class="reading-interp">${interp}</div>
  </div>`;
}

function renderSensors(sensors) {
  const container = document.getElementById("sensorCards");
  const ids = Object.keys(sensors);
  if (!ids.length) { container.innerHTML = `<div class="loading-msg">${T.noSensors}</div>`; return; }

  container.innerHTML = ids.map(id => {
    const s = sensors[id];
    const tc = s.temperature !== undefined ? tempF2C(s.temperature) : null;
    const hum = s.humidity;
    const dp = s.dewpoint !== undefined ? tempF2C(s.dewpoint) : null;
    const vpd = s.vpd;
    const press = s.barometric_pressure !== undefined ? inHgToHPa(s.barometric_pressure) : null;
    const updated = s.last_update ? new Date(s.last_update).toLocaleString(locale) : '--';

    const tempUnit = useF ? '°F' : '°C';
    const tempVal = useF ? (tc !== null ? (tc*9/5+32).toFixed(1) : null) : (tc !== null ? tc.toFixed(1) : null);
    const dpVal = useF ? (dp !== null ? (dp*9/5+32).toFixed(1) : null) : (dp !== null ? dp.toFixed(1) : null);

    let readings = '';
    if (tc !== null) readings += readingHTML(T.temperature, tempVal, tempUnit, 'var(--orange)', 'temp', tc, T.tempInterp);
    if (hum !== undefined) readings += readingHTML(T.humidity, hum.toFixed(1), '%', 'var(--blue)', 'hum', hum, T.humInterp);
    if (dp !== null) readings += readingHTML(T.dewPoint, dpVal, tempUnit, 'var(--purple)', 'dp', dp, T.dpInterp);
    if (vpd !== undefined) readings += readingHTML(T.vpd, vpd.toFixed(2), ' kPa', 'var(--emerald)', 'vpd', vpd, T.vpdInterp);
    if (press !== null) readings += readingHTML(T.pressure, press.toFixed(1), ' hPa', 'var(--pink)', 'press', press, T.pressInterp);

    return `<div class="sensor-card">
      <div class="sensor-name">${s.name || id}</div>
      <div class="readings-list">${readings}</div>
      <div class="sensor-meta">
        <span>${T.battery}: ${s.battery_voltage ? s.battery_voltage + 'V' : '--'}</span>
        <span>${T.signal}: ${s.rssi || '--'} dBm</span>
        <span>${T.updated}: ${updated}</span>
      </div>
    </div>`;
  }).join('');
}

// ============ Tuya / Koi Pond Water Level ============
function renderWaterSensor(devices) {
  const ws = devices.find(d => d.type === 'water_sensor');
  if (!ws) return;
  document.getElementById('waterSection').style.display = '';
  const statusMap = {};
  (ws.status || []).forEach(s => statusMap[s.code] = s.value);

  // Dual probe mapping (from v2 thing model):
  //   watersensor_state (DP1) = right probe = black = deep position
  //   tamper_alarm (DP5)      = left probe  = white = shallow position
  const leftAlarm = statusMap.tamper_alarm === true;          // white/shallow
  const rightAlarm = statusMap.watersensor_state === 'alarm'; // black/deep
  const battery = statusMap.battery_percentage;
  const online = ws.online;
  const updated = ws.update_time ? new Date(ws.update_time * 1000).toLocaleString(locale) : '--';

  let statusText, statusClass;
  if (rightAlarm && leftAlarm) {
    statusText = T.pondCritical; statusClass = 'water-alarm';
  } else if (rightAlarm || leftAlarm) {
    statusText = T.pondLow; statusClass = 'water-alarm';
  } else {
    statusText = T.pondNormal; statusClass = 'water-normal';
  }

  const probeWhiteOk = !leftAlarm;
  const probeBlackOk = !rightAlarm;

  // Water level Y positions in SVG (pond area 40-190)
  // White probe at y=85, Black probe at y=140
  // Water level depends on probe states
  let waterY;
  if (!rightAlarm && !leftAlarm) waterY = 58;   // above both → high
  else if (!rightAlarm && leftAlarm) waterY = 108; // between probes → medium
  else waterY = 165;                               // below both → critical

  const waterColor = waterY < 80 ? '#1e6091' : waterY < 130 ? '#b45309' : '#991b1b';
  const waterColorLight = waterY < 80 ? '#2980b9' : waterY < 130 ? '#d97706' : '#dc2626';
  const levelLabel = LANG === 'cn'
    ? (waterY < 80 ? '水位正常' : waterY < 130 ? '水位偏低' : '水位极低')
    : (waterY < 80 ? 'Normal' : waterY < 130 ? 'Low' : 'Critical');

  const whiteLabel = LANG === 'cn' ? '白' : 'W';
  const blackLabel = LANG === 'cn' ? '黑' : 'B';
  const shallowTxt = LANG === 'cn' ? '浅水位' : 'Shallow';
  const deepTxt = LANG === 'cn' ? '深水位' : 'Deep';

  // SVG pond diagram
  const svg = `<svg class="pond-diagram" viewBox="0 0 240 220" width="240" height="220" xmlns="http://www.w3.org/2000/svg">
    <!-- Pond background -->
    <defs>
      <linearGradient id="pondBg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#0c2d1a"/>
        <stop offset="100%" stop-color="#071a0e"/>
      </linearGradient>
      <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${waterColorLight}" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="${waterColor}" stop-opacity="0.8"/>
      </linearGradient>
      <clipPath id="pondClip"><rect x="30" y="40" width="180" height="155" rx="10"/></clipPath>
    </defs>

    <!-- Pond container -->
    <rect x="30" y="40" width="180" height="155" rx="10" fill="url(#pondBg)" stroke="#24432e" stroke-width="2"/>

    <!-- Water fill -->
    <g clip-path="url(#pondClip)">
      <rect x="30" y="${waterY}" width="180" height="${195 - waterY}" fill="url(#waterGrad)"/>
      <!-- Water surface wave -->
      <g transform="translate(30,${waterY - 2})">
        <path d="M0,0 Q30,-3 60,0 Q90,3 120,0 Q150,-3 180,0 L180,5 L0,5 Z" fill="${waterColorLight}" opacity="0.3">
          <animate attributeName="d" dur="3s" repeatCount="indefinite"
            values="M0,0 Q30,-3 60,0 Q90,3 120,0 Q150,-3 180,0 L180,5 L0,5 Z;
                    M0,0 Q30,3 60,0 Q90,-3 120,0 Q150,3 180,0 L180,5 L0,5 Z;
                    M0,0 Q30,-3 60,0 Q90,3 120,0 Q150,-3 180,0 L180,5 L0,5 Z"/>
        </path>
      </g>

      <!-- Koi fish (only if water exists) -->
      ${waterY < 160 ? `
      <g class="pond-fish" transform="translate(${waterY < 100 ? 70 : 80},${Math.max(waterY + 25, 120)})">
        <ellipse cx="0" cy="0" rx="14" ry="6" fill="#e8945a"/>
        <ellipse cx="-3" cy="-1" rx="5" ry="3" fill="#fff" opacity="0.4"/>
        <polygon points="14,-1 20,-6 20,4" fill="#d97730"/>
        <circle cx="-8" cy="-2" r="1.5" fill="#1a1a1a"/>
      </g>
      <g class="pond-fish" style="animation-delay:-2s;animation-direction:reverse" transform="translate(${waterY < 100 ? 140 : 120},${Math.max(waterY + 45, 150)})">
        <ellipse cx="0" cy="0" rx="11" ry="5" fill="#f0f0f0"/>
        <ellipse cx="2" cy="0" rx="5" ry="3" fill="#dc2626" opacity="0.6"/>
        <polygon points="-11,0 -17,-5 -17,4" fill="#e8e8e8"/>
        <circle cx="6" cy="-2" r="1.2" fill="#1a1a1a"/>
      </g>` : ''}
    </g>

    <!-- Sensor pole -->
    <rect x="90" y="22" width="4" height="178" rx="2" fill="#6b7280"/>
    <!-- Pole base/mount -->
    <rect x="82" y="18" width="20" height="8" rx="3" fill="#9ca3af"/>

    <!-- White probe (shallow) at y=85 -->
    <circle cx="92" cy="85" r="9" fill="${probeWhiteOk ? '#f0f0f0' : '#f0f0f0'}" stroke="${probeWhiteOk ? '#22c55e' : '#ef4444'}" stroke-width="2.5"/>
    <text x="92" y="89" text-anchor="middle" fill="#333" font-size="10" font-weight="bold">${whiteLabel}</text>
    <!-- White probe label -->
    <line x1="101" y1="85" x2="122" y2="85" stroke="${probeWhiteOk ? '#22c55e80' : '#ef444480'}" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="125" y="82" fill="#8aaa96" font-size="8">${shallowTxt}</text>
    <text x="125" y="92" fill="${probeWhiteOk ? '#22c55e' : '#ef4444'}" font-size="8" font-weight="600">${probeWhiteOk ? (LANG==='cn'?'●水中':'●OK') : (LANG==='cn'?'◉离水':'◉DRY')}</text>

    <!-- Black probe (deep) at y=140 -->
    <circle cx="92" cy="140" r="9" fill="#374151" stroke="${probeBlackOk ? '#22c55e' : '#ef4444'}" stroke-width="2.5"/>
    <text x="92" y="144" text-anchor="middle" fill="#e0e0e0" font-size="10" font-weight="bold">${blackLabel}</text>
    <!-- Black probe label -->
    <line x1="101" y1="140" x2="122" y2="140" stroke="${probeBlackOk ? '#22c55e80' : '#ef444480'}" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="125" y="137" fill="#8aaa96" font-size="8">${deepTxt}</text>
    <text x="125" y="147" fill="${probeBlackOk ? '#22c55e' : '#ef4444'}" font-size="8" font-weight="600">${probeBlackOk ? (LANG==='cn'?'●水中':'●OK') : (LANG==='cn'?'◉离水':'◉DRY')}</text>

    <!-- Water level indicator arrow -->
    <polygon points="34,${waterY} 26,${waterY-5} 26,${waterY+5}" fill="${waterColorLight}"/>
    <text x="8" y="${waterY+4}" fill="${waterColorLight}" font-size="9" font-weight="600">${levelLabel}</text>

    <!-- Pond bottom -->
    <g transform="translate(30,185)">
      <ellipse cx="40" cy="5" rx="12" ry="3" fill="#374151" opacity="0.4"/>
      <ellipse cx="100" cy="3" rx="8" ry="2" fill="#374151" opacity="0.3"/>
      <ellipse cx="150" cy="5" rx="10" ry="3" fill="#374151" opacity="0.35"/>
    </g>
  </svg>`;

  document.getElementById('waterCard').innerHTML = `<div class="water-card">
    ${svg}
    <div class="water-info">
      <div class="water-status ${statusClass}">${statusText}</div>
      <div class="water-detail" style="margin-top:8px;">
        <span style="color:${probeWhiteOk ? 'var(--green)' : 'var(--red)'}">${probeWhiteOk ? '●' : '◉'} ${LANG==='cn'?'白色探头（浅水位）':'White probe (shallow)'}: ${probeWhiteOk ? (LANG==='cn'?'在水中':'In water') : (LANG==='cn'?'离开水面':'Out of water')}</span>
      </div>
      <div class="water-detail">
        <span style="color:${probeBlackOk ? 'var(--green)' : 'var(--red)'}">${probeBlackOk ? '●' : '◉'} ${LANG==='cn'?'黑色探头（深水位）':'Black probe (deep)'}: ${probeBlackOk ? (LANG==='cn'?'在水中':'In water') : (LANG==='cn'?'离开水面':'Out of water')}</span>
      </div>
      <div class="water-detail" style="margin-top:8px;">${T.battery}: ${battery !== undefined ? battery + '%' : '--'} &nbsp; ${online ? '🟢' : '⚫'} ${online ? 'Online' : 'Offline'}</div>
      <div class="water-detail">${T.updated}: ${updated}</div>
    </div>
  </div>`;
}

async function loadAlarmLog() {
  try {
    // Use server-side pond log (tracks state changes locally)
    const data = await api("GET", "/api/pond/logs?hours=24");
    const logs = data.logs || [];
    const section = document.getElementById("alarmLogSection");
    const container = document.getElementById("alarmLog");
    section.style.display = "";
    if (!logs.length) { container.innerHTML = `<div class="log-empty">${T.noEvents}</div>`; return; }
    container.innerHTML = logs.map(log => {
      const isAlarm = log.alarm;
      const time = new Date(log.time).toLocaleString(locale);
      const probe = log.probe === 'black'
        ? (LANG === 'cn' ? '黑色探头(深)' : 'Black probe (deep)')
        : (LANG === 'cn' ? '白色探头(浅)' : 'White probe (shallow)');
      const stateText = isAlarm
        ? (LANG === 'cn' ? '离开水面' : 'Out of water')
        : (LANG === 'cn' ? '回到水中' : 'Back in water');
      return `<div class="log-item">
        <span class="log-dot ${isAlarm ? 'alarm' : 'normal'}"></span>
        <span class="log-time">${time}</span>
        <span class="log-state" style="color:${isAlarm ? 'var(--red)' : 'var(--green)'}">
          ${probe}: ${stateText}
        </span>
      </div>`;
    }).join('');
  } catch (e) { console.error('alarm log:', e); }
}

// ============ Charts ============
let tempChart, humChart, pressChart;
let currentTempHours = 24, currentHumHours = 24, currentPressHours = 24;

function createChart(canvasId, yLabel) {
  const ctx = document.getElementById(canvasId).getContext("2d");
  return new Chart(ctx, {
    type: "line",
    data: { datasets: [] },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      scales: {
        x: { type: "time", time: { tooltipFormat: "MM/dd HH:mm" }, ticks: { color: "#5a7a66", maxTicksLimit: 10 }, grid: { color: "#1a3326" } },
        y: { ticks: { color: "#5a7a66" }, grid: { color: "#1e3a2c" }, title: { display: true, text: yLabel, color: "#8aaa96" } }
      },
      plugins: {
        legend: { labels: { color: "#e8f0e8", usePointStyle: true, pointStyle: "circle" } },
        tooltip: { backgroundColor: "#12261a", titleColor: "#e8f0e8", bodyColor: "#8aaa96", borderColor: "#24432e", borderWidth: 1 }
      }
    }
  });
}

async function loadSamples(hours) {
  const sensorIds = Object.keys(sensorsData);
  if (!sensorIds.length) return {};
  const startTime = new Date(Date.now() - hours * 3600000).toISOString();
  const limit = Math.min(Math.max(hours * 60, 100), 2000);
  const data = await api("POST", "/api/samples", { sensors: sensorIds, startTime, limit });
  return data.sensors || data;
}

function updateChart(chart, samplesMap, valueKey, transform) {
  const datasets = [];
  let i = 0;
  for (const [sensorId, samples] of Object.entries(samplesMap)) {
    const name = sensorsData[sensorId]?.name || sensorId;
    const color = COLORS[i % COLORS.length];
    const sorted = [...samples].sort((a, b) => new Date(a.observed) - new Date(b.observed));
    const points = sorted
      .filter(s => s[valueKey] !== undefined)
      .map(s => ({ x: new Date(s.observed), y: transform ? transform(s[valueKey]) : s[valueKey] }));
    datasets.push({
      label: name, data: points, borderColor: color, backgroundColor: color + "18",
      borderWidth: 2, pointRadius: 0, tension: 0.3, fill: true
    });
    i++;
  }
  chart.data.datasets = datasets;
  chart.update();
}

async function refreshCharts() {
  try {
    const s1 = await loadSamples(currentTempHours);
    updateChart(tempChart, s1, "temperature", tempF2C);
  } catch (e) { console.error("temp chart:", e); }
  try {
    const s2 = await loadSamples(currentHumHours);
    updateChart(humChart, s2, "humidity", null);
  } catch (e) { console.error("hum chart:", e); }
  try {
    const s3 = await loadSamples(currentPressHours);
    updateChart(pressChart, s3, "barometric_pressure", inHgToHPa);
  } catch (e) { console.error("press chart:", e); }
}

function setupTimeButtons(containerId, setHours, refreshFn) {
  document.getElementById(containerId).addEventListener("click", async (e) => {
    if (e.target.tagName !== "BUTTON") return;
    document.querySelectorAll(`#${containerId} button`).forEach(b => b.classList.remove("active"));
    e.target.classList.add("active");
    setHours(parseInt(e.target.dataset.hours));
    await refreshFn();
  });
}

async function loadGateways() {
  try {
    const gw = await api("GET", "/api/gateways");
    const ids = Object.keys(gw);
    if (!ids.length) { document.getElementById("gatewayInfo").textContent = "No gateways"; return; }
    document.getElementById("gatewayInfo").innerHTML = ids.map(id => {
      const g = gw[id];
      const lastSeen = g.last_seen ? new Date(g.last_seen).toLocaleString(locale) : "--";
      return `Gateway: <span>${g.name || id}</span> &nbsp;|&nbsp; ${T.updated}: <span>${lastSeen}</span>`;
    }).join("<br>");
  } catch (e) { document.getElementById("gatewayInfo").textContent = "Gateway unavailable"; }
}

// ============ Init ============
async function init() {
  renderGarden();

  try {
    sensorsData = await api("GET", "/api/sensors");
    renderSensors(sensorsData);
    setStatus(true, T.connected);
  } catch (e) {
    setStatus(false, "Error: " + e.message);
    document.getElementById("sensorCards").innerHTML = `<div class="loading-msg">${T.noSensors}</div>`;
  }

  // Load weather after sensors so it can use sensor readings
  loadWeather();

  try {
    const tuyaDevices = await api("GET", "/api/tuya/devices");
    renderWaterSensor(tuyaDevices);
    await loadAlarmLog();
  } catch (e) { console.error("tuya:", e); }

  await loadGateways();

  tempChart = createChart("tempChart", T.temperature + " (°C)");
  humChart = createChart("humChart", T.humidity + " (%)");
  pressChart = createChart("pressChart", T.pressure + " (hPa)");

  setupTimeButtons("tempTimeBtns", v => currentTempHours = v, async () => {
    const s = await loadSamples(currentTempHours); updateChart(tempChart, s, "temperature", tempF2C);
  });
  setupTimeButtons("humTimeBtns", v => currentHumHours = v, async () => {
    const s = await loadSamples(currentHumHours); updateChart(humChart, s, "humidity", null);
  });
  setupTimeButtons("pressTimeBtns", v => currentPressHours = v, async () => {
    const s = await loadSamples(currentPressHours); updateChart(pressChart, s, "barometric_pressure", inHgToHPa);
  });

  await refreshCharts();

  setInterval(async () => {
    try {
      sensorsData = await api("GET", "/api/sensors");
      renderSensors(sensorsData);
      loadWeather();
      const tuyaDevices = await api("GET", "/api/tuya/devices");
      renderWaterSensor(tuyaDevices);
      await refreshCharts();
      setStatus(true, T.connected + " - " + new Date().toLocaleTimeString(locale));
    } catch (e) { setStatus(false, "Refresh failed"); }
  }, 120000);

  // Refresh weather every 30 min
  setInterval(loadWeather, 30 * 60 * 1000);
}

init();
</script>
