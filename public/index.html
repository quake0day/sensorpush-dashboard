<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Garden</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <style>
    :root {
      --bg: #0a1a10;
      --surface: #12261a;
      --surface2: #1a3326;
      --border: #24432e;
      --text: #e8f0e8;
      --text2: #8aaa96;
      --text3: #5a7a66;
      --accent: #4ade80;
      --orange: #f97316;
      --blue: #38bdf8;
      --purple: #a78bfa;
      --emerald: #34d399;
      --pink: #fb7185;
      --red: #ef4444;
      --green: #22c55e;
      --yellow: #facc15;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Header */
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .header-left h1 { font-size: 22px; font-weight: 700; }
    .header-left h1 .leaf { color: var(--accent); }
    .header-left .subtitle { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .weather-brief { font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
    .weather-brief .wx-emoji { font-size: 20px; }
    .weather-brief .wx-temp { color: var(--text); font-weight: 600; font-size: 15px; }
    .lang-btn, .unit-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; text-decoration: none; transition: all 0.15s; }
    .lang-btn:hover, .unit-btn:hover { background: var(--border); color: var(--text); }
    .unit-btn.active-f .f-label, .unit-btn.active-c .c-label { color: var(--accent); font-weight: 600; }
    .music-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text3); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .music-btn:hover { background: var(--border); color: var(--text); }
    .music-btn.playing { color: var(--accent); border-color: var(--accent); }
    .status { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 5px; }
    .status .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: inline-block; }
    .status.error .dot { background: var(--red); }

    /* Container */
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

    /* Garden Scene */
    .garden-wrapper { display: flex; justify-content: center; margin-bottom: 28px; }
    .garden-frame { border: 3px solid var(--border); border-radius: 16px; overflow: hidden; background: #060e08; box-shadow: 0 4px 40px rgba(74,222,128,0.08), inset 0 0 60px rgba(0,0,0,0.3); max-width: 820px; width: 100%; position: relative; }
    .garden-frame canvas { display: block; width: 100%; }

    /* Section */
    .section { margin-bottom: 28px; }
    .section-head { font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text3); margin-bottom: 14px; padding-left: 2px; display: flex; align-items: center; gap: 8px; }
    .section-head::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Weather */
    .weather-now { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px 28px; margin-bottom: 14px; display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
    .weather-now .wx-icon { font-size: 52px; }
    .weather-now .wx-main .wx-temp-lg { font-size: 42px; font-weight: 700; }
    .weather-now .wx-main .wx-desc { font-size: 15px; color: var(--text2); margin-top: 2px; }
    .weather-now .wx-details { display: flex; gap: 20px; margin-left: auto; flex-wrap: wrap; }
    .weather-now .wx-detail { text-align: center; }
    .weather-now .wx-detail .val { font-size: 16px; font-weight: 600; }
    .weather-now .wx-detail .lbl { font-size: 11px; color: var(--text3); }
    .forecast-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(95px, 1fr)); gap: 10px; }
    .fc-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 8px; text-align: center; }
    .fc-card .fc-day { font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 600; }
    .fc-card .fc-icon { font-size: 26px; margin-bottom: 4px; }
    .fc-card .fc-temp { font-size: 18px; font-weight: 700; }
    .fc-card .fc-desc { font-size: 10px; color: var(--text3); margin-top: 4px; line-height: 1.3; }
    .fc-card.is-night { opacity: 0.65; }
    .weather-loading { color: var(--text3); font-size: 14px; padding: 20px; text-align: center; }
    .wx-summary { background: var(--surface2); border-radius: 10px; padding: 14px 18px; margin-top: 14px; font-size: 13px; color: var(--text2); line-height: 1.7; }
    .wx-extra { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .wx-extra-item { text-align: center; min-width: 70px; }
    .wx-extra-item .val { font-size: 15px; font-weight: 600; }
    .wx-extra-item .lbl { font-size: 10px; color: var(--text3); margin-top: 1px; }

    /* Sensor Cards */
    .sensor-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 16px; }
    .sensor-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .sensor-card .sensor-name { font-size: 14px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; padding: 18px 22px 0; font-weight: 600; }
    .sensor-card .readings-list { padding: 14px 22px 6px; }
    .reading-row { padding: 10px 0; border-bottom: 1px solid var(--border); }
    .reading-row:last-child { border-bottom: none; }
    .reading-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
    .reading-label { font-size: 12px; color: var(--text2); font-weight: 500; }
    .reading-value { font-size: 26px; font-weight: 700; line-height: 1; }
    .reading-value small { font-size: 14px; font-weight: 500; }
    .meter { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-bottom: 5px; }
    .meter-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
    .reading-interp { font-size: 11px; color: var(--text3); }
    .sensor-meta { font-size: 11px; color: var(--text3); padding: 10px 22px 16px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 4px; }

    /* Water Sensor */
    .water-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px 26px; display: flex; align-items: flex-start; gap: 24px; flex-wrap: wrap; }
    .water-info .water-status { font-size: 22px; font-weight: 700; }
    .water-info .water-detail { font-size: 12px; color: var(--text3); margin-top: 4px; }
    .water-normal { color: var(--green); }
    .water-alarm { color: var(--red); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
    .pond-diagram { flex-shrink: 0; }
    @keyframes water-wave { 0%,100%{d:path('M0,0 Q30,-3 60,0 Q90,3 120,0 Q150,-3 180,0 L180,5 L0,5 Z')} 50%{d:path('M0,0 Q30,3 60,0 Q90,-3 120,0 Q150,3 180,0 L180,5 L0,5 Z')} }
    @keyframes fish-swim { 0%{transform:translateX(0)} 50%{transform:translateX(12px)} 100%{transform:translateX(0)} }
    .pond-fish { animation: fish-swim 4s ease-in-out infinite; }
    .alarm-log { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 22px; margin-top: 12px; }
    .alarm-log h3 { font-size: 13px; color: var(--text2); margin-bottom: 10px; }
    .alarm-log .log-list { max-height: 180px; overflow-y: auto; }
    .log-item { display: flex; align-items: center; gap: 10px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    .log-item:last-child { border-bottom: none; }
    .log-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .log-dot.alarm { background: var(--red); }
    .log-dot.normal { background: var(--green); }
    .log-time { color: var(--text3); min-width: 150px; }
    .log-state { font-weight: 500; }
    .log-empty { color: var(--text3); font-size: 12px; }

    /* Charts */
    .chart-section { background: var(--surface); border-radius: 14px; padding: 22px; border: 1px solid var(--border); margin-bottom: 16px; }
    .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
    .chart-header h3 { font-size: 15px; font-weight: 600; }
    .time-btns { display: flex; gap: 5px; }
    .time-btns button { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.15s; }
    .time-btns button.active { background: var(--accent); color: var(--bg); font-weight: 600; border-color: var(--accent); }
    .time-btns button:hover:not(.active) { background: var(--border); }
    .chart-wrapper { position: relative; height: 280px; }

    .gateway-info { background: var(--surface); border-radius: 10px; padding: 12px 20px; border: 1px solid var(--border); margin-bottom: 14px; font-size: 12px; color: var(--text3); display: flex; gap: 20px; flex-wrap: wrap; }
    .gateway-info span { color: var(--text2); }
    .loading-msg { text-align: center; padding: 40px; color: var(--text3); font-size: 14px; }

    /* Responsive */
    @media (max-width: 640px) {
      .header { padding: 14px 16px; }
      .container { padding: 16px 12px; }
      .sensor-grid { grid-template-columns: 1fr; }
      .weather-now { padding: 16px; gap: 16px; }
      .weather-now .wx-main .wx-temp-lg { font-size: 32px; }
      .forecast-grid { grid-template-columns: repeat(auto-fit, minmax(75px, 1fr)); gap: 6px; }
    }
    /* Bird Notification */
    .bird-toast-container { position: fixed; top: 80px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 12px; pointer-events: none; max-width: 380px; }
    .bird-toast { pointer-events: auto; background: var(--surface); border: 1px solid var(--accent); border-radius: 14px; padding: 16px; display: flex; gap: 14px; box-shadow: 0 8px 32px rgba(74,222,128,0.15), 0 2px 8px rgba(0,0,0,0.4); animation: birdSlideIn 0.5s ease-out; position: relative; overflow: hidden; }
    .bird-toast::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), var(--orange)); }
    .bird-toast.hiding { animation: birdSlideOut 0.4s ease-in forwards; }
    @keyframes birdSlideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes birdSlideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(120%); opacity: 0; } }
    .bird-toast .bird-img { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; background: var(--surface2); flex-shrink: 0; }
    .bird-toast .bird-info { flex: 1; min-width: 0; }
    .bird-toast .bird-label { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
    .bird-toast .bird-name { font-size: 16px; font-weight: 700; line-height: 1.2; }
    .bird-toast .bird-sci { font-size: 11px; color: var(--text3); font-style: italic; margin-top: 2px; }
    .bird-toast .bird-conf { font-size: 11px; color: var(--text2); margin-top: 4px; }
    .bird-toast .bird-desc { font-size: 11px; color: var(--text2); margin-top: 4px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .bird-toast .bird-audio { margin-top: 6px; display: flex; align-items: center; gap: 6px; }
    .bird-toast .bird-play-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--accent); width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; }
    .bird-toast .bird-play-btn:hover { background: var(--accent); color: var(--bg); }
    .bird-toast .bird-close { position: absolute; top: 8px; right: 10px; background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; padding: 2px; line-height: 1; }
    .bird-toast .bird-close:hover { color: var(--text); }
    @media (max-width: 640px) { .bird-toast-container { left: 12px; right: 12px; max-width: none; top: 70px; } .bird-toast .bird-img { width: 60px; height: 60px; } }
  </style>
</head>
<body>
  <!-- Bird notification container -->
  <div class="bird-toast-container" id="birdToasts"></div>
  <div class="header">
    <div class="header-left">
      <h1><span class="leaf">&#127793;</span> <span id="title"></span></h1>
      <div class="subtitle" id="subtitle"></div>
    </div>
    <div class="header-right">
      <div id="etClock" style="font-size:12px;color:var(--text2);font-family:monospace;min-width:70px;text-align:center;"></div>
      <div class="weather-brief" id="wxBrief"></div>
      <button class="music-btn" id="musicBtn" onclick="toggleMusic()" title="Music">&#9835;</button>
      <button class="unit-btn active-c" id="unitBtn" onclick="toggleUnit()"><span class="f-label">°F</span> / <span class="c-label">°C</span></button>
      <a class="lang-btn" id="langBtn"></a>
      <div class="status" id="status"><span class="dot"></span> <span id="statusText"></span></div>
    </div>
  </div>

  <div class="container">
    <!-- Garden Scene -->
    <div class="garden-wrapper">
      <div class="garden-frame">
        <canvas id="gardenCanvas"></canvas>
      </div>
    </div>

    <!-- Weather -->
    <div class="section" id="weatherSection">
      <div class="section-head" id="weatherHead"></div>
      <div id="weatherNow" class="weather-loading"></div>
      <div class="forecast-grid" id="forecastGrid"></div>
    </div>

    <!-- Sensors -->
    <div class="section">
      <div class="section-head" id="sensorsHead"></div>
      <div class="gateway-info" id="gatewayInfo"></div>
      <div class="sensor-grid" id="sensorCards"><div class="loading-msg" id="sensorLoading"></div></div>
    </div>

    <!-- Water Sensor -->
    <div class="section" id="waterSection" style="display:none;">
      <div class="section-head" id="waterHead"></div>
      <div id="waterCard"></div>
      <div class="alarm-log" id="alarmLogSection" style="display:none;">
        <h3 id="alarmLogTitle"></h3>
        <div class="log-list" id="alarmLog"></div>
      </div>
    </div>

    <!-- Camera Water Level -->
    <div class="section" id="camWaterSection" style="display:none;">
      <div class="section-head" id="camWaterHead">Camera Water Level</div>
      <div class="water-card" id="camWaterCard" style="justify-content:center;gap:30px;"></div>
    </div>

    <!-- Charts -->
    <div class="section">
      <div class="section-head" id="chartsHead"></div>
      <div class="chart-section">
        <div class="chart-header">
          <h3 id="chartTempTitle"></h3>
          <div class="time-btns" id="tempTimeBtns"></div>
        </div>
        <div class="chart-wrapper"><canvas id="tempChart"></canvas></div>
      </div>
      <div class="chart-section">
        <div class="chart-header">
          <h3 id="chartHumTitle"></h3>
          <div class="time-btns" id="humTimeBtns"></div>
        </div>
        <div class="chart-wrapper"><canvas id="humChart"></canvas></div>
      </div>
      <div class="chart-section">
        <div class="chart-header">
          <h3 id="chartPressTitle"></h3>
          <div class="time-btns" id="pressTimeBtns"></div>
        </div>
        <div class="chart-wrapper"><canvas id="pressChart"></canvas></div>
      </div>
    </div>
  </div>

<script>
// ============ Language ============
const LANG = window.location.pathname.startsWith('/cn') ? 'cn' : 'en';
const locale = LANG === 'cn' ? 'zh-CN' : 'en-US';

const T = {
  en: {
    title: 'Smart Garden',
    subtitle: 'Environmental Monitoring Dashboard',
    weather: 'Weather Forecast',
    location: 'West Chester, PA',
    sensors: 'Garden Sensors',
    water: 'Koi Pond Water Level',
    charts: 'Historical Trends',
    temperature: 'Temperature',
    humidity: 'Humidity',
    dewPoint: 'Dew Point',
    vpd: 'VPD',
    pressure: 'Barometric Pressure',
    battery: 'Battery',
    signal: 'Signal',
    updated: 'Updated',
    connecting: 'Connecting...',
    connected: 'Connected',
    loadingSensor: 'Loading sensors...',
    loadingWeather: 'Loading weather...',
    noSensors: 'No sensors found',
    noEvents: 'No events in the last 24 hours',
    pondLow: 'LOW - Refill needed',
    pondCritical: 'CRITICAL - Refill immediately!',
    pondNormal: 'Water level OK',
    pondDesc: 'Dual-probe sensor: black probe (shallow) & white probe (deep)',
    alarmHistory: 'Pond Level Alert History (24h)',
    sensorReading: 'Sensor',
    forecastReading: 'Forecast',
    switchLang: '中文',
    switchUrl: '/cn',
    wind: 'Wind',
    humLabel: 'Humidity',
    h: ['1H','6H','24H','3D','7D'],
    tempInterp(c) {
      if (c < 0) return 'Freezing - protect your plants!';
      if (c < 10) return 'Cold - most plants dormant';
      if (c < 18) return 'Cool - good for cool-season crops';
      if (c < 26) return 'Ideal growing temperature';
      if (c < 32) return 'Warm - water plants more often';
      if (c < 38) return 'Hot - provide shade for plants';
      return 'Extreme heat - plants at risk!';
    },
    humInterp(h) {
      if (h < 30) return 'Very dry - increase watering';
      if (h < 40) return 'Dry - monitor soil moisture';
      if (h < 60) return 'Comfortable for most plants';
      if (h < 70) return 'Humid - watch for fungal issues';
      return 'Very humid - risk of mold/mildew';
    },
    vpdInterp(v) {
      if (v < 0.4) return 'Low - risk of mold on leaves';
      if (v < 0.8) return 'Good for seedlings & clones';
      if (v < 1.2) return 'Ideal for vegetative growth';
      if (v < 1.6) return 'Good for flowering plants';
      return 'High - plants may be stressed';
    },
    pressInterp(p) {
      if (p < 1000) return 'Low pressure - storms likely';
      if (p < 1013) return 'Below normal - weather changing';
      if (p < 1023) return 'Normal atmospheric pressure';
      if (p < 1040) return 'High pressure - clear skies';
      return 'Very high pressure';
    },
    dpInterp(d) {
      if (d < 10) return 'Dry and comfortable air';
      if (d < 16) return 'Pleasant conditions';
      if (d < 18) return 'Slightly muggy';
      if (d < 21) return 'Humid and uncomfortable';
      return 'Oppressive humidity';
    },
    gardenSummary(tc, hum, dp, vpd, press, wxDesc) {
      const parts = [];
      // Temperature
      if (tc < 0) parts.push('freezing conditions with frost risk');
      else if (tc < 10) parts.push('cold weather, most plants are dormant');
      else if (tc < 18) parts.push('cool temperatures, favorable for cool-season crops');
      else if (tc < 26) parts.push('ideal growing temperatures for most plants');
      else if (tc < 32) parts.push('warm conditions, remember to water more frequently');
      else parts.push('hot weather, plants need shade and extra water');
      // Humidity + dew point combined
      if (hum < 40) parts.push('The air is dry' + (dp < 10 ? ' and comfortable' : '') + ', keep an eye on soil moisture.');
      else if (hum < 60) parts.push('Humidity is in the comfortable range for most plants.');
      else parts.push('It\'s quite humid' + (dp > 18 ? ' and muggy' : '') + ', watch for fungal issues.');
      // VPD
      if (vpd < 0.4) parts.push('VPD is low, which could promote mold on foliage.');
      else if (vpd < 0.8) parts.push('VPD is good for seedlings, cuttings, and propagation.');
      else if (vpd < 1.2) parts.push('VPD is in the ideal range for healthy vegetative growth.');
      else if (vpd < 1.6) parts.push('VPD is well-suited for flowering and fruiting plants.');
      else parts.push('VPD is high, plants may show signs of water stress.');
      // Pressure
      if (press < 1000) parts.push('Low barometric pressure suggests storms may be approaching.');
      else if (press < 1013) parts.push('Pressure is below normal, the weather may be changing.');
      else if (press < 1023) parts.push('Atmospheric pressure is stable.');
      else parts.push('High pressure indicates clear skies ahead.');
      return 'Currently ' + wxDesc.toLowerCase() + ' with ' + parts[0] + ' ' + parts.slice(1).join(' ');
    },
  },
  cn: {
    title: '智慧花园',
    subtitle: '环境监测仪表板',
    weather: '天气预报',
    location: '宾州 西切斯特',
    sensors: '花园传感器',
    water: '锦鲤鱼塘水位',
    charts: '历史趋势',
    temperature: '温度',
    humidity: '湿度',
    dewPoint: '露点',
    vpd: 'VPD 蒸气压差',
    pressure: '气压',
    battery: '电量',
    signal: '信号',
    updated: '更新于',
    connecting: '连接中...',
    connected: '已连接',
    loadingSensor: '加载传感器中...',
    loadingWeather: '加载天气中...',
    noSensors: '未找到传感器',
    noEvents: '过去24小时无事件',
    pondLow: '偏低 - 需要加水',
    pondCritical: '严重偏低 - 必须立即加水！',
    pondNormal: '水位正常',
    pondDesc: '双探头传感器：黑色探头（浅水位）& 白色探头（深水位）',
    alarmHistory: '鱼塘水位报警记录（24小时）',
    sensorReading: '传感器',
    forecastReading: '预报',
    switchLang: 'EN',
    switchUrl: '/',
    wind: '风速',
    humLabel: '湿度',
    h: ['1时','6时','24时','3天','7天'],
    tempInterp(c) {
      if (c < 0) return '冰冻 - 请保护植物！';
      if (c < 10) return '寒冷 - 大多数植物休眠';
      if (c < 18) return '凉爽 - 适合冷季作物';
      if (c < 26) return '理想生长温度';
      if (c < 32) return '温暖 - 需增加浇水频率';
      if (c < 38) return '炎热 - 请为植物遮阳';
      return '极端高温 - 植物有危险！';
    },
    humInterp(h) {
      if (h < 30) return '非常干燥 - 需增加浇水';
      if (h < 40) return '偏干 - 注意土壤湿度';
      if (h < 60) return '大多数植物适宜';
      if (h < 70) return '潮湿 - 注意真菌病害';
      return '非常潮湿 - 霉菌风险';
    },
    vpdInterp(v) {
      if (v < 0.4) return '偏低 - 叶片有霉菌风险';
      if (v < 0.8) return '适合扦插育苗';
      if (v < 1.2) return '植物营养生长理想范围';
      if (v < 1.6) return '适合开花期植物';
      return '偏高 - 植物可能缺水胁迫';
    },
    pressInterp(p) {
      if (p < 1000) return '低气压 - 可能有暴风雨';
      if (p < 1013) return '偏低 - 天气可能变化';
      if (p < 1023) return '正常气压';
      if (p < 1040) return '高气压 - 晴朗天气';
      return '气压极高';
    },
    dpInterp(d) {
      if (d < 10) return '干燥舒适';
      if (d < 16) return '宜人舒适';
      if (d < 18) return '略微闷热';
      if (d < 21) return '潮湿不适';
      return '闷热难耐';
    },
    gardenSummary(tc, hum, dp, vpd, press, wxDesc) {
      const parts = [];
      // 温度
      if (tc < 0) parts.push('气温在冰点以下，注意防冻');
      else if (tc < 10) parts.push('天气寒冷，大多数植物处于休眠状态');
      else if (tc < 18) parts.push('气温凉爽，适合冷季作物生长');
      else if (tc < 26) parts.push('气温适宜，是大多数植物的理想生长温度');
      else if (tc < 32) parts.push('天气温暖，需要适当增加浇水频率');
      else parts.push('天气炎热，植物需要遮阳和充足水分');
      // 湿度+露点
      if (hum < 40) parts.push('空气' + (dp < 10 ? '干燥舒适' : '偏干') + '，需关注土壤湿度');
      else if (hum < 60) parts.push('空气湿度适中，对大多数植物比较友好');
      else parts.push('空气' + (dp > 18 ? '潮湿闷热' : '湿度偏高') + '，注意预防真菌病害');
      // VPD
      if (vpd < 0.4) parts.push('蒸气压差偏低，叶面容易滋生霉菌');
      else if (vpd < 0.8) parts.push('蒸气压差适合扦插育苗');
      else if (vpd < 1.2) parts.push('蒸气压差处于植物营养生长的理想区间');
      else if (vpd < 1.6) parts.push('蒸气压差适合开花结果期植物');
      else parts.push('蒸气压差偏高，植物可能出现缺水胁迫');
      // 气压
      if (press < 1000) parts.push('气压偏低，可能有暴风雨来临。');
      else if (press < 1013) parts.push('气压略低于正常值，天气可能有变化。');
      else if (press < 1023) parts.push('气压稳定正常。');
      else parts.push('高气压，预计天气晴朗。');
      return '当前' + wxDesc + '。' + parts.join('，').replace(/，([^，]*)$/, '。$1');
    },
  }
}[LANG];

// All time operations use US Eastern Time (America/New_York)
function getET() {
  const s = new Date().toLocaleString('en-US', { timeZone: 'America/New_York' });
  return new Date(s);
}
function getETHour() { return getET().getHours(); }
function getETMinute() { return getET().getMinutes(); }
function getETMonth() { return getET().getMonth(); }
function getETTimeF() { return getETHour() + getETMinute() / 60; }

// Clock display (updates every second)
function updateClock() {
  const et = getET();
  const h = et.getHours(), m = et.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  const mStr = m < 10 ? '0' + m : m;
  const el = document.getElementById('etClock');
  if (el) el.textContent = `${h12}:${mStr} ${ampm} ET`;
}

async function api(method, path, body) {
  const opts = { method, headers: { "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (!res.ok) throw new Error(`${res.status}`);
  return res.json();
}

function wxEmoji(text) {
  if (!text) return '🌤';
  const t = text.toLowerCase();
  if (t.includes('thunder') || t.includes('storm')) return '⛈';
  if (t.includes('snow') || t.includes('flurr') || t.includes('blizzard')) return '❄';
  if (t.includes('rain') || t.includes('shower') || t.includes('drizzle')) return '🌧';
  if (t.includes('fog') || t.includes('haz') || t.includes('mist')) return '🌫';
  if (t.includes('wind')) return '💨';
  if (t.includes('partly cloudy') || t.includes('partly sunny') || t.includes('mostly cloudy')) return '⛅';
  if (t.includes('cloudy') || t.includes('overcast')) return '☁';
  if (t.includes('sunny') || t.includes('clear')) return '☀';
  return '🌤';
}

  'Monday': '周一', 'Tuesday': '周二', 'Wednesday': '周三', 'Thursday': '周四',

  'Thursday Night': '周四夜', 'Friday Night': '周五夜', 'Saturday Night': '周六夜',
  'Sunday Night': '周日夜', 'Overnight': '夜间',
};
function translateWx(text) {
  if (LANG !== 'cn' || !text) return text;
  // Try exact match first
  if (WX_CN[text]) return WX_CN[text];
  // Try composite: "Partly Sunny then Slight Chance Light Rain"
  if (text.includes(' then ')) {
    const parts = text.split(' then ');
    return parts.map(p => WX_CN[p.trim()] || p).join('转');
  }
  // Partial match
  let result = text;
  const sorted = Object.keys(WX_CN).sort((a, b) => b.length - a.length);
  for (const en of sorted) {
    if (result.includes(en)) result = result.replace(en, WX_CN[en]);
  }
  return result;
}
function translateDay(name) {
  if (LANG !== 'cn' || !name) return name;
  return DAY_CN[name] || name;
}

// ============ Pixel Garden ============
// Sun times (updated from weather API)
let gardenSunTimes = { sunrise: 6.5, sunset: 19.5, dawnStart: 6, duskEnd: 20 }; // defaults in ET hours

function renderGarden() {
  const canvas = document.getElementById('gardenCanvas');
  const ctx = canvas.getContext('2d');

  // ---- Time from sun data (US Eastern) ----
  function getTimeState() {
    const timeF = getETTimeF();
    const { sunrise, sunset, dawnStart, duskEnd } = gardenSunTimes;
    const isNight = timeF < dawnStart || timeF >= duskEnd;
    const isDawn = timeF >= dawnStart && timeF < sunrise + 0.5;
    const isDusk = timeF >= sunset - 0.5 && timeF < duskEnd;
    const isMorning = timeF >= sunrise + 0.5 && timeF < 11;
    const isNoon = timeF >= 11 && timeF < 14;
    const isAfternoon = timeF >= 14 && timeF < sunset - 0.5;
    return { timeF, isNight, isDawn, isDusk, isMorning, isNoon, isAfternoon, sunrise, sunset, dawnStart, duskEnd };
  }

  const ts = getTimeState();
  const useNightBg = ts.isNight;

  // Load day and night background images
  const bgDay = new Image();
  const bgNight = new Image();
  let loadCount = 0;
  bgDay.src = '/garden-bg.jpg';
  bgNight.src = '/garden-night.jpg';

  function onBgLoad() {
    loadCount++;
    if (loadCount < 2) return;
    startGarden();
  }
  bgDay.onload = onBgLoad;
  bgNight.onload = onBgLoad;

  function startGarden() {
    const bgImg = useNightBg ? bgNight : bgDay;
    const ratio = bgImg.height / bgImg.width;
    const cw = 820, ch = Math.round(cw * ratio);
    canvas.width = cw;
    canvas.height = ch;

    const { timeF, isNight, isDawn, isDusk } = ts;
    let weatherDesc = '';
    let showRain = false;

    // ---- Pixel art drawing helpers ----
    function px(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(Math.round(x), Math.round(y), w, h);
    }

    // ---- Animated elements state ----
    // Birds: red cardinal, blue jay, grey sparrow - spawn randomly
    // Load bird sprite frames (variable frame counts per species)
    const birdSpeciesCfg = [
      { name: 'canary', frames: 4 },
      { name: 'cardinal', frames: 2 },
      { name: 'chickadee', frames: 2 },
      { name: 'oriole', frames: 3 },
      { name: 'woodpecker', frames: 3 },
    ];
    const birdSpecies = birdSpeciesCfg.map(s => s.name);
    const birdFrames = {};
    let birdImgsLoaded = 0;
    let birdImgsTotal = 0;
    birdSpeciesCfg.forEach(sp => {
      birdFrames[sp.name] = [];
      birdImgsTotal += sp.frames;
      for (let f = 1; f <= sp.frames; f++) {
        const img = new Image();
        img.onload = () => { birdImgsLoaded++; };
        img.src = `/birds/${sp.name}/${f}.png`;
        birdFrames[sp.name].push(img);
      }
    });

    const birds = [];
    let birdTimer = 0;
    let nextBirdSpawn = 300 + Math.random() * 600;

    const raindrops = [];
    for (let i = 0; i < 60; i++) {
      raindrops.push({
        x: Math.random() * cw,
        y: Math.random() * ch,
        speed: 4 + Math.random() * 4,
        len: 4 + Math.random() * 6,
      });
    }

    // Fireflies: summer nights only, sparse
    const month = getETMonth(); // 0-11, US Eastern
    const isSummer = month >= 5 && month <= 8; // June-September
    const fireflyCount = isSummer ? 5 : 0;
    const fireflies = [];
    for (let i = 0; i < fireflyCount; i++) {
      fireflies.push({
        x: 200 + Math.random() * 400,
        y: 150 + Math.random() * 250,
        dx: (Math.random() - 0.5) * 0.3,
        dy: (Math.random() - 0.5) * 0.2,
        phase: Math.random() * Math.PI * 2,
      });
    }

    // Water sparkle positions (pinned from /pin tool)
    const sparklePoints = useNightBg
      ? [[478,385],[493,394],[500,415],[496,434],[470,438],[530,454]]
      : [[473,381],[494,398],[513,404],[499,423],[460,442],[478,458],[523,460],[528,452],[433,439],[579,449],[556,456]];
    const sparkles = sparklePoints.map(([x, y]) => ({
      x, y, phase: Math.random() * Math.PI * 2, speed: 0.8 + Math.random() * 1.5,
    }));

    // Soft clouds with multiple puffs
    const clouds = [
      { x: 50,  y: 28, puffs: [{dx:0,dy:0,r:28},{dx:22,dy:-6,r:22},{dx:-18,dy:-3,r:20},{dx:38,dy:2,r:18},{dx:-8,dy:-10,r:16}], speed: 0.18, opacity: 0.6 },
      { x: 350, y: 40, puffs: [{dx:0,dy:0,r:22},{dx:18,dy:-4,r:18},{dx:-14,dy:-2,r:16},{dx:30,dy:3,r:14}], speed: 0.12, opacity: 0.45 },
      { x: 600, y: 18, puffs: [{dx:0,dy:0,r:32},{dx:26,dy:-8,r:26},{dx:-22,dy:-4,r:22},{dx:44,dy:2,r:20},{dx:10,dy:-14,r:18},{dx:-10,dy:-12,r:15}], speed: 0.14, opacity: 0.55 },
      { x: 200, y: 55, puffs: [{dx:0,dy:0,r:18},{dx:14,dy:-3,r:14},{dx:-10,dy:-2,r:12}], speed: 0.08, opacity: 0.3 },
    ];

    let frame = 0;

    // Weather API updates garden state
    window.gardenSetWeather = function(desc) {
      weatherDesc = (desc || '').toLowerCase();
      showRain = !!weatherDesc.match(/rain|shower|drizzle|storm/);
    };
    // Legacy compat
    window.gardenSetRain = function(r) { showRain = r; };

    function drawBird(x, y, bird) {
      if (birdImgsLoaded < birdImgsTotal) return;
      const frames = birdFrames[bird.species];
      if (!frames || !frames.length) return;
      const frameIdx = Math.floor(bird.wingPhase * 0.5) % frames.length;
      const img = frames[frameIdx];
      if (!img || !img.complete) return;
      const size = 30;
      const ratio = img.height / img.width;
      ctx.drawImage(img, Math.round(x), Math.round(y - size * ratio / 2), size, Math.round(size * ratio));
    }

    // Sun position follows an arc across the sky based on time
    // Dawn: low-left, warm orange. Morning: rising, golden. Noon: high-center, bright white-yellow.
    // Afternoon: descending right. Dusk: low-right, deep orange-red.
    function getSunConfig() {
      const { sunrise, sunset, dawnStart, duskEnd } = gardenSunTimes;
      const dayLen = duskEnd - dawnStart;
      const progress = Math.max(0, Math.min(1, (timeF - dawnStart) / dayLen));
      // Arc: x left→right, y parabola (horizon at edges, peak at noon)
      const horizonY = 82; // the "horizon line" where sun rises/sets
      const sx = 60 + progress * (cw - 120);
      // At progress 0 and 1, sun center is AT horizon. Peak around y=10.
      const arcHeight = Math.sin(progress * Math.PI);
      const sy = horizonY - arcHeight * (horizonY - 8);
      const size = 14 + arcHeight * 6;

      // How much sun is below horizon (0=fully above, 1=fully below)
      // Near sunrise/sunset, sun sinks toward horizon
      const edgeDist = Math.min(progress, 1 - progress); // 0 at edges, 0.5 at noon
      const sinkRatio = edgeDist < 0.1 ? 1 - (edgeDist / 0.1) : 0; // 1=at horizon, 0=fully up

      let core, glow, rayColor, glowR, glowAlpha;
      if (edgeDist < 0.08) {
        core = '#ff4020'; glow = 'rgba(255,60,10,'; rayColor = '#ff5030';
        glowR = size * 5; glowAlpha = 0.25;
      } else if (edgeDist < 0.15) {
        core = '#ff7030'; glow = 'rgba(255,100,30,'; rayColor = '#ff8040';
        glowR = size * 4; glowAlpha = 0.2;
      } else if (edgeDist < 0.28) {
        core = '#ffaa33'; glow = 'rgba(255,170,50,'; rayColor = '#ffbb44';
        glowR = size * 3.5; glowAlpha = 0.18;
      } else {
        core = '#fff4b0'; glow = 'rgba(255,244,180,'; rayColor = '#ffe066';
        glowR = size * 3; glowAlpha = 0.15;
      }
      return { x: sx, y: sy, r: size, core, glow, glowR, glowAlpha, rayColor, progress, sinkRatio, horizonY };
    }

    function drawSkyGlow(sunCfg) {
      const p = sunCfg.progress;
      const edgeDist = Math.min(p, 1 - p);
      if (edgeDist < 0.18 && !isNight) {
        const isDawnGlow = p < 0.5;
        const intensity = Math.max(0, 1 - edgeDist / 0.18);
        // Wide warm glow across sky
        const grad = ctx.createRadialGradient(sunCfg.x, sunCfg.horizonY, 0, sunCfg.x, sunCfg.horizonY, 300);
        grad.addColorStop(0, `rgba(255,${isDawnGlow?100:60},20,${intensity * 0.35})`);
        grad.addColorStop(0.3, `rgba(255,${isDawnGlow?140:90},40,${intensity * 0.2})`);
        grad.addColorStop(0.6, `rgba(255,180,80,${intensity * 0.08})`);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, cw, sunCfg.horizonY + 40);
        // Warm color band along horizon
        const hGrad = ctx.createLinearGradient(0, sunCfg.horizonY - 30, 0, sunCfg.horizonY + 20);
        hGrad.addColorStop(0, 'rgba(0,0,0,0)');
        hGrad.addColorStop(0.4, `rgba(255,${isDawnGlow?80:50},20,${intensity * 0.2})`);
        hGrad.addColorStop(0.7, `rgba(255,${isDawnGlow?120:70},30,${intensity * 0.15})`);
        hGrad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = hGrad;
        ctx.fillRect(0, sunCfg.horizonY - 30, cw, 50);
      }
    }

    function drawSun(sunCfg) {
      const { x, y, r, core, glow, glowR, glowAlpha, rayColor, sinkRatio, horizonY } = sunCfg;

      // How much of the sun is hidden below horizon
      // sinkRatio: 0=fully visible, 1=half hidden at horizon
      const clipY = horizonY + r * (1 - sinkRatio * 2); // clip line

      ctx.save();
      if (sinkRatio > 0.01) {
        // Clip: only draw the part above the horizon
        ctx.beginPath();
        ctx.rect(0, 0, cw, horizonY);
        ctx.clip();
      }

      // Outer glow (always full, bleeds above horizon)
      const g1 = ctx.createRadialGradient(x, y, r * 0.3, x, y, glowR);
      g1.addColorStop(0, glow + glowAlpha + ')');
      g1.addColorStop(0.4, glow + (glowAlpha * 0.4) + ')');
      g1.addColorStop(1, glow + '0)');
      ctx.fillStyle = g1;
      ctx.beginPath(); ctx.arc(x, y, glowR, 0, Math.PI * 2); ctx.fill();

      // Core disc
      ctx.fillStyle = core;
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
      // Bright center
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath(); ctx.arc(x, y, r * 0.45, 0, Math.PI * 2); ctx.fill();

      // Pixel rays (only above horizon)
      const rayCount = sinkRatio > 0.5 ? 5 : 8;
      for (let a = 0; a < rayCount; a++) {
        const angle = (a / rayCount) * Math.PI * 2 + frame * 0.004;
        // Skip rays pointing downward when sinking
        if (sinkRatio > 0.3 && Math.sin(angle) > 0.3) continue;
        const d1 = r + 3, d2 = r + 8;
        px(x + Math.cos(angle) * d1, y + Math.sin(angle) * d1, 3, 3, rayColor);
        px(x + Math.cos(angle) * d2, y + Math.sin(angle) * d2, 2, 2, rayColor);
      }

      ctx.restore();

      // Reflection glow on the "horizon" (warm line where sun meets edge)
      if (sinkRatio > 0.1) {
        const refAlpha = sinkRatio * 0.3;
        const refGrad = ctx.createRadialGradient(x, horizonY, 0, x, horizonY, r * 3);
        refGrad.addColorStop(0, `rgba(255,100,30,${refAlpha})`);
        refGrad.addColorStop(0.5, `rgba(255,150,50,${refAlpha * 0.4})`);
        refGrad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = refGrad;
        ctx.fillRect(x - r * 3, horizonY - 5, r * 6, 20);
      }
    }

    function isSunVisible() {
      if (isNight) return false;
      // No sun if raining/storming
      if (weatherDesc.match(/rain|shower|drizzle|storm|thunder/)) return false;
      // No sun if fully cloudy/overcast
      if (weatherDesc.match(/cloudy|overcast/) && !weatherDesc.match(/partly|mostly sunny/)) return false;
      return true;
    }

    function isSunDimmed() {
      // Partly cloudy = dimmed sun
      return !!weatherDesc.match(/partly cloudy|mostly cloudy|partly sunny/);
    }

    // Calculate real lunar phase (0=new, 0.5=full, 1=new again)
    function getLunarPhase() {
      // Known new moon: Jan 6, 2000 18:14 UTC
      const knownNew = new Date(2000, 0, 6, 18, 14).getTime();
      const lunarCycle = 29.53058867 * 24 * 3600 * 1000; // ms
      const elapsed = Date.now() - knownNew;
      const phase = (elapsed % lunarCycle) / lunarCycle; // 0-1
      return phase;
    }

    function drawPixelMoon(x, y, r) {
      const phase = getLunarPhase(); // 0=new, ~0.5=full

      // Glow (brighter when fuller)
      const fullness = 1 - Math.abs(phase - 0.5) * 2; // 0=new/thin, 1=full
      const glowAlpha = 0.04 + fullness * 0.08;
      ctx.fillStyle = `rgba(200,215,240,${glowAlpha})`;
      ctx.beginPath(); ctx.arc(x, y, r * 3, 0, Math.PI * 2); ctx.fill();

      // Draw lit portion of moon
      ctx.save();
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.clip();

      // Full disc in moon color
      ctx.fillStyle = '#e8e8d0';
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();

      // Shadow overlay to create phase shape
      // phase 0-0.5: waxing (shadow on left shrinks)
      // phase 0.5-1: waning (shadow on right grows)
      const shadowPhase = phase < 0.5 ? phase * 2 : (1 - phase) * 2; // 0=new, 1=full
      const shadowOffset = r * 2 * (1 - shadowPhase); // how far the shadow circle is offset

      if (shadowPhase < 0.98) { // not full moon
        ctx.fillStyle = 'rgba(12,20,40,0.92)';
        if (phase < 0.5) {
          // Waxing: shadow from left, moving right
          ctx.beginPath(); ctx.arc(x - shadowOffset, y, r * 1.05, 0, Math.PI * 2); ctx.fill();
        } else {
          // Waning: shadow from right, moving left
          ctx.beginPath(); ctx.arc(x + shadowOffset, y, r * 1.05, 0, Math.PI * 2); ctx.fill();
        }
      }

      // Subtle crater texture on lit surface
      ctx.fillStyle = 'rgba(180,180,160,0.15)';
      ctx.beginPath(); ctx.arc(x - r*0.2, y - r*0.15, r*0.12, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + r*0.15, y + r*0.2, r*0.08, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x - r*0.05, y + r*0.3, r*0.1, 0, Math.PI*2); ctx.fill();

      ctx.restore();

      // Cloud cover over moon when cloudy
      if (weatherDesc.match(/cloudy|overcast/)) {
        const isMostly = !!weatherDesc.match(/mostly cloudy|overcast/);
        const cloudAlpha = isMostly ? 0.6 : 0.35;
        // Drifting cloud wisps across moon
        const drift = (frame * 0.15) % (r * 6) - r * 2;
        for (let ci = 0; ci < 4; ci++) {
          const cx = x + drift + ci * r * 0.8 - r;
          const cy = y + Math.sin(ci * 1.5 + frame * 0.01) * r * 0.3;
          const cr = r * (0.5 + ci * 0.15);
          const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, cr);
          cg.addColorStop(0, `rgba(50,55,75,${cloudAlpha})`);
          cg.addColorStop(0.6, `rgba(40,45,65,${cloudAlpha * 0.5})`);
          cg.addColorStop(1, 'rgba(30,35,55,0)');
          ctx.fillStyle = cg;
          ctx.beginPath(); ctx.arc(cx, cy, cr, 0, Math.PI*2); ctx.fill();
        }
      }
    }

    function drawCloud(cloud) {
      ctx.save();
      cloud.puffs.forEach(p => {
        const cx = cloud.x + p.dx;
        const cy = cloud.y + p.dy;
        const r = p.r;
        const grad = ctx.createRadialGradient(cx, cy, r * 0.1, cx, cy, r);
        if (isNight) {
          grad.addColorStop(0, `rgba(80,90,120,${cloud.opacity * 0.6})`);
          grad.addColorStop(0.6, `rgba(60,70,100,${cloud.opacity * 0.3})`);
          grad.addColorStop(1, 'rgba(40,50,80,0)');
        } else {
          grad.addColorStop(0, `rgba(255,255,255,${cloud.opacity})`);
          grad.addColorStop(0.5, `rgba(240,245,255,${cloud.opacity * 0.5})`);
          grad.addColorStop(1, 'rgba(220,230,245,0)');
        }
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
      });
      ctx.restore();
    }

    function animate() {
      requestAnimationFrame(animate);
      frame++;

      // ---- Draw background image ----
      ctx.drawImage(bgImg, 0, 0, cw, ch);

      // ---- Time-of-day overlay (night uses its own background, no heavy overlay) ----
      if (isNight) {
        // Light overlay only - night image already has correct mood
        ctx.fillStyle = 'rgba(5,8,25,0.15)';
        ctx.fillRect(0, 0, cw, ch);
      } else if (isDawn) {
        // Warm dawn tint
        ctx.fillStyle = 'rgba(80,40,15,0.12)';
        ctx.fillRect(0, 0, cw, ch);
      } else if (isDusk) {
        // Warm dusk tint, deeper than dawn
        ctx.fillStyle = 'rgba(70,25,10,0.2)';
        ctx.fillRect(0, 0, cw, ch);
      }

      // ---- Sky glow, Sun, or Moon ----
      if (isNight) {
        drawPixelMoon(680, 45, 18);
        // Stars
        ctx.fillStyle = '#fff';
        for (let i = 0; i < 30; i++) {
          const sx = (i * 137.5 + frame * 0.02) % cw;
          const sy = (i * 97.3) % (ch * 0.3);
          const alpha = 0.3 + 0.4 * Math.sin(frame * 0.05 + i);
          ctx.globalAlpha = alpha;
          px(sx, sy, 1, 1, '#fff');
        }
        ctx.globalAlpha = 1;
      } else {
        const sunCfg = getSunConfig();
        // Dawn/dusk glow - no glow during rain
        if (!showRain) drawSkyGlow(sunCfg);
        // Sun (hidden when raining, fully cloudy)
        if (isSunVisible() && !showRain) {
          if (isSunDimmed()) ctx.globalAlpha = 0.5;
          drawSun(sunCfg);
          ctx.globalAlpha = 1;
        }
      }

      // ---- Clouds (soft radial gradient puffs) ----
      clouds.forEach(c => {
        c.x += c.speed;
        // Calculate total cloud width from puffs
        const maxR = Math.max(...c.puffs.map(p => p.dx + p.r));
        if (c.x - 40 > cw + maxR) c.x = -maxR - 40;
        drawCloud(c);
      });

      // ---- Birds (spawn randomly, 0-2 at a time) ----
      if (!isNight) {
        birdTimer++;
        if (birdTimer >= nextBirdSpawn && birds.length < 2) {
          const count = Math.random() < 0.6 ? 1 : 2; // usually 1, sometimes 2
          for (let bi = 0; bi < count; bi++) {
            birds.push({
              x: cw + 40 + bi * 50,
              y: 20 + Math.random() * 80,
              speed: -(0.4 + Math.random() * 0.5),
              wingPhase: Math.random() * Math.PI * 2,
              species: birdSpecies[Math.floor(Math.random() * birdSpecies.length)],
              glideOffset: Math.random() * Math.PI * 2,
            });
          }
          birdTimer = 0;
          nextBirdSpawn = 500 + Math.random() * 1200; // 8-28 seconds at 60fps
        }
        for (let bi = birds.length - 1; bi >= 0; bi--) {
          const b = birds[bi];
          b.x += b.speed;
          b.wingPhase += 0.1;
          b.y += Math.sin(b.wingPhase * 0.3 + b.glideOffset) * 0.2;
          if (b.x < -50) { birds.splice(bi, 1); continue; }
          drawBird(b.x, b.y, b);
        }
      }

      // ---- Fireflies (night) ----
      if (isNight) {
        fireflies.forEach(f => {
          f.x += f.dx + Math.sin(frame * 0.02 + f.phase) * 0.3;
          f.y += f.dy + Math.cos(frame * 0.015 + f.phase) * 0.2;
          f.phase += 0.03;
          if (f.x < 100 || f.x > 700) f.dx *= -1;
          if (f.y < 80 || f.y > 500) f.dy *= -1;
          const alpha = 0.3 + 0.7 * Math.abs(Math.sin(f.phase));
          ctx.fillStyle = `rgba(170,255,170,${alpha})`;
          ctx.fillRect(Math.round(f.x), Math.round(f.y), 3, 3);
          // Glow
          ctx.fillStyle = `rgba(170,255,170,${alpha * 0.2})`;
          ctx.fillRect(Math.round(f.x) - 3, Math.round(f.y) - 3, 9, 9);
        });
      }

      // ---- Night light sources (lanterns & path lights) ----
      if (isNight) {
        const lights = [
          { x: 237, y: 383, r: 55, color: [255, 180, 80], flicker: 0.15 },  // tree lantern
          { x: 504, y: 482, r: 40, color: [255, 190, 100], flicker: 0.1 },  // path light waterfall
          { x: 634, y: 438, r: 38, color: [255, 185, 90], flicker: 0.12 },  // path light right
          { x: 633, y: 531, r: 35, color: [255, 190, 100], flicker: 0.1 },  // lower path light
        ];
        lights.forEach((l, i) => {
          const pulse = 1 + Math.sin(frame * 0.04 + i * 1.7) * l.flicker;
          const r = l.r * pulse;
          const [cr, cg, cb] = l.color;
          // Outer glow
          const g1 = ctx.createRadialGradient(l.x, l.y, 0, l.x, l.y, r);
          g1.addColorStop(0, `rgba(${cr},${cg},${cb},0.25)`);
          g1.addColorStop(0.4, `rgba(${cr},${cg},${cb},0.1)`);
          g1.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
          ctx.fillStyle = g1;
          ctx.beginPath(); ctx.arc(l.x, l.y, r, 0, Math.PI * 2); ctx.fill();
          // Inner bright core
          const g2 = ctx.createRadialGradient(l.x, l.y, 0, l.x, l.y, r * 0.3);
          g2.addColorStop(0, `rgba(255,240,200,0.35)`);
          g2.addColorStop(1, `rgba(255,220,150,0)`);
          ctx.fillStyle = g2;
          ctx.beginPath(); ctx.arc(l.x, l.y, r * 0.3, 0, Math.PI * 2); ctx.fill();
        });
      }

      // ---- Water sparkles on pond ----
      sparkles.forEach(s => {
        s.phase += 0.04 * s.speed;
        const alpha = 0.2 + 0.6 * Math.abs(Math.sin(s.phase));
        const color = isNight ? `rgba(100,150,200,${alpha})` : `rgba(200,230,255,${alpha})`;
        px(s.x, s.y, 2, 2, color);
      });

      // (waterfall removed)

      // ---- Rain ----
      if (showRain) {
        ctx.strokeStyle = 'rgba(180,200,220,0.4)';
        ctx.lineWidth = 1;
        raindrops.forEach(r => {
          r.y += r.speed;
          r.x -= r.speed * 0.2;
          if (r.y > ch) { r.y = -r.len; r.x = Math.random() * cw; }
          ctx.beginPath();
          ctx.moveTo(Math.round(r.x), Math.round(r.y));
          ctx.lineTo(Math.round(r.x + r.speed * 0.2), Math.round(r.y + r.len));
          ctx.stroke();
        });
      }

      // ---- Vignette ----
      const vg = ctx.createRadialGradient(cw/2, ch/2, ch*0.3, cw/2, ch/2, ch*0.8);
      vg.addColorStop(0, 'rgba(0,0,0,0)');
      vg.addColorStop(1, isNight ? 'rgba(0,0,0,0.4)' : 'rgba(0,0,0,0.15)');
      ctx.fillStyle = vg;
      ctx.fillRect(0, 0, cw, ch);
    }

    animate();
  };
}

// ============ Weather ============
async function loadWeather() {
  try {
    const data = await api('GET', '/api/weather');
    if (!data.forecast || !data.forecast.length) {
      document.getElementById('weatherNow').innerHTML = '<div class="weather-loading">Weather data unavailable</div>';
      return;
    }

    const current = data.hourly && data.hourly[0] ? data.hourly[0] : data.forecast[0];
    const fxTempF = current.temperature;
    const fxTempC = fToC(fxTempF);
    const fxHum = current.relativeHumidity?.value || '--';
    const desc = current.shortForecast;
    const emoji = wxEmoji(desc);

    // Parse sunrise/sunset times from API (convert UTC ISO to ET hours)
    if (data.sun && data.sun.sunrise) {
      function utcToETHours(isoStr) {
        const d = new Date(isoStr);
        const etStr = d.toLocaleString('en-US', { timeZone: 'America/New_York', hour: 'numeric', minute: 'numeric', hour12: false });
        const [h, m] = etStr.split(':').map(Number);
        return h + m / 60;
      }
      gardenSunTimes = {
        sunrise: utcToETHours(data.sun.sunrise),
        sunset: utcToETHours(data.sun.sunset),
        dawnStart: utcToETHours(data.sun.civil_twilight_begin),
        duskEnd: utcToETHours(data.sun.civil_twilight_end),
      };
    }

    // Update garden weather effects (rain, sun visibility, etc.)
    if (window.gardenSetWeather) window.gardenSetWeather(desc);

    // Get sensor readings for main display
    const sensorIds = Object.keys(sensorsData);
    let sensorTempC = null, sensorHum = null, sensorDp = null, sensorVpd = null, sensorPress = null;
    if (sensorIds.length) {
      const s = sensorsData[sensorIds[0]];
      if (s.temperature !== undefined) sensorTempC = tempF2C(s.temperature);
      if (s.humidity !== undefined) sensorHum = s.humidity;
      if (s.dewpoint !== undefined) sensorDp = tempF2C(s.dewpoint);
      if (s.vpd !== undefined) sensorVpd = s.vpd;
      if (s.barometric_pressure !== undefined) sensorPress = inHgToHPa(s.barometric_pressure);
    }
    const sensorTempF = sensorTempC !== null ? sensorTempC * 9/5 + 32 : null;
    const sensorDpF = sensorDp !== null ? sensorDp * 9/5 + 32 : null;
    const stcDisp = sensorTempC !== null ? displayTemp(sensorTempC, sensorTempF) : '--';
    const shum = sensorHum !== null ? sensorHum.toFixed(1) : '--';
    const sdpDisp = sensorDp !== null ? displayTemp(sensorDp, sensorDpF) : '--';
    const svpd = sensorVpd !== null ? sensorVpd.toFixed(2) : '--';
    const spress = sensorPress !== null ? sensorPress.toFixed(0) : '--';
    const descTr = translateWx(desc);

    // Generate natural language summary
    let summaryHTML = '';
    if (sensorTempC !== null && sensorHum !== null && sensorDp !== null && sensorVpd !== null && sensorPress !== null) {
      summaryHTML = `<div class="wx-summary">${T.gardenSummary(sensorTempC, sensorHum, sensorDp, sensorVpd, sensorPress, descTr)}</div>`;
    }

    const fxDisp = useF ? `${fxTempF}°F` : `${fxTempC}°C`;
    const fxAlt = useF ? `(${fxTempC}°C)` : `(${fxTempF}°F)`;

    // Header brief: sensor temp + weather icon
    document.getElementById('wxBrief').innerHTML =
      `<span class="wx-emoji">${emoji}</span> <span class="wx-temp">${stcDisp}</span>`;

    // Current weather card
    document.getElementById('weatherNow').innerHTML = `
      <div class="weather-now">
        <div class="wx-icon">${emoji}</div>
        <div class="wx-main">
          <div class="wx-temp-lg" style="color:var(--orange)">${stcDisp}</div>
          <div class="wx-desc">${descTr}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:4px;">${T.forecastReading}: ${fxDisp} ${fxAlt}</div>
        </div>
        <div class="wx-details">
          <div class="wx-detail">
            <div class="val" style="color:var(--blue)">${shum}%</div>
            <div class="lbl">${T.humLabel}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px;">${T.forecastReading}: ${fxHum}%</div>
          </div>
          <div class="wx-detail">
            <div class="val">${current.windSpeed || '--'}</div>
            <div class="lbl">${T.wind}</div>
          </div>
        </div>
        <div class="wx-extra">
          <div class="wx-extra-item"><div class="val" style="color:var(--purple)">${sdpDisp}</div><div class="lbl">${T.dewPoint}</div></div>
          <div class="wx-extra-item"><div class="val" style="color:var(--emerald)">${svpd} kPa</div><div class="lbl">${T.vpd}</div></div>
          <div class="wx-extra-item"><div class="val" style="color:var(--pink)">${spress} hPa</div><div class="lbl">${T.pressure}</div></div>
        </div>
      </div>
      ${summaryHTML}`;

    // Forecast cards (show day periods, first 10)
    const periods = data.forecast.slice(0, 10);
    document.getElementById('forecastGrid').innerHTML = periods.map(p => {
      const isNight = p.isDaytime === false;
      return `<div class="fc-card${isNight ? ' is-night' : ''}">
        <div class="fc-day">${translateDay(p.name)}</div>
        <div class="fc-icon">${wxEmoji(p.shortForecast)}</div>
        <div class="fc-temp">${displayTempShort(p.temperature)}</div>
        <div class="fc-desc">${translateWx(p.shortForecast)}</div>
      </div>`;
    }).join('');

  } catch (e) {
    console.error('weather:', e);
    document.getElementById('weatherNow').innerHTML = '<div class="weather-loading">Weather unavailable</div>';
  }
}

// ============ Sensor Cards ============
let sensorsData = {};

function meterPct(type, val) {
  switch(type) {
    case 'temp': return clamp((val + 10) / 55 * 100);
    case 'hum': return clamp(val);
    case 'vpd': return clamp(val / 3 * 100);
    case 'press': return clamp((val - 980) / 70 * 100);
    case 'dp': return clamp((val + 5) / 35 * 100);
  }
  return 50;
}

function meterColor(type, val) {
  switch(type) {
    case 'temp':
      if (val >= 18 && val <= 26) return 'var(--green)';
      if (val >= 10 && val <= 32) return 'var(--yellow)';
      return 'var(--red)';
    case 'hum':
      if (val >= 40 && val <= 60) return 'var(--green)';
      if (val >= 30 && val <= 70) return 'var(--yellow)';
      return 'var(--red)';
    case 'vpd':
      if (val >= 0.8 && val <= 1.2) return 'var(--green)';
      if (val >= 0.4 && val <= 1.6) return 'var(--yellow)';
      return 'var(--red)';
    case 'press':
      if (val >= 1010 && val <= 1025) return 'var(--green)';
      if (val >= 1000 && val <= 1040) return 'var(--yellow)';
      return 'var(--red)';
    case 'dp':
      if (val >= 10 && val <= 18) return 'var(--green)';
      if (val >= 5 && val <= 21) return 'var(--yellow)';
      return 'var(--red)';
  }
  return 'var(--text3)';
}

function readingHTML(label, value, unit, color, type, rawVal, interpFn) {
  const pct = meterPct(type, rawVal);
  const mc = meterColor(type, rawVal);
  const interp = interpFn(rawVal);
  return `<div class="reading-row">
    <div class="reading-top">
      <span class="reading-label">${label}</span>
      <span class="reading-value" style="color:${color}">${value}<small>${unit}</small></span>
    </div>
    <div class="meter"><div class="meter-fill" style="width:${pct}%;background:${mc}"></div></div>
    <div class="reading-interp">${interp}</div>
  </div>`;
}

function renderSensors(sensors) {
  const container = document.getElementById("sensorCards");
  const ids = Object.keys(sensors);
  if (!ids.length) { container.innerHTML = `<div class="loading-msg">${T.noSensors}</div>`; return; }

  container.innerHTML = ids.map(id => {
    const s = sensors[id];
    const tc = s.temperature !== undefined ? tempF2C(s.temperature) : null;
    const hum = s.humidity;
    const dp = s.dewpoint !== undefined ? tempF2C(s.dewpoint) : null;
    const vpd = s.vpd;
    const press = s.barometric_pressure !== undefined ? inHgToHPa(s.barometric_pressure) : null;
    const updated = s.last_update ? new Date(s.last_update).toLocaleString(locale) : '--';

    const tempUnit = useF ? '°F' : '°C';
    const tempVal = useF ? (tc !== null ? (tc*9/5+32).toFixed(1) : null) : (tc !== null ? tc.toFixed(1) : null);
    const dpVal = useF ? (dp !== null ? (dp*9/5+32).toFixed(1) : null) : (dp !== null ? dp.toFixed(1) : null);

    let readings = '';
    if (tc !== null) readings += readingHTML(T.temperature, tempVal, tempUnit, 'var(--orange)', 'temp', tc, T.tempInterp);
    if (hum !== undefined) readings += readingHTML(T.humidity, hum.toFixed(1), '%', 'var(--blue)', 'hum', hum, T.humInterp);
    if (dp !== null) readings += readingHTML(T.dewPoint, dpVal, tempUnit, 'var(--purple)', 'dp', dp, T.dpInterp);
    if (vpd !== undefined) readings += readingHTML(T.vpd, vpd.toFixed(2), ' kPa', 'var(--emerald)', 'vpd', vpd, T.vpdInterp);
    if (press !== null) readings += readingHTML(T.pressure, press.toFixed(1), ' hPa', 'var(--pink)', 'press', press, T.pressInterp);

    return `<div class="sensor-card">
      <div class="sensor-name">${s.name || id}</div>
      <div class="readings-list">${readings}</div>
      <div class="sensor-meta">
        <span>${T.battery}: ${s.battery_voltage ? s.battery_voltage + 'V' : '--'}</span>
        <span>${T.signal}: ${s.rssi || '--'} dBm</span>
        <span>${T.updated}: ${updated}</span>
      </div>
    </div>`;
  }).join('');
}

// ============ Tuya / Koi Pond Water Level ============
function renderWaterSensor(devices) {
  const ws = devices.find(d => d.type === 'water_sensor');
  if (!ws) return;
  document.getElementById('waterSection').style.display = '';
  const statusMap = {};
  (ws.status || []).forEach(s => statusMap[s.code] = s.value);

  // Dual probe mapping (from v2 thing model):
  //   watersensor_state (DP1) = right probe = black = shallow position
  //   tamper_alarm (DP5)      = left probe  = white = deep position
  const leftAlarm = statusMap.tamper_alarm === true;          // white/deep
  const rightAlarm = statusMap.watersensor_state === 'alarm'; // black/shallow
  const battery = statusMap.battery_percentage;
  const online = ws.online;
  const updated = ws.update_time ? new Date(ws.update_time * 1000).toLocaleString(locale) : '--';

  let statusText, statusClass;
  if (rightAlarm && leftAlarm) {
    statusText = T.pondCritical; statusClass = 'water-alarm';
  } else if (rightAlarm || leftAlarm) {
    statusText = T.pondLow; statusClass = 'water-alarm';
  } else {
    statusText = T.pondNormal; statusClass = 'water-normal';
  }

  const probeWhiteOk = !leftAlarm;
  const probeBlackOk = !rightAlarm;

  // Water level Y positions in SVG (pond area 40-190)
  // Black probe at y=85 (shallow, alarms first when water drops)

async function loadAlarmLog() {
  try {
    // Use server-side pond log (tracks state changes locally)
    const data = await api("GET", "/api/pond/logs?hours=24");
    const logs = data.logs || [];
    const section = document.getElementById("alarmLogSection");
    const container = document.getElementById("alarmLog");
    section.style.display = "";
    if (!logs.length) { container.innerHTML = `<div class="log-empty">${T.noEvents}</div>`; return; }
    container.innerHTML = logs.map(log => {
      const isAlarm = log.alarm;
      const time = new Date(log.time).toLocaleString(locale);
      const probe = log.probe === 'black'
        ? (LANG === 'cn' ? '黑色探头(浅)' : 'Black probe (shallow)')
        : (LANG === 'cn' ? '白色探头(深)' : 'White probe (deep)');

        ? (LANG === 'cn' ? '离开水面' : 'Out of water')

async function loadSamples(hours) {
  const sensorIds = Object.keys(sensorsData);
  if (!sensorIds.length) return {};
  const startTime = new Date(Date.now() - hours * 3600000).toISOString();
  const limit = Math.min(Math.max(hours * 60, 100), 2000);
  const data = await api("POST", "/api/samples", { sensors: sensorIds, startTime, limit });
  return data.sensors || data;
}

function updateChart(chart, samplesMap, valueKey, transform) {
  const datasets = [];
  let i = 0;
  for (const [sensorId, samples] of Object.entries(samplesMap)) {
    const name = sensorsData[sensorId]?.name || sensorId;
    const color = COLORS[i % COLORS.length];
    const sorted = [...samples].sort((a, b) => new Date(a.observed) - new Date(b.observed));
    const points = sorted
      .filter(s => s[valueKey] !== undefined)
      .map(s => ({ x: new Date(s.observed), y: transform ? transform(s[valueKey]) : s[valueKey] }));
    datasets.push({
      label: name, data: points, borderColor: color, backgroundColor: color + "18",
      borderWidth: 2, pointRadius: 0, tension: 0.3, fill: true
    });
    i++;
  }
  chart.data.datasets = datasets;
  chart.update();
}

async function refreshCharts() {
  try {
    const s1 = await loadSamples(currentTempHours);
    updateChart(tempChart, s1, "temperature", tempF2C);
  } catch (e) { console.error("temp chart:", e); }
  try {
    const s2 = await loadSamples(currentHumHours);
    updateChart(humChart, s2, "humidity", null);
  } catch (e) { console.error("hum chart:", e); }
  try {
    const s3 = await loadSamples(currentPressHours);
    updateChart(pressChart, s3, "barometric_pressure", inHgToHPa);
  } catch (e) { console.error("press chart:", e); }
}

function setupTimeButtons(containerId, setHours, refreshFn) {
  document.getElementById(containerId).addEventListener("click", async (e) => {
    if (e.target.tagName !== "BUTTON") return;
    document.querySelectorAll(`#${containerId} button`).forEach(b => b.classList.remove("active"));
    e.target.classList.add("active");
    setHours(parseInt(e.target.dataset.hours));
    await refreshFn();
  });
}

async function loadGateways() {
  try {
    const gw = await api("GET", "/api/gateways");
    const ids = Object.keys(gw);
    if (!ids.length) { document.getElementById("gatewayInfo").textContent = "No gateways"; return; }
    document.getElementById("gatewayInfo").innerHTML = ids.map(id => {
      const g = gw[id];
      const lastSeen = g.last_seen ? new Date(g.last_seen).toLocaleString(locale) : "--";
      return `Gateway: <span>${g.name || id}</span> &nbsp;|&nbsp; ${T.updated}: <span>${lastSeen}</span>`;
    }).join("<br>");

}

// ============ Init ============
async function init() {
  // Fetch sun times BEFORE rendering garden so day/night is correct
  try {
    const wxData = await api("GET", "/api/weather");
    if (wxData.sun && wxData.sun.sunrise) {
      function utcToETH(isoStr) {
        const d = new Date(isoStr);
        const s = d.toLocaleString('en-US', { timeZone: 'America/New_York', hour: 'numeric', minute: 'numeric', hour12: false });
        const [h, m] = s.split(':').map(Number);
        return h + m / 60;
      }
      gardenSunTimes = {
        sunrise: utcToETH(wxData.sun.sunrise),
        sunset: utcToETH(wxData.sun.sunset),
        dawnStart: utcToETH(wxData.sun.civil_twilight_begin),
        duskEnd: utcToETH(wxData.sun.civil_twilight_end),
      };
    }
    // Also set weather for garden effects
    const cur = wxData.hourly?.[0] || wxData.forecast?.[0];
    if (cur && window.gardenSetWeather) window.gardenSetWeather(cur.shortForecast);
  } catch(e) { console.error('sun prefetch:', e); }

  renderGarden();

  try {
    sensorsData = await api("GET", "/api/sensors");
    renderSensors(sensorsData);
    setStatus(true, T.connected);
  } catch (e) {
    setStatus(false, "Error: " + e.message);
    document.getElementById("sensorCards").innerHTML = `<div class="loading-msg">${T.noSensors}</div>`;
  }

  // Load weather after sensors so it can use sensor readings
  loadWeather();

  try {
    const tuyaDevices = await api("GET", "/api/tuya/devices");
    renderWaterSensor(tuyaDevices);
    await loadAlarmLog();
  } catch (e) { console.error("tuya:", e); }

  await loadGateways();

  tempChart = createChart("tempChart", T.temperature + " (°C)");
  humChart = createChart("humChart", T.humidity + " (%)");
  pressChart = createChart("pressChart", T.pressure + " (hPa)");

  setupTimeButtons("tempTimeBtns", v => currentTempHours = v, async () => {
    const s = await loadSamples(currentTempHours); updateChart(tempChart, s, "temperature", tempF2C);
  });
  setupTimeButtons("humTimeBtns", v => currentHumHours = v, async () => {
    const s = await loadSamples(currentHumHours); updateChart(humChart, s, "humidity", null);
  });
  setupTimeButtons("pressTimeBtns", v => currentPressHours = v, async () => {
    const s = await loadSamples(currentPressHours); updateChart(pressChart, s, "barometric_pressure", inHgToHPa);
  });

  await refreshCharts();

  // ---- Real-time updates ----
  // Sensor + Tuya: every 30 seconds
  setInterval(async () => {
    try {
      sensorsData = await api("GET", "/api/sensors");
      renderSensors(sensorsData);
      loadWeather(); // also updates garden weather effects
      const tuyaDevices = await api("GET", "/api/tuya/devices");
      renderWaterSensor(tuyaDevices);
      await loadAlarmLog();
      setStatus(true, T.connected + " - " + new Date().toLocaleTimeString(locale));
    } catch (e) { setStatus(false, "Refresh failed"); }
  }, 30000);

  // Charts: every 5 minutes
  setInterval(refreshCharts, 5 * 60 * 1000);

  // Weather API: every 15 minutes
  setInterval(loadWeather, 15 * 60 * 1000);
}

let bgMusic = null;
let musicPlaying = false;

function toggleMusic() {
  if (!bgMusic) {
    bgMusic = new Audio();
    bgMusic.loop = true;
    bgMusic.volume = 0.12;
    bgMusic.preload = 'none';
    bgMusic.src = '/music/bg.mp3';
  }
  if (musicPlaying) {
    bgMusic.pause();
    musicPlaying = false;
    document.getElementById('musicBtn').classList.remove('playing');
  } else {
    bgMusic.play().then(() => {
      musicPlaying = true;
      document.getElementById('musicBtn').classList.add('playing');
    }).catch(() => {});
  }
}

// Auto-play music after page loads (retry on user interaction if blocked)
window.addEventListener('load', () => {
  setTimeout(() => {
    if (!bgMusic) {
      bgMusic = new Audio();
      bgMusic.loop = true;
      bgMusic.volume = 0.12;
      bgMusic.src = '/music/bg.mp3';
    }
    bgMusic.play().then(() => {
      musicPlaying = true;
      document.getElementById('musicBtn').classList.add('playing');
    }).catch(() => {
      // Autoplay blocked - start on first user interaction
      const startOnClick = () => {
        if (!musicPlaying && bgMusic) {
          bgMusic.play().then(() => {
            musicPlaying = true;
            document.getElementById('musicBtn').classList.add('playing');
          }).catch(() => {});
        }
        document.removeEventListener('click', startOnClick);
        document.removeEventListener('touchstart', startOnClick);
      };
      document.addEventListener('click', startOnClick);
      document.addEventListener('touchstart', startOnClick);
    });
  }, 2000);
});

// ============ Bird Detection Notifications ============
const BIRD_T = {
  en: { detected: 'Bird Detected', confidence: 'Confidence', listen: 'Listen', wiki: 'Learn more' },
  cn: { detected: '检测到鸟类', confidence: '置信度', listen: '收听', wiki: '了解更多' },
}[LANG];

// Bird translation cache (loaded from server, auto-populated by Claude API)
let BIRD_TRANS = {};
fetch('/api/birds/translations').then(r => r.json()).then(d => { BIRD_TRANS = d; }).catch(() => {});

function getBirdCnName(en) {
  return BIRD_TRANS[en]?.cn_name || en;
}

let birdLastTimestamp = 0;
let birdSeenIds = new Set();
const birdInfoCache = {};
const birdCooldowns = {}; // species -> last toast timestamp
const BIRD_COOLDOWN_MS = 10 * 60 * 1000; // 10 min cooldown per species
const BIRD_MAX_AGE_MS = 10 * 60 * 1000; // don't show toasts older than 10 min
// Persist dismissed bird IDs across page refreshes
const birdDismissed = new Set(JSON.parse(localStorage.getItem('birdDismissed') || '[]'));
function dismissBird(id) { birdDismissed.add(id); localStorage.setItem('birdDismissed', JSON.stringify([...birdDismissed].slice(-200))); }

async function fetchBirdImage(commonName, sciName) {
  const key = commonName + (sciName || '');
  if (birdInfoCache[key]) return birdInfoCache[key];
  try {
    let url = `/api/birds/image/${encodeURIComponent(commonName)}`;
    if (sciName) url += `?sci=${encodeURIComponent(sciName)}`;
    const res = await fetch(url);
    const data = await res.json();
    birdInfoCache[key] = data;
    return data;
  } catch { return { image: null, extract: "", url: "" }; }
}

function showBirdToast(detection, wikiData) {
  const container = document.getElementById('birdToasts');
  const toast = document.createElement('div');
  toast.className = 'bird-toast';

  const trans = BIRD_TRANS[detection.common_name] || {};
  const displayName = LANG === 'cn' ? (trans.cn_name || detection.common_name) : detection.common_name;
  const confPct = Math.round(detection.confidence * 100);

  let descText = '';
  if (LANG === 'cn' && trans.cn_desc) {
    descText = trans.cn_desc;
  } else if (wikiData.extract) {
    descText = wikiData.extract;
    if (descText.length > 120) descText = descText.slice(0, 120).replace(/\s\S*$/, '') + '...';
  }

  // Call description
  const callDesc = LANG === 'cn' ? (trans.call_desc || '') : (trans.call_desc_en || '');
  // AllAboutBirds sound page
  const soundUrl = trans.sound_url || `https://www.allaboutbirds.org/guide/${detection.common_name.replace(/['']/g,'').replace(/\s+/g,'_')}/sounds`;

  toast.innerHTML = `
    <button class="bird-close" onclick="dismissBird('${detection.id}');this.parentElement.classList.add('hiding');setTimeout(()=>this.parentElement.remove(),400)">&times;</button>
    ${wikiData.image ? `<img class="bird-img" src="${wikiData.image}" alt="${displayName}" onerror="this.style.display='none'">` : '<div class="bird-img" style="display:flex;align-items:center;justify-content:center;font-size:32px">🐦</div>'}
    <div class="bird-info">
      <div class="bird-label">🎵 ${BIRD_T.detected}</div>
      <div class="bird-name">${displayName}</div>
      <div class="bird-sci">${detection.scientific_name}</div>
      <div class="bird-conf">${BIRD_T.confidence}: ${confPct}%</div>
      ${descText ? `<div class="bird-desc">${descText}</div>` : ''}
      ${callDesc ? `<div class="bird-desc" style="color:var(--accent)">🔊 ${callDesc}</div>` : ''}
      <div class="bird-audio">
        <a href="${soundUrl}" target="_blank" class="bird-play-btn" title="${BIRD_T.listen}" style="text-decoration:none">🔊</a>
        <span style="font-size:10px;color:var(--text3)">${BIRD_T.listen}</span>
        ${wikiData.url ? `<a href="${wikiData.url}" target="_blank" style="font-size:10px;color:var(--accent);margin-left:auto">${BIRD_T.wiki} →</a>` : ''}
      </div>
    </div>
  `;

  container.appendChild(toast);
  // Auto-dismiss after 15s
  setTimeout(() => {
    if (toast.parentElement) {
      dismissBird(detection.id);
      toast.classList.add('hiding');
      setTimeout(() => toast.remove(), 400);
    }
  }, 15000);

  // Keep max 3 visible
  while (container.children.length > 3) {
    container.children[0].remove();
  }
}

async function pollBirds() {
  try {
    const res = await fetch(`/api/birds/latest?since=${birdLastTimestamp}`);
    const data = await res.json();
    for (const det of (data.detections || [])) {
      if (birdSeenIds.has(det.id)) continue;
      birdSeenIds.add(det.id);
      birdLastTimestamp = Math.max(birdLastTimestamp, det.timestamp || 0);

      const now = Date.now();
      // Skip if already dismissed (persists across refresh)
      if (birdDismissed.has(det.id)) continue;
      // Skip if detection is older than 10 minutes
      if (det.timestamp && (now - det.timestamp) > BIRD_MAX_AGE_MS) continue;
      // Cooldown: skip if same species shown within 10 minutes
      if (birdCooldowns[det.common_name] && (now - birdCooldowns[det.common_name]) < BIRD_COOLDOWN_MS) continue;
      birdCooldowns[det.common_name] = now;

      // Fetch translation if needed (also triggers Claude API for new species)
      if (!BIRD_TRANS[det.common_name]) {
        try {
          const tr = await fetch(`/api/birds/translate/${encodeURIComponent(det.common_name)}?sci=${encodeURIComponent(det.scientific_name)}`);
          const td = await tr.json();
          if (td.cn_name) BIRD_TRANS[det.common_name] = td;
        } catch {}
      }
      const wiki = await fetchBirdImage(det.common_name, det.scientific_name);
      showBirdToast(det, wiki);
    }
  } catch (e) {}
}

// Poll for birds every 15 seconds
setInterval(pollBirds, 15000);
setTimeout(pollBirds, 5000);

    document.getElementById('camWaterSection').style.display = '';
    document.getElementById('camWaterHead').textContent = LANG === 'cn' ? '鱼塘水位（摄像头检测）' : 'Koi Pond Water Level (Camera)';

    const pct = Math.round(d.level_pct);
    const status = d.status || '--';
    const statusCN = {High:'偏高',Normal:'正常',Low:'偏低',Critical:'危险'}[status] || status;
    const dispStatus = LANG === 'cn' ? statusCN : status;
    const statusColor = status === 'Normal' || status === 'High' ? 'var(--green)' : status === 'Low' ? 'var(--orange)' : 'var(--red)';
    const updated = d.time ? new Date(d.time).toLocaleTimeString(LANG === 'cn' ? 'zh-CN' : 'en-US') : '--';

    // Water tank SVG
    const fillH = Math.max(2, Math.min(98, pct));
    const waveY = 100 - fillH;
    const fillColor = pct >= 40 ? '#38bdf8' : pct >= 20 ? '#f97316' : '#ef4444';

    const svg = `<svg viewBox="0 0 120 140" width="120" style="flex-shrink:0">
      <defs>
        <clipPath id="tankClip"><rect x="10" y="10" width="100" height="110" rx="8"/></clipPath>
      </defs>
      <rect x="10" y="10" width="100" height="110" rx="8" fill="none" stroke="var(--border)" stroke-width="2.5"/>
      <g clip-path="url(#tankClip)">
        <rect x="10" y="${10 + 110*(1-fillH/100)}" width="100" height="${110*fillH/100}" fill="${fillColor}" opacity="0.3"/>
        <path d="M10,${10+110*waveY/100} Q35,${10+110*waveY/100-4} 60,${10+110*waveY/100} Q85,${10+110*waveY/100+4} 110,${10+110*waveY/100}" fill="none" stroke="${fillColor}" stroke-width="2" opacity="0.7">
          <animate attributeName="d" dur="3s" repeatCount="indefinite"
            values="M10,${10+110*waveY/100} Q35,${10+110*waveY/100-4} 60,${10+110*waveY/100} Q85,${10+110*waveY/100+4} 110,${10+110*waveY/100};M10,${10+110*waveY/100} Q35,${10+110*waveY/100+4} 60,${10+110*waveY/100} Q85,${10+110*waveY/100-4} 110,${10+110*waveY/100};M10,${10+110*waveY/100} Q35,${10+110*waveY/100-4} 60,${10+110*waveY/100} Q85,${10+110*waveY/100+4} 110,${10+110*waveY/100}"/>
        </path>
      </g>
      <text x="60" y="75" text-anchor="middle" font-size="28" font-weight="bold" fill="var(--text)">${pct}%</text>
      <text x="60" y="95" text-anchor="middle" font-size="12" fill="var(--text3)">Water Level</text>
      <!-- Scale marks -->
      ${[0,25,50,75,100].map(v => `<line x1="6" y1="${10+110*(1-v/100)}" x2="10" y2="${10+110*(1-v/100)}" stroke="var(--text3)" stroke-width="1"/><text x="4" y="${14+110*(1-v/100)}" font-size="7" fill="var(--text3)" text-anchor="end">${v}</text>`).join('')}
    </svg>`;

    document.getElementById('camWaterCard').innerHTML = `
      ${svg}
      <div class="water-info">
        <div class="water-status" style="color:${statusColor};font-size:20px">${dispStatus}</div>
        <div class="water-detail" style="margin-top:8px;font-size:14px">${LANG==='cn'?'水位':'Level'}: <b>${pct}%</b></div>
        <div class="water-detail">${T.updated}: ${updated}</div>
      </div>`;
  } catch (e) {}
}

loadCamWater();
setInterval(loadCamWater, 60000);

init();
</script>
</body>
</html>
