<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920,height=1080,initial-scale=1">
  <title>Smart Garden TV</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="/garden.js"></script>
  <style>
    :root{--bg:#0a1a10;--surface:#12261a;--surface2:#1a3326;--border:#24432e;--text:#e8f0e8;--text2:#8aaa96;--text3:#5a7a66;--accent:#4ade80;--orange:#f97316;--blue:#38bdf8;--red:#ef4444;--green:#22c55e;--yellow:#facc15}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);width:1920px;height:1080px;overflow:hidden}

    .tv-layout{display:grid;grid-template-columns:380px 1fr 440px;height:1080px}

    /* Left panel */
    .left-panel{background:var(--surface);border-right:1px solid var(--border);padding:14px 16px;display:flex;flex-direction:column;overflow:hidden}
    .tv-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .tv-title{font-size:26px;font-weight:700}
    .tv-title .leaf{color:var(--accent)}
    .tv-clock{font-family:monospace;font-size:18px;color:var(--accent)}
    .tv-subtitle{font-size:13px;color:var(--text3);margin-bottom:10px}

    /* Weather */
    .tv-wx{background:var(--surface2);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
    .tv-wx .wx-icon{font-size:36px}
    .tv-wx .wx-temp{font-size:32px;font-weight:700}
    .tv-wx .wx-desc{font-size:14px;color:var(--text2)}
    .tv-wx .wx-loc{font-size:12px;color:var(--text3)}
    .tv-wx-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:8px}
    .tv-wx-item{background:var(--surface2);border-radius:6px;padding:5px;text-align:center}
    .tv-wx-item .v{font-size:16px;font-weight:600}
    .tv-wx-item .l{font-size:11px;color:var(--text3)}

    /* Forecast */
    .tv-forecast{display:flex;gap:3px;margin-bottom:10px}
    .tv-fc{flex:1;background:var(--surface2);border-radius:6px;padding:4px 2px;text-align:center}
    .tv-fc .day{font-size:11px;color:var(--text3)}
    .tv-fc .icon{font-size:22px}
    .tv-fc .temp{font-size:14px;font-weight:600}

    /* Sensors */
    .section-label{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin:6px 0 4px;display:flex;align-items:center;gap:6px}
    .section-label::after{content:'';flex:1;height:1px;background:var(--border)}
    .tv-sensors{display:flex;flex-direction:column;gap:5px}
    .tv-sensor{background:var(--surface2);border-radius:8px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between}
    .tv-sensor .name{font-size:13px;color:var(--text3)}
    .tv-sensor .val{font-size:22px;font-weight:700}
    .tv-sensor .unit{font-size:12px;color:var(--text3);margin-left:2px}

    /* Mini chart */
    .tv-chart-box{background:var(--surface2);border-radius:8px;padding:8px;margin-top:6px}
    .tv-chart-box canvas{height:80px!important}

    /* Water */
    .tv-water{background:var(--surface2);border-radius:8px;padding:8px 12px;margin-top:6px;display:flex;align-items:center;gap:10px}
    .tv-water .level{font-size:26px;font-weight:700}
    .tv-water .label{font-size:12px;color:var(--text3)}
    .tv-water-bar{flex:1;height:12px;background:var(--border);border-radius:4px;overflow:hidden}
    .tv-water-fill{height:100%;border-radius:4px;transition:width 1s}

    /* Center - garden */
    .center-panel{position:relative;overflow:hidden}
    .center-panel canvas{width:100%;height:100%;display:block}

    /* Right panel */
    .right-panel{display:flex;flex-direction:column;border-left:1px solid var(--border)}

    /* Koi cam */
    .tv-cam{height:440px;background:#000;position:relative;flex-shrink:0}
    .tv-cam video{width:100%;height:100%;object-fit:cover}
    .tv-cam .cam-label{position:absolute;top:8px;left:10px;background:rgba(220,38,38,0.85);color:#fff;font-size:12px;font-weight:700;padding:2px 8px;border-radius:3px;letter-spacing:1px;display:flex;align-items:center;gap:4px}
    .tv-cam .cam-label .dot{width:5px;height:5px;border-radius:50%;background:#fff;animation:blink 1s infinite}
    .tv-cam .cam-status{position:absolute;bottom:8px;right:10px;font-size:12px;color:rgba(255,255,255,0.5);font-family:monospace}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .cam-reconnect{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);color:var(--text3);font-size:16px;flex-direction:column;gap:6px}

    /* Birds section */
    .tv-birds{flex:1;background:var(--surface);padding:12px;display:flex;flex-direction:column;overflow:hidden}

    /* BOTD */
    .tv-botd{background:linear-gradient(135deg,var(--surface2),#1a3326);border-radius:10px;padding:10px;display:flex;gap:10px;margin-bottom:8px;position:relative;overflow:hidden}
    .tv-botd::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;background:radial-gradient(circle,rgba(74,222,128,0.08),transparent);pointer-events:none;animation:glow 4s ease-in-out infinite alternate}
    @keyframes glow{0%{opacity:.5;transform:scale(1)}100%{opacity:1;transform:scale(1.2)}}
    .tv-botd img{width:80px;height:80px;border-radius:10px;object-fit:contain;background:var(--surface);flex-shrink:0}
    .tv-botd .info{flex:1;min-width:0}
    .tv-botd .badge{font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:1px}
    .tv-botd .bname{font-size:20px;font-weight:700;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tv-botd .sci{font-size:12px;color:var(--text3);font-style:italic}
    .tv-botd .desc{font-size:11px;color:var(--text2);margin-top:3px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .tv-botd .bstats{display:flex;gap:8px;margin-top:4px}
    .tv-botd .bstat{font-size:11px;color:var(--text3)}
    .tv-botd .bstat b{color:var(--text);font-size:14px}

    /* Bird stats row */
    .tv-bird-stats{display:flex;gap:5px;margin-bottom:8px}
    .tv-bstat{flex:1;background:var(--surface2);border-radius:6px;padding:6px;text-align:center}
    .tv-bstat .v{font-size:22px;font-weight:700}
    .tv-bstat .l{font-size:11px;color:var(--text3);text-transform:uppercase}

    /* Bird list */
    .tv-bird-list{flex:1;display:flex;flex-direction:column;gap:3px;overflow:hidden}
    .tv-bird-item{display:flex;align-items:center;gap:8px;padding:4px 8px;background:var(--surface2);border-radius:6px;animation:fadeIn 0.5s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:none}}
    .tv-bird-item img{width:40px;height:40px;border-radius:6px;object-fit:cover;object-position:top;background:var(--surface);flex-shrink:0}
    .tv-bird-item .bname{font-size:15px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tv-bird-item .bcount{font-size:15px;color:var(--accent);font-weight:700}
    .tv-bird-item .bconf{font-size:12px;color:var(--text3)}
    .tv-bird-item .rank{font-size:13px;color:var(--text3);font-weight:700;width:20px;text-align:center;flex-shrink:0}

    /* Timeline */
    .tv-tl-item{display:flex;align-items:center;gap:6px;padding:3px 6px;font-size:14px}
    .tv-tl-time{color:var(--text3);font-family:monospace;font-size:13px;min-width:55px;flex-shrink:0}
    .tv-tl-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
    .tv-tl-conf{color:var(--text3);font-size:13px}
  </style>
</head>
<body>
<div class="tv-layout">
  <!-- LEFT -->
  <div class="left-panel">
    <div class="tv-header">
      <div class="tv-title"><span class="leaf">[*]</span> <span id="tvTitle">Smart Garden</span></div>
      <div class="tv-clock" id="tvClock"></div>
    </div>
    <div class="tv-subtitle" id="tvSub">Environmental Monitoring</div>
    <div class="tv-wx" id="tvWx"></div>
    <div class="tv-wx-grid" id="tvWxGrid"></div>
    <div class="tv-forecast" id="tvForecast"></div>
    <div class="section-label" id="lblSensors">Sensors</div>
    <div class="tv-sensors" id="tvSensors"></div>
    <div class="section-label" id="lblChart">24h Temperature</div>
    <div class="tv-chart-box"><canvas id="tvTempChart"></canvas></div>
    <div class="section-label" id="lblHumChart">24h Humidity</div>
    <div class="tv-chart-box"><canvas id="tvHumChart"></canvas></div>
    <div class="section-label" id="lblVpdChart">24h VPD</div>
    <div class="tv-chart-box"><canvas id="tvVpdChart"></canvas></div>
    <div class="tv-water" id="tvWater" style="display:none">
      <div><div class="level" id="tvWaterLevel">--%</div><div class="label" id="tvWaterLabel">Water Level</div></div>
      <div class="tv-water-bar"><div class="tv-water-fill" id="tvWaterFill"></div></div>
    </div>
    <div id="tvTimer" style="display:none;margin-top:6px">
      <div style="position:relative;border-radius:6px;overflow:hidden">
        <img src="/water-timer-bg.png" style="width:100%;display:block;border-radius:6px">
        <svg id="tvTimerSvg" viewBox="0 0 800 436" preserveAspectRatio="xMidYMid meet" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none">
          <defs>
            <filter id="tvWaterGlow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          </defs>
          <g id="tvInputFlow" style="display:none" filter="url(#tvWaterGlow)">
            <path id="tvInputPath" d="M400,435 L398,261" fill="none" stroke="#38bdf8" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
            <circle r="4" fill="#bae6fd" opacity="0.9"><animateMotion dur="1s" repeatCount="indefinite"><mpath href="#tvInputPath"/></animateMotion></circle>
            <circle r="3" fill="#7dd3fc" opacity="0.7"><animateMotion dur="1s" repeatCount="indefinite" begin="0.33s"><mpath href="#tvInputPath"/></animateMotion></circle>
            <circle r="3.5" fill="#bae6fd" opacity="0.8"><animateMotion dur="1s" repeatCount="indefinite" begin="0.66s"><mpath href="#tvInputPath"/></animateMotion></circle>
          </g>
          <g id="tvV1Flow" style="display:none" filter="url(#tvWaterGlow)">
            <path id="tvV1Path" d="M398,262 L311,181 L307,69 L294,57 L198,59 L178,71 L168,105 L161,137 L158,166 L157,193 L157,200" fill="none" stroke="#38bdf8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
            <circle r="4" fill="#bae6fd" opacity="0.9"><animateMotion dur="2.2s" repeatCount="indefinite"><mpath href="#tvV1Path"/></animateMotion></circle>
            <circle r="3" fill="#7dd3fc" opacity="0.7"><animateMotion dur="2.2s" repeatCount="indefinite" begin="0.55s"><mpath href="#tvV1Path"/></animateMotion></circle>
            <circle r="3.5" fill="#bae6fd" opacity="0.8"><animateMotion dur="2.2s" repeatCount="indefinite" begin="1.1s"><mpath href="#tvV1Path"/></animateMotion></circle>
          </g>
          <g id="tvV1Splash" style="display:none">
            <line x1="157" y1="200" x2="157" y2="235" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" opacity="0.6"><animate attributeName="opacity" values="0.4;0.8;0.4" dur="0.6s" repeatCount="indefinite"/></line>
            <circle cx="153" cy="215" r="2" fill="#7dd3fc"><animate attributeName="cy" values="205;230;205" dur="0.7s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.9;0;0.9" dur="0.7s" repeatCount="indefinite"/></circle>
            <circle cx="161" cy="210" r="1.5" fill="#bae6fd"><animate attributeName="cy" values="203;228;203" dur="0.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0;0.8" dur="0.5s" repeatCount="indefinite"/></circle>
            <circle cx="157" cy="208" r="2.5" fill="#38bdf8"><animate attributeName="cy" values="200;238;200" dur="0.9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;0;0.7" dur="0.9s" repeatCount="indefinite"/></circle>
          </g>
          <g id="tvV2Flow" style="display:none" filter="url(#tvWaterGlow)">
            <path id="tvV2Path" d="M403,262 L437,239 L589,240 L637,274 L655,300" fill="none" stroke="#38bdf8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
            <circle r="4" fill="#bae6fd" opacity="0.9"><animateMotion dur="1.6s" repeatCount="indefinite"><mpath href="#tvV2Path"/></animateMotion></circle>
            <circle r="3" fill="#7dd3fc" opacity="0.7"><animateMotion dur="1.6s" repeatCount="indefinite" begin="0.4s"><mpath href="#tvV2Path"/></animateMotion></circle>
            <circle r="3.5" fill="#bae6fd" opacity="0.8"><animateMotion dur="1.6s" repeatCount="indefinite" begin="0.8s"><mpath href="#tvV2Path"/></animateMotion></circle>
          </g>
          <g id="tvV2Splash" style="display:none">
            <path d="M655,300 Q660,320 665,340" stroke="#38bdf8" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="0.8s" repeatCount="indefinite"/></path>
            <circle cx="665" cy="340" r="5" fill="none" stroke="#7dd3fc" stroke-width="1.5" opacity="0.5"><animate attributeName="r" values="3;15;3" dur="1.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;0;0.6" dur="1.2s" repeatCount="indefinite"/></circle>
            <circle cx="665" cy="340" r="3" fill="none" stroke="#bae6fd" stroke-width="1" opacity="0.4"><animate attributeName="r" values="2;10;2" dur="0.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;0;0.5" dur="0.8s" repeatCount="indefinite"/></circle>
          </g>
          <g id="tvV1Status">
            <rect x="20" y="375" width="160" height="50" rx="8" fill="#0f172a" opacity="0.85" stroke="#1e293b" stroke-width="1"/>
            <text x="100" y="395" font-size="11" fill="#94a3b8" text-anchor="middle" font-family="sans-serif" id="tvV1Label">Valve 1</text>
            <text x="100" y="415" font-size="14" font-weight="700" text-anchor="middle" font-family="sans-serif" id="tvV1Text" fill="#5a7a66">OFF</text>
          </g>
          <g id="tvV2Status">
            <rect x="580" y="375" width="200" height="50" rx="8" fill="#0f172a" opacity="0.85" stroke="#1e293b" stroke-width="1"/>
            <text x="680" y="395" font-size="11" fill="#94a3b8" text-anchor="middle" font-family="sans-serif" id="tvV2Label">Valve 2</text>
            <text x="680" y="415" font-size="14" font-weight="700" text-anchor="middle" font-family="sans-serif" id="tvV2Text" fill="#5a7a66">OFF</text>
          </g>
        </svg>
      </div>
    </div>
  </div>

  <!-- CENTER -->
  <div class="center-panel"><canvas id="gardenCanvas"></canvas></div>

  <!-- RIGHT -->
  <div class="right-panel">
    <div class="tv-cam" id="tvCamBox">
      <video id="koiVideo" autoplay muted playsinline></video>
      <div class="cam-label"><span class="dot"></span> <span id="camLabel">LIVE</span></div>
      <div class="cam-status" id="camStatus"></div>
      <div class="cam-reconnect" id="camReconnect" style="display:none"><div>[CAM]</div><div id="camReconnectText">Connecting...</div></div>
    </div>
    <div class="tv-birds">
      <div class="section-label" id="tvBirdsTitle">Bird Detection</div>
      <div class="tv-bird-stats" id="tvBirdStats"></div>
      <div id="tvBotd"></div>
      <div class="section-label" id="tvRecentTitle" style="margin-top:4px">Top 5 Species</div>
      <div class="tv-bird-list" id="tvBirdList"></div>
      <div class="section-label" id="tvTimelineTitle" style="margin-top:4px">Recent Detections</div>
      <div id="tvTimeline"></div>
    </div>
  </div>
</div>

<script>
const LANG = window.location.pathname.startsWith('/cn') ? 'cn' : 'en';
const cn = LANG === 'cn';

document.getElementById('tvTitle').textContent = cn ? '智慧花园' : 'Smart Garden';
document.getElementById('tvSub').textContent = cn ? '环境监测信息屏' : 'Environmental Monitoring Display';
document.getElementById('tvBirdsTitle').textContent = cn ? '鸟类检测' : 'Bird Detection';
document.getElementById('tvRecentTitle').textContent = cn ? '鸟种排行' : 'Top Species';
document.getElementById('tvWaterLabel').textContent = cn ? '鱼塘水位' : 'Water Level';
document.getElementById('lblSensors').textContent = cn ? '传感器' : 'Sensors';
document.getElementById('lblChart').textContent = cn ? '24小时温度' : '24h Temperature';
document.getElementById('camLabel').textContent = cn ? '直播' : 'LIVE';

// Clock
setInterval(() => {
  const now = new Date();
  document.getElementById('tvClock').textContent = now.toLocaleTimeString(cn?'zh-CN':'en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}, 1000);

const wxEmoji = t => {
  const l = (t||'').toLowerCase();
  if (l.includes('thunder')) return '<span style="color:#facc15">*</span>';
  if (l.includes('rain')||l.includes('shower')) return '<span style="color:#38bdf8">//</span>';
  if (l.includes('snow')) return '<span style="color:#e2e8f0">**</span>';
  if (l.includes('cloud')||l.includes('overcast')) return '<span style="color:#94a3b8">~~</span>';
  if (l.includes('fog')||l.includes('mist')) return '<span style="color:#64748b">==</span>';
  if (l.includes('sunny')||l.includes('clear')) return '<span style="color:#facc15">O</span>';
  return '<span style="color:#94a3b8">~O</span>';
};

async function loadWeather() {
  try {
    const data = await (await fetch('/api/weather')).json();
    const cur = data.hourly?.[0] || data.forecast?.[0];
    if (!cur) return;
    document.getElementById('tvWx').innerHTML = `
      <span class="wx-icon" style="font-size:36px">${wxEmoji(cur.shortForecast)}</span>
      <div style="flex:1">
        <div style="display:flex;align-items:baseline;gap:8px"><span class="wx-temp" style="font-size:32px;font-weight:700">${cur.temperature}°F</span><span class="wx-desc" style="font-size:14px;color:var(--text2)">${cur.shortForecast}</span></div>
        <div class="wx-loc" style="font-size:12px;color:var(--text3)">${cn?'宾州 西切斯特':'West Chester, PA'}</div>
      </div>`;
    const grid = [];
    if (cur.windSpeed) grid.push({v:cur.windSpeed,l:cn?'风速':'Wind'});
    if (cur.relativeHumidity?.value) grid.push({v:cur.relativeHumidity.value+'%',l:cn?'湿度':'Humidity'});
    grid.push({v:new Date(data.updated||'').toLocaleTimeString(cn?'zh-CN':'en-US',{hour:'2-digit',minute:'2-digit'}),l:cn?'更新':'Updated'});
    document.getElementById('tvWxGrid').innerHTML = grid.map(d=>`<div class="tv-wx-item"><div class="v">${d.v}</div><div class="l">${d.l}</div></div>`).join('');
    const fc = (data.forecast||[]).slice(0,7);
    document.getElementById('tvForecast').innerHTML = fc.map(f=>`<div class="tv-fc"><div class="day">${(f.name||'').split(' ')[0]?.slice(0,3)}</div><div class="icon">${wxEmoji(f.shortForecast)}</div><div class="temp">${f.temperature}°</div></div>`).join('');
  } catch {}
}

let tvTempChart = null;
async function loadSensors() {
  try {
    const sensors = await (await fetch('/api/sensors')).json();
    const ids = Object.keys(sensors);
    if (!ids.length) return;
    let html = '';
    for (const id of ids) {
      const s = sensors[id];
      const tC = s.temperature!==undefined ? ((s.temperature-32)*5/9).toFixed(1) : null;
      const tF = s.temperature!==undefined ? s.temperature.toFixed(1) : null;
      if (tF) html += `<div class="tv-sensor"><div><div class="name">${s.name||'Sensor'} - ${cn?'温度':'Temp'}</div></div><div class="val">${tF}°F<span class="unit"> (${tC}°C)</span></div></div>`;
      if (s.humidity!==undefined) html += `<div class="tv-sensor"><div><div class="name">${cn?'湿度':'Humidity'}</div></div><div class="val">${s.humidity.toFixed(0)}<span class="unit">%</span></div></div>`;
      if (s.barometric_pressure) html += `<div class="tv-sensor"><div><div class="name">${cn?'气压':'Pressure'}</div></div><div class="val">${s.barometric_pressure.toFixed(0)}<span class="unit"> hPa</span></div></div>`;
      if (s.dewpoint!==undefined) html += `<div class="tv-sensor"><div><div class="name">${cn?'露点':'Dew Point'}</div></div><div class="val">${((s.dewpoint-32)*5/9).toFixed(1)}<span class="unit">°C</span></div></div>`;
      if (s.vpd!==undefined) html += `<div class="tv-sensor"><div><div class="name">VPD</div></div><div class="val">${s.vpd.toFixed(2)}<span class="unit"> kPa</span></div></div>`;
    }
    document.getElementById('tvSensors').innerHTML = html;
  } catch {}
}

async function loadTempChart() {
  try {
    const sensors = await (await fetch('/api/sensors')).json();
    const sensorIds = Object.keys(sensors);
    if (!sensorIds.length) return;
    const now = new Date();
    const body = { sensors: sensorIds, startTime: new Date(now - 24*3600000).toISOString(), limit: 500 };
    const data = await (await fetch('/api/samples',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})).json();
    const samples = data.sensors?.[sensorIds[0]] || [];
    if (!samples.length) return;
    const labels = samples.map(s => new Date(s.observed).toLocaleTimeString(cn?'zh-CN':'en-US',{hour:'2-digit',minute:'2-digit'})).reverse();
    const temps = samples.map(s => ((s.temperature-32)*5/9).toFixed(1)).reverse();
    const ctx = document.getElementById('tvTempChart').getContext('2d');
    if (tvTempChart) tvTempChart.destroy();
    tvTempChart = new Chart(ctx, {

      type:'line', options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{display:false},y:{grid:{color:'rgba(36,67,46,0.3)'},ticks:{color:'#5a7a66',font:{size:9},callback:v=>v+unit}}}}

// ============ HLS Koi Cam (matches koi.html player) ============
let hlsInstance = null;
let hlsRetryCount = 0;
const HLS_MAX_RETRY = 50;

function destroyHls() {
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
}

function initKoiCam() {
  const video = document.getElementById('koiVideo');
  const reconnectEl = document.getElementById('camReconnect');
  const reconnectText = document.getElementById('camReconnectText');
  const statusEl = document.getElementById('camStatus');
  let stallTimer = null;

  function showReconnect(msg) {
    reconnectEl.style.display = 'flex';
    reconnectText.textContent = msg;
  }
  function hideReconnect() { reconnectEl.style.display = 'none'; }

  function scheduleRetry() {
    hlsRetryCount++;
    if (hlsRetryCount > HLS_MAX_RETRY) {
      showReconnect(cn ? '视频流离线' : 'Stream offline');
      return;
    }
    const delay = Math.min(2000 + hlsRetryCount * 1000, 15000);
    showReconnect(`${cn?'重连中':'Reconnecting'}... (${hlsRetryCount})`);
    statusEl.textContent = `retry #${hlsRetryCount}`;
    setTimeout(connect, delay);
  }

  function connect() {
    destroyHls();
    const hlsUrl = '/hls/stream.m3u8?t=' + Date.now();
    showReconnect(cn ? '连接中...' : 'Connecting...');

    if (!Hls.isSupported()) {
      if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = hlsUrl;
        video.play().catch(()=>{});
        hideReconnect();
      }
      return;
    }

    hlsInstance = new Hls({
      liveSyncDurationCount: 3,
      liveMaxLatencyDurationCount: 8,
      liveDurationInfinity: true,
      enableWorker: true,
      lowLatencyMode: false,
      backBufferLength: 30,
      maxBufferLength: 30,
      maxMaxBufferLength: 60,
      maxBufferHole: 0.5,
      manifestLoadingTimeOut: 15000,
      manifestLoadingMaxRetry: 10,
      manifestLoadingRetryDelay: 1000,
      levelLoadingTimeOut: 15000,
      levelLoadingMaxRetry: 10,
      levelLoadingRetryDelay: 1000,
      fragLoadingTimeOut: 30000,
      fragLoadingMaxRetry: 10,
      fragLoadingRetryDelay: 1000,
    });

    hlsInstance.loadSource(hlsUrl);
    hlsInstance.attachMedia(video);

    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play().catch(()=>{});
      hideReconnect();
      hlsRetryCount = 0;
      statusEl.textContent = '';
    });

    let mediaRecoveryAttempts = 0;
    hlsInstance.on(Hls.Events.ERROR, (event, data) => {
      if (data.fatal) {
        if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
          mediaRecoveryAttempts++;
          if (mediaRecoveryAttempts <= 3) {
            hlsInstance.recoverMediaError();
          } else {
            mediaRecoveryAttempts = 0;
            scheduleRetry();
          }
        } else if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
          hlsInstance.startLoad();
          setTimeout(() => { if (hlsInstance) hlsInstance.loadSource(hlsUrl); }, 3000);
        } else {
          scheduleRetry();
        }
      }
    });

    hlsInstance.on(Hls.Events.FRAG_LOADED, () => {
      hideReconnect();
      hlsRetryCount = 0;
      mediaRecoveryAttempts = 0;
    });

    hlsInstance.on(Hls.Events.BUFFER_APPENDING, () => {
      clearTimeout(stallTimer);
      stallTimer = setTimeout(() => {
        if (hlsInstance && video.paused && !document.hidden) {
          video.play().catch(()=>{});
        }
      }, 8000);
    });
  }

  // Wait for stream to be ready before connecting
  async function waitAndConnect() {
    showReconnect(cn ? '等待视频流...' : 'Waiting for stream...');
    for (let i = 0; i < 15; i++) {
      try {
        const res = await fetch('/api/camera/status');
        const data = await res.json();
        if (data.hlsReady) { connect(); return; }
      } catch (e) {}
      await new Promise(r => setTimeout(r, 2000));
    }
    connect();
  }

  waitAndConnect();

  // Periodic health check
  setInterval(() => {
    if (reconnectEl.style.display === 'none' && video.paused && hlsInstance) {
      video.play().catch(() => { connect(); });
    }
  }, 30000);
}

// ============ Birds ============
let birdTrans = {};
async function loadBirdData() {
  try {
    birdTrans = await (await fetch('/api/birds/translations')).json();
    function localDate(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
    let stats = await (await fetch(`/api/birds/stats?date=${localDate()}&days=1`)).json();
    if (stats.total_detections===0) stats = await (await fetch(`/api/birds/stats?date=${localDate()}&days=7`)).json();

    const period = stats.total_detections > 0 && stats.period?.days === 1 ? (cn?'今日':'Today') : (cn?'7日':'7 Days');
    document.getElementById('tvBirdStats').innerHTML = `
      <div class="tv-bstat"><div class="v">${stats.total_detections}</div><div class="l">${cn?'检测':'Detect'} (${period})</div></div>
      <div class="tv-bstat"><div class="v">${stats.unique_species}</div><div class="l">${cn?'鸟种':'Species'}</div></div>
      <div class="tv-bstat"><div class="v">${stats.total_detections>0?stats.hourly.indexOf(Math.max(...stats.hourly))+':00':'--'}</div><div class="l">${cn?'高峰':'Peak'}</div></div>`;

    // Leaderboard
    const lb = stats.leaderboard || [];
    let listHtml = '';
    for (let i = 0; i < Math.min(lb.length, 5); i++) {
      const sp = lb[i];
      const t = birdTrans[sp.common_name] || {};
      const name = cn ? (t.cn_name||sp.common_name) : sp.common_name;
      let img = '';
      try {
        const w = await (await fetch(`/api/birds/image/${encodeURIComponent(sp.common_name)}?sci=${encodeURIComponent(sp.scientific_name)}`)).json();
        img = w.image ? `<img src="${w.image}">` : '';
      } catch {}
      if (!img) img = '<div style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--surface);border-radius:6px;color:var(--text3)">?</div>';
      listHtml += `<div class="tv-bird-item" style="animation-delay:${i*0.05}s"><span class="rank">#${i+1}</span>${img}<span class="bname">${name}</span><span class="bcount">${sp.count}x</span><span class="bconf">${Math.round(sp.avg_conf*100)}%</span></div>`;
    }
    document.getElementById('tvBirdList').innerHTML = listHtml || `<div style="color:var(--text3);font-size:11px;text-align:center;padding:10px">${cn?'暂无':'None'}</div>`;

    // Recent detections timeline (latest 5)
    try {
      function localDate(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
      const daily = await (await fetch(`/api/birds/daily/${localDate()}`)).json();
      const recent = (daily.detections || []).slice(-5).reverse();
      document.getElementById('tvTimelineTitle').textContent = cn ? '最近检测' : 'Recent Detections';
      document.getElementById('tvTimeline').innerHTML = recent.length ? recent.map(d => {
        const t = birdTrans[d.common_name] || {};
        const nm = cn ? (t.cn_name || d.common_name) : d.common_name;
        const tm = new Date(d.time).toLocaleTimeString(cn?'zh-CN':'en-US',{hour:'2-digit',minute:'2-digit'});
        return `<div class="tv-tl-item"><span class="tv-tl-time">${tm}</span><span class="tv-tl-name">${nm}</span><span class="tv-tl-conf">${Math.round(d.confidence*100)}%</span></div>`;
      }).join('') : `<div style="color:var(--text3);font-size:10px;text-align:center;padding:6px">${cn?'今日暂无':'None today'}</div>`;
    } catch {}

    // BOTD
    try {
      const botd = await (await fetch('/api/birds/botd')).json();
      if (botd.bird) {
        const b = botd.bird;
        const t = birdTrans[b.common_name]||{};
        const bName = cn?(t.cn_name||b.common_name):b.common_name;
        let bImg = '';
        try{const w = await(await fetch(`/api/birds/image/${encodeURIComponent(b.common_name)}?sci=${encodeURIComponent(b.scientific_name)}`)).json();bImg=w.image||'';}catch{}
        let detail = {};
        try{detail = await(await fetch(`/api/birds/detail/${encodeURIComponent(b.common_name)}?sci=${encodeURIComponent(b.scientific_name)}&t=${Date.now()}`)).json();}catch{}
        const desc = cn?(detail.description_cn||t.cn_desc||''):(detail.description_en||'');
        document.getElementById('tvBotd').innerHTML = `
          <div class="tv-botd">
            ${bImg?`<img src="${bImg}">`:''}
            <div class="info">
              <div class="badge">${cn?'今日之鸟':'BIRD OF THE DAY'}</div>
              <div class="bname">${bName}</div>
              <div class="sci">${b.scientific_name}</div>
              ${desc?`<div class="desc">${desc}</div>`:''}
              <div class="bstats">
                <span class="bstat"><b>${b.count}</b> ${cn?'次':'x'}</span>
                <span class="bstat"><b>${Math.round(b.max_conf*100)}%</b> ${cn?'置信度':'conf'}</span>
                <span class="bstat"><b>${b.rarity_days<=1?(cn?'首次!':'New!'):b.rarity_days+'d'}</b> ${cn?'稀有度':'rarity'}</span>
              </div>
            </div>
          </div>`;
      }
    } catch {}
  } catch(e){console.error('birds:',e)}
}

// ============ Water Timer Status ============
async function loadTimerStatus() {
  try {
    const res = await fetch('/api/timer/status');
    const d = await res.json();
    document.getElementById('tvTimer').style.display = '';
    function fmtMin(m) { return m >= 60 ? Math.floor(m/60) + 'h ' + (m%60) + 'm' : m + 'm'; }
    for (const v of [1, 2]) {
      const s = d[`valve${v}`];
      const flow = document.getElementById(`tvV${v}Flow`);
      const splash = document.getElementById(`tvV${v}Splash`);
      const txt = document.getElementById(`tvV${v}Text`);
      const lbl = document.getElementById(`tvV${v}Label`);
      if (flow) flow.style.display = s.on ? '' : 'none';
      if (splash) splash.style.display = s.on ? '' : 'none';
      lbl.textContent = cn ? '\u6C34\u9600 ' + v : 'Valve ' + v;
      let st = s.on ? (cn ? '\u5F00\u542F' : 'OPEN') : 'OFF';
      if (s.on && s.on_since) {
        const elapsed = Math.floor((Date.now() - s.on_since) / 60000);
        st += ' (' + fmtMin(elapsed) + ')';
      }
      if (s.countdown > 0) st += ' ' + fmtMin(s.countdown);
      txt.textContent = st;
      txt.setAttribute('fill', s.on ? '#22c55e' : '#5a7a66');
    }
    const inputFlow = document.getElementById('tvInputFlow');
    if (inputFlow) inputFlow.style.display = (d.valve1.on || d.valve2.on) ? '' : 'none';
  } catch (e) {}
}
